<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>textflow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  html, body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 0.75rem;
    background: rgba(10, 10, 15, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  nav::-webkit-scrollbar { display: none; }

  nav .logo {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.4);
    margin-right: 0.5rem;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  nav button {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.5);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.35rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  nav button:hover {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.8);
  }

  nav button.active {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
    color: #fff;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }
</style>
</head>
<body>

<nav>
  <span class="logo">textflow</span>
  <button class="active" data-mode="lava">lava</button>
  <button data-mode="rain">rain</button>
  <button data-mode="wave">wave</button>
  <button data-mode="fire">fire</button>
  <button data-mode="plasma">plasma</button>
  <button data-mode="life">life</button>
  <button data-mode="warp">warp</button>
  <button data-mode="swirl">swirl</button>
</nav>

<canvas id="c"></canvas>

<script>
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('selectstart', function(e) { e.preventDefault(); });

// ============================================================
// TEXTFLOW — Canvas-based ASCII text renderer
// Zero DOM manipulation per frame. Just fillText calls.
// ============================================================

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var buttons = document.querySelectorAll('nav button');
var currentMode = 'lava';
var COLS, ROWS;
var time = 0;
var CHAR_W, CHAR_H, FONT_SIZE;
var NAV_H = 36;
var dpr = window.devicePixelRatio || 1;

var RAMP_DENSE = ' .`-:;=+*#%@$';
var RAMP_FIRE  = ' .:-=+*%#@';
var RAMP_SOFT  = ' .,-~:;=!*#';

function resize() {
  var w = window.innerWidth;
  var h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);

  FONT_SIZE = Math.max(10, Math.min(16, w / 70));
  ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
  CHAR_W = ctx.measureText('M').width;
  CHAR_H = FONT_SIZE * 1.25;

  COLS = Math.floor(w / CHAR_W);
  ROWS = Math.floor((h - NAV_H) / CHAR_H);
}

resize();
window.addEventListener('resize', resize);

// Glow configs per mode
var glows = {
  lava:   { color: 'rgba(255,80,30,0.35)', blur: 12 },
  rain:   { color: 'rgba(0,220,100,0.35)', blur: 10 },
  wave:   { color: 'rgba(80,140,255,0.3)', blur: 12 },
  fire:   { color: 'rgba(255,150,30,0.35)', blur: 10 },
  plasma: { color: 'rgba(180,60,255,0.3)', blur: 12 },
  life:   { color: 'rgba(0,255,180,0.3)', blur: 10 },
  warp:   { color: 'rgba(200,200,255,0.3)', blur: 14 },
  swirl:  { color: 'rgba(255,100,200,0.3)', blur: 12 }
};

function clearCanvas() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function drawChar(ch, x, y, r, g, b, a) {
  if (ch === ' ') return;
  ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + a.toFixed(2) + ')';
  ctx.fillText(ch, x * CHAR_W, NAV_H + y * CHAR_H);
}

function drawCharHSL(ch, x, y, h, s, l) {
  if (ch === ' ') return;
  ctx.fillStyle = 'hsl(' + (h|0) + ',' + (s|0) + '%,' + (l|0) + '%)';
  ctx.fillText(ch, x * CHAR_W, NAV_H + y * CHAR_H);
}

// ============================================================
// LAVA LAMP
// ============================================================

var blobs = [];
var NUM_BLOBS = 7;

function initBlobs() {
  blobs = [];
  for (var i = 0; i < NUM_BLOBS; i++) {
    blobs.push({
      x: Math.random() * COLS,
      y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.5 + (i % 2 === 0 ? -0.15 : 0.15),
      r: 4 + Math.random() * 6,
      phase: Math.random() * Math.PI * 2
    });
  }
}
initBlobs();

var lavaColors = [
  [255,40,20], [255,100,40], [255,160,60], [255,200,100], [255,230,180]
];

function renderLava() {
  clearCanvas();

  for (var i = 0; i < blobs.length; i++) {
    var b = blobs[i];
    b.x += b.vx + Math.sin(time * 0.4 + b.phase) * 0.15;
    b.y += b.vy + Math.cos(time * 0.3 + b.phase) * 0.1;
    b.r += Math.sin(time * 0.5 + b.phase) * 0.03;
    if (b.x < 2 || b.x > COLS - 2) { b.vx *= -0.9; b.x = Math.max(2, Math.min(COLS - 2, b.x)); }
    if (b.y < 2 || b.y > ROWS - 2) { b.vy *= -0.8; b.y = Math.max(2, Math.min(ROWS - 2, b.y)); }
    b.vx *= 0.995; b.vy *= 0.995;
    b.vy += Math.sin(time * 0.2 + b.phase * 2) * 0.008;
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var sum = 0;
      var px = x * 0.55;
      for (var i = 0; i < blobs.length; i++) {
        var b = blobs[i];
        var dx = px - b.x * 0.55;
        var dy = y - b.y;
        sum += (b.r * b.r) / (dx * dx + dy * dy + 0.1);
      }
      var t = sum * 0.15;
      if (t > 1) t = 1;
      if (t < 0.08) continue;
      var ci = Math.min(4, (t * 5) | 0);
      var c = lavaColors[ci];
      var ri = Math.min(RAMP_DENSE.length - 1, (t * RAMP_DENSE.length) | 0);
      drawChar(RAMP_DENSE[ri], x, y, c[0], c[1], c[2], 0.3 + t * 0.7);
    }
  }
}

// ============================================================
// RAIN
// ============================================================

var drops = [];
var MAX_DROPS = 180;

function initRain() {
  drops = [];
  for (var i = 0; i < MAX_DROPS; i++) {
    var d = {
      x: Math.floor(Math.random() * COLS),
      y: Math.random() * ROWS * 2 - ROWS,
      speed: 0.3 + Math.random() * 0.8,
      len: 4 + Math.floor(Math.random() * 12),
      chars: []
    };
    for (var j = 0; j < d.len; j++) {
      d.chars.push(String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96)));
    }
    drops.push(d);
  }
}
initRain();

function renderRain() {
  clearCanvas();

  var bright = new Float32Array(COLS * ROWS);
  var charGrid = new Array(COLS * ROWS);

  for (var i = 0; i < drops.length; i++) {
    var d = drops[i];
    d.y += d.speed;
    if (d.y - d.len > ROWS) {
      d.y = -d.len;
      d.x = Math.floor(Math.random() * COLS);
      d.speed = 0.3 + Math.random() * 0.8;
    }
    if (Math.random() < 0.08) {
      d.chars[Math.floor(Math.random() * d.len)] = String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96));
    }
    for (var j = 0; j < d.len; j++) {
      var ty = (d.y - j) | 0;
      if (ty >= 0 && ty < ROWS && d.x >= 0 && d.x < COLS) {
        var fade = 1 - j / d.len;
        var idx = ty * COLS + d.x;
        if (fade > bright[idx]) {
          charGrid[idx] = d.chars[j];
          bright[idx] = fade;
        }
      }
    }
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var idx = y * COLS + x;
      var b = bright[idx];
      if (b < 0.01) continue;
      var ch = charGrid[idx];
      if (b > 0.95) {
        drawChar(ch, x, y, 180, 255, 200, 1);
      } else {
        var g = (80 + b * 175) | 0;
        drawChar(ch, x, y, 0, g, (g * 0.4) | 0, 0.2 + b * 0.8);
      }
    }
  }
}

// ============================================================
// WAVES
// ============================================================

function renderWave() {
  clearCanvas();
  var phrase = 'textflow';

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var w1 = Math.sin(x * 0.08 - time * 1.2 + y * 0.15) * 0.5 + 0.5;
      var w2 = Math.sin(x * 0.12 + time * 0.8 - y * 0.1) * 0.5 + 0.5;
      var w3 = Math.sin((x + y) * 0.06 + time * 0.5) * 0.5 + 0.5;
      var cx = x - COLS / 2, cy = y - ROWS / 2;
      var w4 = Math.sin(Math.sqrt(cx * cx + cy * cy) * 0.12 - time * 1.5) * 0.5 + 0.5;

      var v = w1 * 0.35 + w2 * 0.25 + w3 * 0.2 + w4 * 0.2;
      v = Math.pow(v, 1.2);
      if (v < 0.15) continue;

      var ci = ((x + time * 8) | 0) % phrase.length;
      if (ci < 0) ci += phrase.length;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      var ch = v > 0.6 ? phrase[ci] : RAMP_SOFT[ri];

      var hue = (x * 2.5 + y * 1.5 + time * 30) % 360;
      var sat = 60 + v * 40;
      var lit = 30 + v * 50;
      drawCharHSL(ch, x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// FIRE
// ============================================================

var fireBuffer;
function initFire() {
  fireBuffer = new Float32Array(COLS * (ROWS + 2));
}
initFire();

var fireColors = [
  [20,5,0], [80,15,0], [180,40,0], [220,90,10],
  [255,150,20], [255,200,60], [255,240,150], [255,255,220]
];

function renderFire() {
  clearCanvas();
  var W = COLS, H = ROWS + 2;

  if (!fireBuffer || fireBuffer.length !== W * H) {
    fireBuffer = new Float32Array(W * H);
  }

  for (var x = 0; x < W; x++) {
    fireBuffer[(H - 1) * W + x] = Math.random() > 0.4 ? 0.8 + Math.random() * 0.2 : Math.random() * 0.3;
  }

  for (var y = 0; y < H - 1; y++) {
    for (var x = 0; x < W; x++) {
      var y1 = y + 1;
      var y2 = Math.min(H - 1, y + 2);
      var xl = x > 0 ? x - 1 : 0;
      var xr = x < W - 1 ? x + 1 : W - 1;
      var v = (fireBuffer[y1 * W + x] + fireBuffer[y1 * W + xl] + fireBuffer[y1 * W + xr] + fireBuffer[y2 * W + x]) * 0.25;
      v = v * (0.97 - Math.random() * 0.02) - 0.008;
      fireBuffer[y * W + x] = v > 0 ? v : 0;
    }
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < W; x++) {
      var v = fireBuffer[y * W + x];
      if (v < 0.05) continue;
      var ci = Math.min(7, (v * 8) | 0);
      var c = fireColors[ci];
      var ri = Math.min(RAMP_FIRE.length - 1, (v * RAMP_FIRE.length) | 0);
      drawChar(RAMP_FIRE[ri], x, y, c[0], c[1], c[2], 0.3 + v * 0.7);
    }
  }
}

// ============================================================
// PLASMA
// ============================================================

function renderPlasma() {
  clearCanvas();

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var v1 = Math.sin(x * 0.06 + time * 0.7);
      var v2 = Math.sin(y * 0.09 + time * 0.5);
      var v3 = Math.sin((x + y) * 0.05 + time * 0.4);
      var cx = x - COLS / 2, cy = y - ROWS / 2;
      var v4 = Math.sin(Math.sqrt(cx * cx + cy * cy) * 0.1 - time * 0.8);
      var v5 = Math.sin(x * 0.04 * Math.sin(time * 0.2) + y * 0.05 * Math.cos(time * 0.15));

      var v = (v1 + v2 + v3 + v4 + v5) * 0.1 + 0.5;
      if (v < 0.1) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (v * 270 + x * 1.5 + time * 30) % 360;
      var sat = 70 + v * 30;
      var lit = 20 + v * 55;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// GAME OF LIFE
// ============================================================

var lifeA, lifeB, lifeAge;
var LIFE_CHARS = ' .,:;+*oO#@';

function initLife() {
  var sz = COLS * ROWS;
  lifeA = new Uint8Array(sz);
  lifeB = new Uint8Array(sz);
  lifeAge = new Float32Array(sz);
  // Random seed — ~30% alive
  for (var i = 0; i < sz; i++) {
    lifeA[i] = Math.random() < 0.3 ? 1 : 0;
  }
}
initLife();

var lifeTickAccum = 0;

function renderLife() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var sz = W * H;

  if (!lifeA || lifeA.length !== sz) initLife();

  lifeTickAccum += 1;
  // Step every 6 frames (~10 generations/sec at 60fps)
  if (lifeTickAccum >= 6) {
    lifeTickAccum = 0;
    // Count neighbours and produce next gen
    for (var y = 0; y < H; y++) {
      for (var x = 0; x < W; x++) {
        var n = 0;
        for (var dy = -1; dy <= 1; dy++) {
          for (var dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            var ny = (y + dy + H) % H;
            var nx = (x + dx + W) % W;
            n += lifeA[ny * W + nx];
          }
        }
        var idx = y * W + x;
        var alive = lifeA[idx];
        if (alive) {
          lifeB[idx] = (n === 2 || n === 3) ? 1 : 0;
        } else {
          lifeB[idx] = (n === 3) ? 1 : 0;
        }
        // Track age for color
        if (lifeB[idx]) {
          lifeAge[idx] = Math.min(lifeAge[idx] + 0.15, 1);
        } else {
          lifeAge[idx] = Math.max(lifeAge[idx] - 0.08, 0);
        }
      }
    }
    // Swap buffers
    var tmp = lifeA; lifeA = lifeB; lifeB = tmp;

    // Inject random cells to prevent stagnation
    if (Math.random() < 0.05) {
      var rx = Math.floor(Math.random() * (W - 10)) + 5;
      var ry = Math.floor(Math.random() * (H - 10)) + 5;
      // Glider
      var pat = [[0,0],[1,0],[2,0],[2,-1],[1,-2]];
      for (var p = 0; p < pat.length; p++) {
        var pi = ((ry + pat[p][1] + H) % H) * W + ((rx + pat[p][0]) % W);
        lifeA[pi] = 1;
      }
    }
  }

  // Render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      var age = lifeAge[idx];
      if (age < 0.01) continue;
      var ci = Math.min(LIFE_CHARS.length - 1, (age * LIFE_CHARS.length) | 0);
      var hue = (age * 120 + time * 20) % 360;
      drawCharHSL(LIFE_CHARS[ci], x, y, hue, 70 + age * 30, 30 + age * 45);
    }
  }
}

// ============================================================
// WARP — Star tunnel
// ============================================================

var stars = [];
var NUM_STARS = 400;

function initWarp() {
  stars = [];
  for (var i = 0; i < NUM_STARS; i++) {
    stars.push({
      x: (Math.random() - 0.5) * 2,
      y: (Math.random() - 0.5) * 2,
      z: Math.random()
    });
  }
}
initWarp();

var WARP_CHARS = '.,+*oO0#@';

function renderWarp() {
  clearCanvas();
  var cx = COLS / 2;
  var cy = ROWS / 2;
  var speed = 0.008;

  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    s.z -= speed;
    if (s.z <= 0.001) {
      s.x = (Math.random() - 0.5) * 2;
      s.y = (Math.random() - 0.5) * 2;
      s.z = 1;
    }

    // Project
    var sx = (s.x / s.z) * cx * 0.8 + cx;
    var sy = (s.y / s.z) * cy * 0.8 + cy;

    if (sx < 0 || sx >= COLS || sy < 0 || sy >= ROWS) {
      s.z = 0; // Will reset next frame
      continue;
    }

    var bright = 1 - s.z;
    var ci = Math.min(WARP_CHARS.length - 1, (bright * WARP_CHARS.length) | 0);

    // Trail — draw a few chars behind
    var psx = (s.x / (s.z + speed * 3)) * cx * 0.8 + cx;
    var psy = (s.y / (s.z + speed * 3)) * cy * 0.8 + cy;
    var dx = sx - psx;
    var dy = sy - psy;
    var len = Math.sqrt(dx * dx + dy * dy);
    var steps = Math.min(4, (len) | 0);

    for (var j = 0; j <= steps; j++) {
      var t = j / (steps + 1);
      var tx = (sx - dx * t) | 0;
      var ty = (sy - dy * t) | 0;
      if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS) {
        var fade = bright * (1 - t * 0.6);
        var b = (180 + fade * 75) | 0;
        drawChar(WARP_CHARS[ci], tx, ty, b, b, (200 + fade * 55) | 0, 0.3 + fade * 0.7);
      }
    }
  }
}

// ============================================================
// SWIRL — Particle vortex with dual attractors
// ============================================================

var swirlParts = [];
var NUM_SWIRL = 300;
var attractor1 = { x: 0, y: 0 };
var attractor2 = { x: 0, y: 0 };

function initSwirl() {
  swirlParts = [];
  for (var i = 0; i < NUM_SWIRL; i++) {
    swirlParts.push({
      x: Math.random() * COLS,
      y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      life: Math.random(),
      ch: RAMP_DENSE[Math.floor(Math.random() * RAMP_DENSE.length)]
    });
  }
}
initSwirl();

function renderSwirl() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Animate attractors in orbits
  attractor1.x = W * 0.5 + Math.cos(time * 0.4) * W * 0.25;
  attractor1.y = H * 0.5 + Math.sin(time * 0.6) * H * 0.3;
  attractor2.x = W * 0.5 + Math.cos(time * 0.3 + 2) * W * 0.3;
  attractor2.y = H * 0.5 + Math.sin(time * 0.5 + 2) * H * 0.25;

  // Density field for rendering
  var density = new Float32Array(W * H);

  for (var i = 0; i < swirlParts.length; i++) {
    var p = swirlParts[i];

    // Gravity toward attractors with tangential component (swirl)
    var dx1 = attractor1.x - p.x, dy1 = attractor1.y - p.y;
    var d1 = Math.sqrt(dx1 * dx1 + dy1 * dy1) + 1;
    var f1 = 2.0 / d1;
    // Tangential = perpendicular to radial
    p.vx += (dx1 / d1 * f1 - dy1 / d1 * f1 * 0.8) * 0.02;
    p.vy += (dy1 / d1 * f1 + dx1 / d1 * f1 * 0.8) * 0.02;

    var dx2 = attractor2.x - p.x, dy2 = attractor2.y - p.y;
    var d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) + 1;
    var f2 = 1.5 / d2;
    p.vx += (dx2 / d2 * f2 + dy2 / d2 * f2 * 0.6) * 0.02;
    p.vy += (dy2 / d2 * f2 - dx2 / d2 * f2 * 0.6) * 0.02;

    // Damping
    p.vx *= 0.98;
    p.vy *= 0.98;

    // Speed limit
    var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > 2) { p.vx = p.vx / spd * 2; p.vy = p.vy / spd * 2; }

    p.x += p.vx;
    p.y += p.vy;

    // Wrap
    if (p.x < 0) p.x += W; if (p.x >= W) p.x -= W;
    if (p.y < 0) p.y += H; if (p.y >= H) p.y -= H;

    // Splat onto density field (3x3)
    var gx = p.x | 0, gy = p.y | 0;
    for (var sy = -1; sy <= 1; sy++) {
      for (var sx = -1; sx <= 1; sx++) {
        var nx = (gx + sx + W) % W;
        var ny = (gy + sy + H) % H;
        var dist = Math.abs(sx) + Math.abs(sy);
        var w = dist === 0 ? 1.0 : (dist === 1 ? 0.4 : 0.15);
        density[ny * W + nx] += w * (0.5 + spd * 0.3);
      }
    }
  }

  // Render density field
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = density[y * W + x];
      if (v < 0.1) continue;
      v = Math.min(v * 0.3, 1);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (Math.atan2(y - H / 2, x - W / 2) * 57.3 + time * 40 + 360) % 360;
      var sat = 60 + v * 40;
      var lit = 25 + v * 50;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// MAIN LOOP
// ============================================================

var renderers = {
  lava: renderLava, rain: renderRain, wave: renderWave,
  fire: renderFire, plasma: renderPlasma, life: renderLife,
  warp: renderWarp, swirl: renderSwirl
};

// Single-pass glow: draw canvas onto itself with blur via offscreen canvas
var glowCanvas = document.createElement('canvas');
var glowCtx = glowCanvas.getContext('2d');

function applyGlow() {
  var g = glows[currentMode];
  glowCanvas.width = canvas.width;
  glowCanvas.height = canvas.height;
  glowCtx.filter = 'blur(' + g.blur + 'px)';
  glowCtx.drawImage(canvas, 0, 0);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 0.5;
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(glowCanvas, 0, 0);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

var lastTime = 0;
function loop(ts) {
  if (!ts) { requestAnimationFrame(loop); return; }
  if (!lastTime) lastTime = ts;
  var dt = (ts - lastTime) / 1000;
  if (dt > 0.1) dt = 0.016;
  lastTime = ts;
  time += dt;
  renderers[currentMode]();
  applyGlow();
  requestAnimationFrame(loop);
}

function switchMode(mode) {
  currentMode = mode;
  time = 0;
  buttons.forEach(function(b) { b.classList.toggle('active', b.dataset.mode === mode); });
  if (mode === 'lava') initBlobs();
  if (mode === 'rain') initRain();
  if (mode === 'fire') initFire();
  if (mode === 'life') initLife();
  if (mode === 'warp') initWarp();
  if (mode === 'swirl') initSwirl();
}

buttons.forEach(function(b) {
  b.addEventListener('click', function() { switchMode(b.dataset.mode); });
});

// Wait for font to load before starting
document.fonts.ready.then(function() {
  resize();
  loop();
});
</script>
</body>
