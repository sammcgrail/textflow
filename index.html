  * {

  html, body {

    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
  }

  nav {

    gap: 0;

    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    overflow: hidden;
    visibility: hidden;
    touch-action: pan-x;
  }
  .nav-buttons {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 0.75rem;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex: 1;
    min-width: 0;
    touch-action: pan-x;
  }
  .nav-buttons::-webkit-scrollbar { display: none; }


  nav .logo {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    flex-shrink: 0;
    padding: 0.5rem 0.75rem;
    background: rgba(10, 10, 15, 0.95);
    z-index: 2;
    position: relative;
    border-right: 1px solid rgba(255, 255, 255, 0.06);
  }

  nav button {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.5);
    font-family: 'JetBrains Mono', monospace;

    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
    touch-action: manipulation;
    opacity: 1;
  }

  @media (hover: hover) {
    nav button:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }
  }

  nav button.active {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
    color: #fff;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }
  #glow {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    height: 100dvh;
    pointer-events: none;
    mix-blend-mode: plus-lighter;
    opacity: 0.6;
    filter: blur(8px);
    z-index: 1;
  }
  #fps {
    position: fixed;
    bottom: 2px;
    left: 6px;
    z-index: 200;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: rgba(255,255,255,0.6);
    pointer-events: none;
  }

  @keyframes navFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes btnAppear {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  CHAR_H = FONT_SIZE * 1.25;

  ROWS = Math.floor((h - NAV_H) / CHAR_H);

}

function clearCanvas() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  // Reset color cache
  _lastR = -1; _lastG = -1; _lastB = -1; _lastA = -1;
  _lastH = -1; _lastS = -1; _lastL = -1;
}

// Color cache to avoid string allocation per fillText call
var _lastR = -1, _lastG = -1, _lastB = -1, _lastA = -1;
var _lastColorStr = '';
var _lastH = -1, _lastS = -1, _lastL = -1;
var _lastHSLStr = '';

function drawChar(ch, x, y, r, g, b, a) {
  if (ch === ' ') return;
  var ai = (a * 100 + 0.5) | 0; // quantize alpha to 2 decimal places
  if (r !== _lastR || g !== _lastG || b !== _lastB || ai !== _lastA) {
    _lastR = r; _lastG = g; _lastB = b; _lastA = ai;
    _lastColorStr = 'rgba(' + r + ',' + g + ',' + b + ',' + (ai * 0.01).toFixed(2) + ')';
  }
  ctx.fillStyle = _lastColorStr;
  ctx.fillText(ch, x * CHAR_W, NAV_H + y * CHAR_H);
}

function drawCharHSL(ch, x, y, h, s, l) {
  if (ch === ' ') return;
  var hi = h | 0, si = s | 0, li = l | 0;
  if (hi !== _lastH || si !== _lastS || li !== _lastL) {
    _lastH = hi; _lastS = si; _lastL = li;
    _lastHSLStr = 'hsl(' + hi + ',' + si + '%,' + li + '%)';
  }
  ctx.fillStyle = _lastHSLStr;
  ctx.fillText(ch, x * CHAR_W, NAV_H + y * CHAR_H);
}

function drawFancyLoading(label) {
  var W = COLS, H = ROWS;
  var cx = W / 2, cy = H / 2;
  var t = time;
  // Swirling character vortex
  var loadChars = '▓▒░█▄▀■□●○◆◇★☆';
  for (var i = 0; i < 40; i++) {
    var angle = t * 1.5 + i * 0.157;
    var radius = 4 + Math.sin(t * 0.8 + i * 0.3) * 3;
    var px = cx + Math.cos(angle) * radius;
    var py = cy + Math.sin(angle) * radius * 0.5;
    var ix = Math.round(px), iy = Math.round(py);
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
      var ch = loadChars[i % loadChars.length];
      var hue = (t * 60 + i * 25) % 360;
      var bright = 30 + Math.sin(t * 3 + i) * 15;
      drawCharHSL(ch, ix, iy, hue, 50, bright);
    }
  }
  // Pulsing dots
  var dots = '';
  for (var d = 0; d < 3; d++) dots += Math.sin(t * 4 + d * 1.2) > 0 ? '.' : ' ';
  var msg = '[ ' + label + dots + ' ]';
  ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.sin(t * 2) * 0.15).toFixed(2) + ')';
  ctx.textAlign = 'center';
  ctx.fillText(msg, cx * CHAR_W, NAV_H + (cy + 6) * CHAR_H);
  ctx.textAlign = 'left';
  // Scanning line
  var scanY = Math.round((Math.sin(t * 1.5) * 0.5 + 0.5) * H);
  for (var sx = 0; sx < W; sx++) {
    var b = Math.sin(sx * 0.2 + t * 5) * 0.5 + 0.5;
    if (b > 0.6) {
      var sci = Math.min(RAMP_DENSE.length - 1, (b * RAMP_DENSE.length) | 0);
      drawChar(RAMP_DENSE[sci], sx, scanY, 100, 100, 100, b * 0.3);
    }
  }
}

// ============================================================
// LAVA LAMP
// ============================================================

var blobs = [];
var NUM_BLOBS = 7;

function initBlobs() {
  blobs = [];
  lavaPointerDown = false;
  for (var i = 0; i < NUM_BLOBS; i++) {
    blobs.push({
      x: Math.random() * COLS,
      y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.5 + (i % 2 === 0 ? -0.15 : 0.15),
      r: 4 + Math.random() * 6,
      phase: Math.random() * Math.PI * 2
    });
  }
}
initBlobs();

var lavaColors = [
  [255,40,20], [255,100,40], [255,160,60], [255,200,100], [255,230,180]
];

// Interactive lava — click/touch to drop lava blobs
var lavaPointerDown = false;
var lavaPointerX = 0;
var lavaPointerY = 0;
var lavaPrevX = 0;
var lavaPrevY = 0;
var lavaSpawnTimer = 0;
var MAX_BLOBS = 80;

function screenToGrid(clientX, clientY) {
  return {
    gx: clientX / CHAR_W,
    gy: (clientY - NAV_H) / CHAR_H
  };
}

// ============================================================
// UNIVERSAL POINTER TRACKER
// ============================================================
var pointer = { down: false, x: 0, y: 0, gx: 0, gy: 0, clicked: false };

canvas.addEventListener('mousedown', function(e) {
  pointer.down = true; pointer.clicked = true;
  var g = screenToGrid(e.clientX, e.clientY);
  pointer.x = e.clientX; pointer.y = e.clientY;
  pointer.gx = g.gx; pointer.gy = g.gy;
});
canvas.addEventListener('mousemove', function(e) {
  var g = screenToGrid(e.clientX, e.clientY);
  pointer.x = e.clientX; pointer.y = e.clientY;
  pointer.gx = g.gx; pointer.gy = g.gy;
});
canvas.addEventListener('mouseup', function() { pointer.down = false; });
canvas.addEventListener('mouseleave', function() { pointer.down = false; });
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  pointer.down = true; pointer.clicked = true;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  pointer.x = t.clientX; pointer.y = t.clientY;
  pointer.gx = g.gx; pointer.gy = g.gy;
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  pointer.x = t.clientX; pointer.y = t.clientY;
  pointer.gx = g.gx; pointer.gy = g.gy;
}, { passive: true });
canvas.addEventListener('touchend', function() { pointer.down = false; });
canvas.addEventListener('touchcancel', function() { pointer.down = false; });

function spawnLavaBlob(gx, gy, dragVX, dragVY) {
  if (blobs.length >= MAX_BLOBS) {
    if (blobs.length > NUM_BLOBS) blobs.splice(NUM_BLOBS, 1);
  }
  var dvx = dragVX || 0, dvy = dragVY || 0;
  blobs.push({
    x: gx,
    y: gy,
    vx: dvx * 0.3 + (Math.random() - 0.5) * 0.4,
    vy: dvy * 0.3 + (Math.random() - 0.5) * 0.3 - 0.05,
    r: 2.5 + Math.random() * 3,
    phase: Math.random() * Math.PI * 2,
    spawned: time,
    life: 5 + Math.random() * 5
  });
}

canvas.addEventListener('mousedown', function(e) {
  if (currentMode !== 'lava') return;
  lavaPointerDown = true;
  var g = screenToGrid(e.clientX, e.clientY);
  lavaPointerX = g.gx; lavaPointerY = g.gy;
  lavaPrevX = g.gx; lavaPrevY = g.gy;
  spawnLavaBlob(g.gx, g.gy, 0, 0);
  lavaSpawnTimer = 0;
});

canvas.addEventListener('mousemove', function(e) {
  if (!lavaPointerDown || currentMode !== 'lava') return;
  var g = screenToGrid(e.clientX, e.clientY);
  // Interpolate between prev and current — spawn along the drag path
  var dx = g.gx - lavaPrevX, dy = g.gy - lavaPrevY;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 1.5) {
    var steps = Math.min(8, Math.ceil(dist / 1.5));
    for (var s = 0; s < steps; s++) {
      var t = s / steps;
      var ix = lavaPrevX + dx * t + (Math.random() - 0.5) * 1.5;
      var iy = lavaPrevY + dy * t + (Math.random() - 0.5) * 1;
      spawnLavaBlob(ix, iy, dx * 0.5, dy * 0.5);
    }
  }
  lavaPrevX = g.gx; lavaPrevY = g.gy;
  lavaPointerX = g.gx; lavaPointerY = g.gy;
});

canvas.addEventListener('mouseup', function() { lavaPointerDown = false; });
canvas.addEventListener('mouseleave', function() { lavaPointerDown = false; });

canvas.addEventListener('touchstart', function(e) {
  if (currentMode !== 'lava') return;
  e.preventDefault();
  lavaPointerDown = true;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  lavaPointerX = g.gx; lavaPointerY = g.gy;
  lavaPrevX = g.gx; lavaPrevY = g.gy;
  spawnLavaBlob(g.gx, g.gy, 0, 0);
  lavaSpawnTimer = 0;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  if (!lavaPointerDown || currentMode !== 'lava') return;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  var dx = g.gx - lavaPrevX, dy = g.gy - lavaPrevY;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 1.5) {
    var steps = Math.min(8, Math.ceil(dist / 1.5));
    for (var s = 0; s < steps; s++) {
      var tt = s / steps;
      var ix = lavaPrevX + dx * tt + (Math.random() - 0.5) * 1.5;
      var iy = lavaPrevY + dy * tt + (Math.random() - 0.5) * 1;
      spawnLavaBlob(ix, iy, dx * 0.5, dy * 0.5);
    }
  }
  lavaPrevX = g.gx; lavaPrevY = g.gy;
  lavaPointerX = g.gx; lavaPointerY = g.gy;
}, { passive: true });

canvas.addEventListener('touchend', function() { lavaPointerDown = false; });
canvas.addEventListener('touchcancel', function() { lavaPointerDown = false; });

function renderLava() {
  clearCanvas();

  // Continuous spawn while holding — drip effect
  if (lavaPointerDown) {
    lavaSpawnTimer += 1;
    if (lavaSpawnTimer % 3 === 0) {
      var jx = lavaPointerX + (Math.random() - 0.5) * 2;
      var jy = lavaPointerY + (Math.random() - 0.5) * 1.5;
      spawnLavaBlob(jx, jy, (Math.random() - 0.5) * 0.3, Math.random() * 0.2);
    }
  }

  // Update blobs — fade out spawned blobs over their lifetime
  var i = blobs.length;
  while (i--) {
    var b = blobs[i];
    b.x += b.vx + Math.sin(time * 0.4 + b.phase) * 0.15;
    b.y += b.vy + Math.cos(time * 0.3 + b.phase) * 0.1;
    b.r += Math.sin(time * 0.5 + b.phase) * 0.03;
    if (b.x < 2 || b.x > COLS - 2) { b.vx *= -0.9; b.x = Math.max(2, Math.min(COLS - 2, b.x)); }
    if (b.y < 2 || b.y > ROWS - 2) { b.vy *= -0.8; b.y = Math.max(2, Math.min(ROWS - 2, b.y)); }
    b.vx *= 0.995; b.vy *= 0.995;
    b.vy += Math.sin(time * 0.2 + b.phase * 2) * 0.008;
    // Spawned blobs fade out
    if (b.life !== undefined) {
      var age = time - b.spawned;
      if (age > b.life) { blobs.splice(i, 1); continue; }
      // Shrink radius as blob ages
      var lifeFrac = 1 - age / b.life;
      b.r = Math.max(0.5, b.r * (0.998 + lifeFrac * 0.002));
    }
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var sum = 0;
      var px = x * 0.55;
      for (var i = 0; i < blobs.length; i++) {
        var b = blobs[i];
        var dx = px - b.x * 0.55;
        var dy = y - b.y;
        var fade = 1;
        if (b.life !== undefined) {
          var age = time - b.spawned;
          fade = Math.max(0, 1 - age / b.life);
          if (fade < 0.01) continue;
        }
        sum += (b.r * b.r * fade) / (dx * dx + dy * dy + 0.1);
      }
      var t = sum * 0.15;
      if (t > 1) t = 1;
      if (t < 0.08) continue;
      var ci = Math.min(4, (t * 5) | 0);
      var c = lavaColors[ci];
      var ri = Math.min(RAMP_DENSE.length - 1, (t * RAMP_DENSE.length) | 0);
      drawChar(RAMP_DENSE[ri], x, y, c[0], c[1], c[2], 0.3 + t * 0.7);
    }
  }
}

// ============================================================
// RAIN
// ============================================================

var drops = [];
var MAX_DROPS = 180;

function initRain() {
  drops = [];
  for (var i = 0; i < MAX_DROPS; i++) {
    var d = {
      x: Math.floor(Math.random() * COLS),
      y: Math.random() * ROWS * 2 - ROWS,
      speed: 0.3 + Math.random() * 0.8,
      len: 4 + Math.floor(Math.random() * 12),
      chars: []
    };
    for (var j = 0; j < d.len; j++) {
      d.chars.push(String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96)));
    }
    drops.push(d);
  }
}
initRain();

// Rain interaction: click to attract drops toward cursor
var rainAttractX = -1, rainAttractY = -1;

function renderRain() {
  clearCanvas();

  // Click attracts drops
  if (pointer.down && currentMode === 'rain') {
    rainAttractX = pointer.gx; rainAttractY = pointer.gy;
  }

  var bright = new Float32Array(COLS * ROWS);
  var charGrid = new Array(COLS * ROWS);

  for (var i = 0; i < drops.length; i++) {
    var d = drops[i];
    d.y += d.speed;

    // Attract toward click point
    if (rainAttractX >= 0) {
      var dx = rainAttractX - d.x;
      var dist = Math.abs(dx);
      if (dist < 20) d.x += dx * 0.03;
    }

    if (d.y - d.len > ROWS) {
      d.y = -d.len;
      d.x = Math.floor(Math.random() * COLS);
      d.speed = 0.3 + Math.random() * 0.8;
    }
    if (Math.random() < 0.08) {
      d.chars[Math.floor(Math.random() * d.len)] = String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96));
    }
    for (var j = 0; j < d.len; j++) {
      var ty = (d.y - j) | 0;
      if (ty >= 0 && ty < ROWS && d.x >= 0 && d.x < COLS) {
        var fade = 1 - j / d.len;
        var idx = ty * COLS + (d.x | 0);
        if (idx >= 0 && idx < COLS * ROWS && fade > bright[idx]) {
          charGrid[idx] = d.chars[j];
          bright[idx] = fade;
        }
      }
    }
  }

  // Fade attraction
  if (!pointer.down) rainAttractX = -1;

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var idx = y * COLS + x;
      var b = bright[idx];
      if (b < 0.01) continue;
      var ch = charGrid[idx];
      if (b > 0.95) {
        drawChar(ch, x, y, 180, 255, 200, 1);
      } else {
        var g = (80 + b * 175) | 0;
        drawChar(ch, x, y, 0, g, (g * 0.4) | 0, 0.2 + b * 0.8);
      }
    }
  }
}

// ============================================================
// WAVES
// ============================================================

// Wave interaction: click to add wave centers
var waveCenters = [];

function renderWave() {
  clearCanvas();
  var phrase = 'textflow';

  if (pointer.clicked && currentMode === 'wave') {
    pointer.clicked = false;
    if (waveCenters.length > 5) waveCenters.shift();
    waveCenters.push({ x: pointer.gx, y: pointer.gy, born: time });
  }
  // Prune old wave centers
  var wi = waveCenters.length;
  while (wi--) { if (time - waveCenters[wi].born > 15) waveCenters.splice(wi, 1); }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var w1 = Math.sin(x * 0.08 - time * 1.2 + y * 0.15) * 0.5 + 0.5;
      var w2 = Math.sin(x * 0.12 + time * 0.8 - y * 0.1) * 0.5 + 0.5;
      var w3 = Math.sin((x + y) * 0.06 + time * 0.5) * 0.5 + 0.5;
      var ccx = x - COLS / 2, ccy = y - ROWS / 2;
      var w4 = Math.sin(Math.sqrt(ccx * ccx + ccy * ccy) * 0.12 - time * 1.5) * 0.5 + 0.5;

      var v = w1 * 0.35 + w2 * 0.25 + w3 * 0.2 + w4 * 0.2;

      // Add click-spawned wave centers
      for (var wc = 0; wc < waveCenters.length; wc++) {
        var cen = waveCenters[wc];
        var cdx = x - cen.x, cdy = y - cen.y;
        var cd = Math.sqrt(cdx * cdx + cdy * cdy);
        var age = time - cen.born;
        var fade = Math.max(0, 1 - age / 15);
        v += Math.sin(cd * 0.25 - time * 2) * 0.3 * fade * Math.exp(-cd * 0.03);
      }

      v = Math.pow(Math.max(0, v), 1.2);
      if (v < 0.15) continue;

      var ci = ((x + time * 8) | 0) % phrase.length;
      if (ci < 0) ci += phrase.length;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      var ch = v > 0.6 ? phrase[ci] : RAMP_SOFT[ri];

      var hue = (x * 2.5 + y * 1.5 + time * 30) % 360;
      var sat = 60 + v * 40;
      var lit = 30 + v * 50;
      drawCharHSL(ch, x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// FIRE
// ============================================================

var fireBuffer;
function initFire() {
  fireBuffer = new Float32Array(COLS * (ROWS + 2));
}
initFire();

var fireColors = [
  [20,5,0], [80,15,0], [180,40,0], [220,90,10],
  [255,150,20], [255,200,60], [255,240,150], [255,255,220]
];

function renderFire() {
  clearCanvas();
  var W = COLS, H = ROWS + 2;

  if (!fireBuffer || fireBuffer.length !== W * H) {
    fireBuffer = new Float32Array(W * H);
  }

  // Click to add fire fuel at cursor
  if (pointer.down && currentMode === 'fire') {
    var fx = pointer.gx | 0, fy = (pointer.gy | 0);
    for (var fdx = -3; fdx <= 3; fdx++) {
      for (var fdy = -2; fdy <= 2; fdy++) {
        var nx = fx + fdx, ny = fy + fdy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          fireBuffer[ny * W + nx] = 0.9 + Math.random() * 0.1;
        }
      }
    }
  }

  for (var x = 0; x < W; x++) {
    fireBuffer[(H - 1) * W + x] = Math.random() > 0.4 ? 0.8 + Math.random() * 0.2 : Math.random() * 0.3;
  }

  for (var y = 0; y < H - 1; y++) {
    for (var x = 0; x < W; x++) {
      var y1 = y + 1;
      var y2 = Math.min(H - 1, y + 2);
      var xl = x > 0 ? x - 1 : 0;
      var xr = x < W - 1 ? x + 1 : W - 1;
      var v = (fireBuffer[y1 * W + x] + fireBuffer[y1 * W + xl] + fireBuffer[y1 * W + xr] + fireBuffer[y2 * W + x]) * 0.25;
      v = v * (0.97 - Math.random() * 0.02) - 0.008;
      fireBuffer[y * W + x] = v > 0 ? v : 0;
    }
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < W; x++) {
      var v = fireBuffer[y * W + x];
      if (v < 0.05) continue;
      var ci = Math.min(7, (v * 8) | 0);
      var c = fireColors[ci];
      var ri = Math.min(RAMP_FIRE.length - 1, (v * RAMP_FIRE.length) | 0);
      drawChar(RAMP_FIRE[ri], x, y, c[0], c[1], c[2], 0.3 + v * 0.7);
    }
  }
}

// ============================================================
// PLASMA
// ============================================================

// Plasma interaction: cursor becomes extra focal point
function renderPlasma() {
  clearCanvas();

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var v1 = Math.sin(x * 0.06 + time * 0.7);
      var v2 = Math.sin(y * 0.09 + time * 0.5);
      var v3 = Math.sin((x + y) * 0.05 + time * 0.4);
      var pcx = x - COLS / 2, pcy = y - ROWS / 2;
      var v4 = Math.sin(Math.sqrt(pcx * pcx + pcy * pcy) * 0.1 - time * 0.8);
      var v5 = Math.sin(x * 0.04 * Math.sin(time * 0.2) + y * 0.05 * Math.cos(time * 0.15));

      var v = (v1 + v2 + v3 + v4 + v5) * 0.1 + 0.5;

      // Pointer adds plasma focal point
      if (pointer.down && currentMode === 'plasma') {
        var pdx = x - pointer.gx, pdy = y - pointer.gy;
        var pd = Math.sqrt(pdx * pdx + pdy * pdy);
        v += Math.sin(pd * 0.2 - time * 2) * 0.3 * Math.exp(-pd * 0.02);
      }

      if (v < 0.1) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (v * 270 + x * 1.5 + time * 30) % 360;
      var sat = 70 + v * 30;
      var lit = 20 + v * 55;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// GAME OF LIFE
// ============================================================

var lifeA, lifeB, lifeAge;
var LIFE_CHARS = ' .,:;+*oO#@';

function initLife() {
  var sz = COLS * ROWS;
  lifeA = new Uint8Array(sz);
  lifeB = new Uint8Array(sz);
  lifeAge = new Float32Array(sz);
  // Random seed — ~30% alive
  for (var i = 0; i < sz; i++) {
    lifeA[i] = Math.random() < 0.3 ? 1 : 0;
  }
}
initLife();

var lifeTickAccum = 0;

function renderLife() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var sz = W * H;

  if (!lifeA || lifeA.length !== sz) initLife();

  // Click to paint alive cells
  if (pointer.down && currentMode === 'life') {
    var lx = pointer.gx | 0, ly = pointer.gy | 0;
    for (var ldy = -2; ldy <= 2; ldy++) {
      for (var ldx = -2; ldx <= 2; ldx++) {
        var lnx = (lx + ldx + W) % W, lny = (ly + ldy + H) % H;
        lifeA[lny * W + lnx] = 1;
        lifeAge[lny * W + lnx] = 0.8;
      }
    }
  }

  lifeTickAccum += 1;
  // Step every 6 frames (~10 generations/sec at 60fps)
  if (lifeTickAccum >= 6) {
    lifeTickAccum = 0;
    // Count neighbours and produce next gen
    for (var y = 0; y < H; y++) {
      for (var x = 0; x < W; x++) {
        var n = 0;
        for (var dy = -1; dy <= 1; dy++) {
          for (var dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            var ny = (y + dy + H) % H;
            var nx = (x + dx + W) % W;
            n += lifeA[ny * W + nx];
          }
        }
        var idx = y * W + x;
        var alive = lifeA[idx];
        if (alive) {
          lifeB[idx] = (n === 2 || n === 3) ? 1 : 0;
        } else {
          lifeB[idx] = (n === 3) ? 1 : 0;
        }
        // Track age for color
        if (lifeB[idx]) {
          lifeAge[idx] = Math.min(lifeAge[idx] + 0.15, 1);
        } else {
          lifeAge[idx] = Math.max(lifeAge[idx] - 0.08, 0);
        }
      }
    }
    // Swap buffers
    var tmp = lifeA; lifeA = lifeB; lifeB = tmp;

    // Inject random cells to prevent stagnation
    if (Math.random() < 0.05) {
      var rx = Math.floor(Math.random() * (W - 10)) + 5;
      var ry = Math.floor(Math.random() * (H - 10)) + 5;
      // Glider
      var pat = [[0,0],[1,0],[2,0],[2,-1],[1,-2]];
      for (var p = 0; p < pat.length; p++) {
        var pi = ((ry + pat[p][1] + H) % H) * W + ((rx + pat[p][0]) % W);
        lifeA[pi] = 1;
      }
    }
  }

  // Render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      var age = lifeAge[idx];
      if (age < 0.01) continue;
      var ci = Math.min(LIFE_CHARS.length - 1, (age * LIFE_CHARS.length) | 0);
      var hue = (age * 120 + time * 20) % 360;
      drawCharHSL(LIFE_CHARS[ci], x, y, hue, 70 + age * 30, 30 + age * 45);
    }
  }
}

// ============================================================
// WARP — Star tunnel
// ============================================================

var stars = [];
var NUM_STARS = 400;

function initWarp() {
  stars = [];
  for (var i = 0; i < NUM_STARS; i++) {
    stars.push({
      x: (Math.random() - 0.5) * 2,
      y: (Math.random() - 0.5) * 2,
      z: Math.random()
    });
  }
}
initWarp();

var WARP_CHARS = '.,+*oO0#@';

// Warp interaction: click to shift tunnel center
var warpCX, warpCY;
function renderWarp() {
  clearCanvas();
  var cx = COLS / 2;
  var cy = ROWS / 2;

  // Click moves the warp center
  if (pointer.down && currentMode === 'warp') {
    warpCX = pointer.gx; warpCY = pointer.gy;
  }
  if (warpCX !== undefined) {
    cx = cx * 0.95 + warpCX * 0.05;
    cy = cy * 0.95 + warpCY * 0.05;
    warpCX = cx; warpCY = cy;
  }
  var speed = 0.008;

  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    s.z -= speed;
    if (s.z <= 0.001) {
      s.x = (Math.random() - 0.5) * 2;
      s.y = (Math.random() - 0.5) * 2;
      s.z = 1;
    }

    // Project
    var sx = (s.x / s.z) * cx * 0.8 + cx;
    var sy = (s.y / s.z) * cy * 0.8 + cy;

    if (sx < 0 || sx >= COLS || sy < 0 || sy >= ROWS) {
      s.z = 0; // Will reset next frame
      continue;
    }

    var bright = 1 - s.z;
    var ci = Math.min(WARP_CHARS.length - 1, (bright * WARP_CHARS.length) | 0);

    // Trail — draw a few chars behind
    var psx = (s.x / (s.z + speed * 3)) * cx * 0.8 + cx;
    var psy = (s.y / (s.z + speed * 3)) * cy * 0.8 + cy;
    var dx = sx - psx;
    var dy = sy - psy;
    var len = Math.sqrt(dx * dx + dy * dy);
    var steps = Math.min(4, (len) | 0);

    for (var j = 0; j <= steps; j++) {
      var t = j / (steps + 1);
      var tx = (sx - dx * t) | 0;
      var ty = (sy - dy * t) | 0;
      if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS) {
        var fade = bright * (1 - t * 0.6);
        var b = (180 + fade * 75) | 0;
        drawChar(WARP_CHARS[ci], tx, ty, b, b, (200 + fade * 55) | 0, 0.3 + fade * 0.7);
      }
    }
  }
}

// SWIRL — Particle vortex with dual attractors
// ============================================================

var swirlParts = [];
var NUM_SWIRL = 300;
var attractor1 = { x: 0, y: 0 };
var attractor2 = { x: 0, y: 0 };

function initSwirl() {
  swirlParts = [];
  for (var i = 0; i < NUM_SWIRL; i++) {
    swirlParts.push({
      x: Math.random() * COLS,
      y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      life: Math.random(),
      ch: RAMP_DENSE[Math.floor(Math.random() * RAMP_DENSE.length)]
    });
  }
}
initSwirl();

// Swirl interaction: click to add a third attractor at cursor
var swirlClickAttr = null;
function renderSwirl() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Animate attractors in orbits
  attractor1.x = W * 0.5 + Math.cos(time * 0.4) * W * 0.25;
  attractor1.y = H * 0.5 + Math.sin(time * 0.6) * H * 0.3;
  attractor2.x = W * 0.5 + Math.cos(time * 0.3 + 2) * W * 0.3;
  attractor2.y = H * 0.5 + Math.sin(time * 0.5 + 2) * H * 0.25;

  // Click creates a strong temporary attractor
  if (pointer.down && currentMode === 'swirl') {
    swirlClickAttr = { x: pointer.gx, y: pointer.gy };
  }
  if (!pointer.down) swirlClickAttr = null;

  // Density field for rendering
  var density = new Float32Array(W * H);

  for (var i = 0; i < swirlParts.length; i++) {
    var p = swirlParts[i];

    // Gravity toward attractors with tangential component (swirl)
    var dx1 = attractor1.x - p.x, dy1 = attractor1.y - p.y;
    var d1 = Math.sqrt(dx1 * dx1 + dy1 * dy1) + 1;
    var f1 = 2.0 / d1;
    // Tangential = perpendicular to radial
    p.vx += (dx1 / d1 * f1 - dy1 / d1 * f1 * 0.8) * 0.02;
    p.vy += (dy1 / d1 * f1 + dx1 / d1 * f1 * 0.8) * 0.02;

    var dx2 = attractor2.x - p.x, dy2 = attractor2.y - p.y;
    var d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) + 1;
    var f2 = 1.5 / d2;
    p.vx += (dx2 / d2 * f2 + dy2 / d2 * f2 * 0.6) * 0.02;
    p.vy += (dy2 / d2 * f2 - dx2 / d2 * f2 * 0.6) * 0.02;

    // Click attractor
    if (swirlClickAttr) {
      var dx3 = swirlClickAttr.x - p.x, dy3 = swirlClickAttr.y - p.y;
      var d3 = Math.sqrt(dx3 * dx3 + dy3 * dy3) + 1;
      var f3 = 4.0 / d3;
      p.vx += (dx3 / d3 * f3 - dy3 / d3 * f3 * 1.2) * 0.02;
      p.vy += (dy3 / d3 * f3 + dx3 / d3 * f3 * 1.2) * 0.02;
    }

    // Damping
    p.vx *= 0.98;
    p.vy *= 0.98;

    // Speed limit
    var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > 2) { p.vx = p.vx / spd * 2; p.vy = p.vy / spd * 2; }

    p.x += p.vx;
    p.y += p.vy;

    // Wrap
    if (p.x < 0) p.x += W; if (p.x >= W) p.x -= W;
    if (p.y < 0) p.y += H; if (p.y >= H) p.y -= H;

    // Splat onto density field (3x3)
    var gx = p.x | 0, gy = p.y | 0;
    for (var sy = -1; sy <= 1; sy++) {
      for (var sx = -1; sx <= 1; sx++) {
        var nx = (gx + sx + W) % W;
        var ny = (gy + sy + H) % H;
        var dist = Math.abs(sx) + Math.abs(sy);
        var w = dist === 0 ? 1.0 : (dist === 1 ? 0.4 : 0.15);
        density[ny * W + nx] += w * (0.5 + spd * 0.3);
      }
    }
  }

  // Render density field
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = density[y * W + x];
      if (v < 0.1) continue;
      v = Math.min(v * 0.3, 1);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (Math.atan2(y - H / 2, x - W / 2) * 57.3 + time * 40 + 360) % 360;
      var sat = 60 + v * 40;
      var lit = 25 + v * 50;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

    54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,
    3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,
    170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,

    78,66,215,61,156,180];
  for(var i=0;i<256;i++) perm[i]=perm[i+256]=p[i];
})();

function simplex2(xin,yin){
  var F2=0.5*(Math.sqrt(3)-1), G2=(3-Math.sqrt(3))/6;
  var s=(xin+yin)*F2, i=Math.floor(xin+s), j=Math.floor(yin+s);
  var t=(i+j)*G2, x0=xin-(i-t), y0=yin-(j-t);
  var i1=x0>y0?1:0, j1=x0>y0?0:1;
  var x1=x0-i1+G2, y1=y0-j1+G2, x2=x0-1+2*G2, y2=y0-1+2*G2;
  var ii=i&255, jj=j&255;
  var n0=0,n1=0,n2=0;
  var t0=0.5-x0*x0-y0*y0;
  if(t0>0){t0*=t0;var gi=perm[ii+perm[jj]]%12;n0=t0*t0*(grad3[gi][0]*x0+grad3[gi][1]*y0);}
  var t1=0.5-x1*x1-y1*y1;
  if(t1>0){t1*=t1;var gi1=perm[ii+i1+perm[jj+j1]]%12;n1=t1*t1*(grad3[gi1][0]*x1+grad3[gi1][1]*y1);}
  var t2=0.5-x2*x2-y2*y2;
  if(t2>0){t2*=t2;var gi2=perm[ii+1+perm[jj+1]]%12;n2=t2*t2*(grad3[gi2][0]*x2+grad3[gi2][1]*y2);}
  return 70*(n0+n1+n2);
}

function fbm(x,y,oct){
  var v=0,a=0.5,f=1;
  for(var i=0;i<oct;i++){v+=a*simplex2(x*f,y*f);a*=0.5;f*=2;}
  return v;
}

// ============================================================
// RIFT — Reaction-Diffusion (Gray-Scott)
// ============================================================

var riftU, riftV, riftUNew, riftVNew;

function initRift() {
  var sz = COLS * ROWS;
  riftU = new Float32Array(sz);
  riftV = new Float32Array(sz);
  riftUNew = new Float32Array(sz);
  riftVNew = new Float32Array(sz);
  for (var i = 0; i < sz; i++) { riftU[i] = 1; riftV[i] = 0; }
  // Seed several spots
  for (var s = 0; s < 8; s++) {
    var cx = Math.floor(Math.random() * (COLS - 20)) + 10;
    var cy = Math.floor(Math.random() * (ROWS - 10)) + 5;
    for (var dy = -3; dy <= 3; dy++) {
      for (var dx = -3; dx <= 3; dx++) {
        var nx = cx + dx, ny = cy + dy;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
          var idx = ny * COLS + nx;
          riftU[idx] = 0.5 + Math.random() * 0.1;
          riftV[idx] = 0.25 + Math.random() * 0.1;
        }
      }
    }
  }
}
initRift();

function renderRift() {
  clearCanvas();
  var W = COLS, H = ROWS, sz = W * H;
  if (!riftU || riftU.length !== sz) initRift();

  // Click to seed new reaction spots
  if (pointer.clicked && currentMode === 'rift') {
    pointer.clicked = false;
    var rx = pointer.gx | 0, ry = pointer.gy | 0;
    for (var rdy = -4; rdy <= 4; rdy++) {
      for (var rdx = -4; rdx <= 4; rdx++) {
        var rnx = rx + rdx, rny = ry + rdy;
        if (rnx >= 0 && rnx < W && rny >= 0 && rny < H) {
          var ridx = rny * W + rnx;
          riftU[ridx] = 0.5 + Math.random() * 0.1;
          riftV[ridx] = 0.25 + Math.random() * 0.1;
        }
      }
    }
  }

  var Du = 0.16, Dv = 0.08, f = 0.055, k = 0.062, dt = 1.0;
  if (!riftUNew || riftUNew.length !== sz) { riftUNew = new Float32Array(sz); riftVNew = new Float32Array(sz); }

  for (var step = 0; step < 8; step++) {
    for (var y = 1; y < H - 1; y++) {
      for (var x = 1; x < W - 1; x++) {
        var idx = y * W + x;
        var u = riftU[idx], v = riftV[idx];
        var lapU = riftU[idx-1] + riftU[idx+1] + riftU[idx-W] + riftU[idx+W] - 4*u;
        var lapV = riftV[idx-1] + riftV[idx+1] + riftV[idx-W] + riftV[idx+W] - 4*v;
        var uvv = u * v * v;
        riftUNew[idx] = u + (Du * lapU - uvv + f * (1 - u)) * dt;
        riftVNew[idx] = v + (Dv * lapV + uvv - (f + k) * v) * dt;
      }
    }
    var tmp = riftU; riftU = riftUNew; riftUNew = tmp;
    tmp = riftV; riftV = riftVNew; riftVNew = tmp;
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = riftV[y * W + x];
      if (v < 0.05) continue;
      var t = Math.min(v * 4, 1);
      var ri = Math.min(RAMP_DENSE.length - 1, (t * RAMP_DENSE.length) | 0);
      var hue = (200 + t * 60 + time * 10) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 70 + t * 30, 25 + t * 50);
    }
  }
}

var voronoiSeeds = [];
var NUM_VORONOI = 18;

function initVoronoi() {
  voronoiSeeds = [];
  for (var i = 0; i < NUM_VORONOI; i++) {
    voronoiSeeds.push({
      x: Math.random() * COLS, y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
      hue: (i * 137.508) % 360
    });
  }
}
initVoronoi();

function renderVoronoi() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Click to add new seed points
  if (pointer.clicked && currentMode === 'voronoi') {
    pointer.clicked = false;
    voronoiSeeds.push({
      x: pointer.gx, y: pointer.gy,
      vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
      hue: (Math.random() * 360) | 0
    });
    if (voronoiSeeds.length > 40) voronoiSeeds.shift();
  }

  // Move seeds
  for (var i = 0; i < voronoiSeeds.length; i++) {
    var s = voronoiSeeds[i];
    s.x += s.vx + Math.sin(time * 0.3 + i) * 0.1;
    s.y += s.vy + Math.cos(time * 0.4 + i * 1.5) * 0.08;
    if (s.x < 0 || s.x >= W) s.vx *= -1;
    if (s.y < 0 || s.y >= H) s.vy *= -1;
    s.x = Math.max(0, Math.min(W - 1, s.x));
    s.y = Math.max(0, Math.min(H - 1, s.y));
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var d1 = 1e9, d2 = 1e9, ci = 0;
      var px = x * 0.55; // aspect correction
      for (var i = 0; i < voronoiSeeds.length; i++) {
        var dx = px - voronoiSeeds[i].x * 0.55;
        var dy = y - voronoiSeeds[i].y;
        var d = dx * dx + dy * dy;
        if (d < d1) { d2 = d1; d1 = d; ci = i; }
        else if (d < d2) { d2 = d; }
      }
      var edge = Math.sqrt(d2) - Math.sqrt(d1);
      if (edge > 8) continue;
      var v = edge < 1.5 ? 1 : Math.max(0, 1 - (edge - 1.5) / 6.5);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = voronoiSeeds[ci].hue;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 60 + v * 40, 20 + v * 55);
    }
  }
}

var boltGrid, boltAge;
var boltBranches = [];

function initBolt() {
  var sz = COLS * ROWS;
  boltGrid = new Float32Array(sz);
  boltAge = new Float32Array(sz);
  boltBranches = [];
}
initBolt();

var boltTimer = 0;

function renderBolt() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!boltGrid || boltGrid.length !== W * H) initBolt();

  boltTimer += 1;

  // Click to spawn bolt at cursor position
  if (pointer.clicked && currentMode === 'bolt') {
    pointer.clicked = false;
    var bsx = pointer.gx;
    var bsy = pointer.gy;
    var numB = 3 + Math.floor(Math.random() * 3);
    for (var bb = 0; bb < numB; bb++) {
      boltBranches.push({ x: bsx + (Math.random() - 0.5) * 4, y: bsy, life: 30 + Math.random() * 30 });
    }
  }

  // Spawn new bolt periodically
  if (boltTimer > 30 || boltBranches.length === 0) {
    boltTimer = 0;
    var sx = Math.floor(Math.random() * (W - 10)) + 5;
    var numBranches = 2 + Math.floor(Math.random() * 3);
    for (var b = 0; b < numBranches; b++) {
      boltBranches.push({ x: sx + (Math.random() - 0.5) * 6, y: 0, life: 40 + Math.random() * 30 });
    }
  }

  // Grow branches
  var newBranches = [];
  for (var i = 0; i < boltBranches.length; i++) {
    var br = boltBranches[i];
    if (br.life <= 0 || br.y >= H) continue;
    br.life--;

    // Move downward with jitter
    br.x += (Math.random() - 0.5) * 2.5;
    br.y += 0.5 + Math.random() * 1.5;

    var gx = Math.floor(br.x), gy = Math.floor(br.y);
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      boltGrid[gy * W + gx] = 1;
      boltAge[gy * W + gx] = 1;
      // Thicken
      if (gx > 0) { boltGrid[gy * W + gx - 1] = 0.5; boltAge[gy * W + gx - 1] = Math.max(boltAge[gy * W + gx - 1], 0.7); }
      if (gx < W-1) { boltGrid[gy * W + gx + 1] = 0.5; boltAge[gy * W + gx + 1] = Math.max(boltAge[gy * W + gx + 1], 0.7); }
    }

    // Branch
    if (Math.random() < 0.08 && br.life > 10) {
      newBranches.push({ x: br.x + (Math.random() - 0.5) * 3, y: br.y, life: br.life * 0.5 });
    }

    boltBranches[i] = br;
  }
  for (var i = 0; i < newBranches.length; i++) boltBranches.push(newBranches[i]);
  // Prune dead
  boltBranches = boltBranches.filter(function(b) { return b.life > 0 && b.y < H; });

  // Decay and render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      var v = boltAge[idx];
      if (v < 0.01) continue;
      boltAge[idx] *= 0.96;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var b = (150 + v * 105) | 0;
      drawChar(RAMP_DENSE[ri], x, y, (100 + v * 55) | 0, (150 + v * 105) | 0, 255, 0.2 + v * 0.8);
    }
  }
}

// Moire interaction: cursor becomes a focal point
function renderMoire() {
  clearCanvas();
  var W = COLS, H = ROWS;
  // Three focal points orbiting
  var f1x = W * 0.5 + Math.cos(time * 0.3) * W * 0.3;
  var f1y = H * 0.5 + Math.sin(time * 0.4) * H * 0.3;
  var f2x = W * 0.5 + Math.cos(time * 0.37 + 2) * W * 0.25;
  var f2y = H * 0.5 + Math.sin(time * 0.29 + 2) * H * 0.35;
  var f3x, f3y;
  // Cursor replaces third focal point when active
  if (pointer.down && currentMode === 'moire') {
    f3x = pointer.gx; f3y = pointer.gy;
  } else {
    f3x = W * 0.5 + Math.sin(time * 0.23 + 4) * W * 0.35;
    f3y = H * 0.5 + Math.cos(time * 0.31 + 4) * H * 0.25;
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var px = x * 0.55;
      var dx1 = px - f1x * 0.55, dy1 = y - f1y;
      var dx2 = px - f2x * 0.55, dy2 = y - f2y;
      var dx3 = px - f3x * 0.55, dy3 = y - f3y;
      var d1 = Math.sqrt(dx1*dx1 + dy1*dy1);
      var d2 = Math.sqrt(dx2*dx2 + dy2*dy2);
      var d3 = Math.sqrt(dx3*dx3 + dy3*dy3);

      var v = Math.sin(d1 * 0.3 + time) + Math.sin(d2 * 0.31 - time * 0.7) + Math.sin(d3 * 0.29 + time * 0.5);
      v = (v + 3) / 6; // normalize 0-1

      if (v < 0.15 || v > 0.85) continue; // show only the interference bands
      var band = Math.abs(v - 0.5) * 2;
      band = 1 - band; // invert: brightest at edges of bands

      var ri = Math.min(RAMP_SOFT.length - 1, (band * RAMP_SOFT.length) | 0);
      drawChar(RAMP_SOFT[ri], x, y, 0, (100 + band * 155) | 0, (50 + band * 50) | 0, 0.3 + band * 0.7);
    }
  }
}

// ============================================================
// FOLD — Domain Warping (nested fBm)
// ============================================================

// Fold interaction: cursor distorts the domain warp
function renderFold() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var sc = 0.03;

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var px = x * sc, py = y * sc;

      // Cursor distortion
      var foldWarp = 0;
      if (pointer.down && currentMode === 'fold') {
        var fdx = x - pointer.gx, fdy = y - pointer.gy;
        var fd = Math.sqrt(fdx * fdx + fdy * fdy);
        if (fd < 20) foldWarp = (1 - fd / 20) * 2;
      }

      // Nested domain warping
      var q1 = fbm(px + time * 0.1 + foldWarp, py + time * 0.05, 4);
      var q2 = fbm(px + 5.2 + time * 0.08, py + 1.3 + foldWarp, 4);
      var r1 = fbm(px + 4 * q1 + 1.7 + time * 0.06, py + 4 * q2 + 9.2, 4);
      var r2 = fbm(px + 4 * q1 + 8.3, py + 4 * q2 + 2.8 + time * 0.07, 4);
      var v = fbm(px + 4 * r1, py + 4 * r2, 3);

      v = v * 0.5 + 0.5; // normalize
      if (v < 0.1) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (v * 60 + 20) % 360; // amber range
      var sat = 60 + v * 40;
      var lit = 15 + v * 50;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// COPPER — Demoscene Raster Bars
// ============================================================

var copperMsg = '  TEXTFLOW  --  ASCII EXPERIMENTS  --  SEBLAND.COM  --  ';

// Copper interaction: click adds a bar pinned to cursor Y
var copperExtraBars = [];
function renderCopper() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var numBars = 7;
  var barHues = [0, 30, 60, 180, 210, 280, 330];
  var scrollX = time * 12;

  if (pointer.clicked && currentMode === 'copper') {
    pointer.clicked = false;
    if (copperExtraBars.length > 5) copperExtraBars.shift();
    copperExtraBars.push({ y: pointer.gy, hue: (Math.random() * 360) | 0, born: time });
  }

  for (var y = 0; y < H; y++) {
    // Sum bar contributions
    var totalV = 0;
    var bestHue = 0, bestV = 0;

    // Extra click-spawned bars
    for (var eb = 0; eb < copperExtraBars.length; eb++) {
      var ebar = copperExtraBars[eb];
      var eAge = time - ebar.born;
      if (eAge > 20) { copperExtraBars.splice(eb, 1); eb--; continue; }
      var eFade = Math.max(0, 1 - eAge / 20);
      var eDist = Math.abs(y - (ebar.y + Math.sin(time * 0.8 + eb) * 3));
      if (eDist < 3) {
        var ev = (1 - eDist / 3) * eFade;
        totalV += ev;
        if (ev > bestV) { bestV = ev; bestHue = ebar.hue; }
      }
    }

    for (var b = 0; b < numBars; b++) {
      var barY = H * 0.5 + Math.sin(time * (0.5 + b * 0.15) + b * 1.2) * H * 0.35;
      var dist = Math.abs(y - barY);
      var halfH = 2.5 + Math.sin(time * 0.3 + b) * 0.5;
      if (dist > halfH) continue;
      var v = 1 - (dist / halfH);
      v = v * v;
      totalV += v;
      if (v > bestV) { bestV = v; bestHue = barHues[b]; }
    }

    if (totalV < 0.05) continue;
    totalV = Math.min(totalV, 1);

    for (var x = 0; x < W; x++) {
      var ci = ((x + scrollX) | 0) % copperMsg.length;
      if (ci < 0) ci += copperMsg.length;
      var ch = copperMsg[ci];
      if (ch === ' ') continue;

      var lit = 30 + totalV * 55;
      if (totalV > 0.8) lit = 50 + totalV * 45; // hot overlap
      drawCharHSL(ch, x, y, bestHue, 70 + totalV * 30, lit);
    }
  }
}

// ============================================================
// GLITCH — Digital Corruption
// ============================================================

var glitchBase = [];
var glitchStrips = [];
var glitchEvent = 0;

function initGlitch() {
  glitchBase = [];
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!?<>{}[]=/+-~';
  for (var y = 0; y < ROWS; y++) {
    var row = [];
    for (var x = 0; x < COLS; x++) {
      row.push(chars[Math.floor(Math.random() * chars.length)]);
    }
    glitchBase.push(row);
  }
  glitchStrips = [];
  glitchEvent = 0;
}
initGlitch();

function renderGlitch() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!glitchBase.length || glitchBase.length !== H || glitchBase[0].length !== W) initGlitch();

  // Slowly scroll base text
  if (Math.random() < 0.02) {
    var row = [];
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!?<>{}[]=/+-~';
    for (var x = 0; x < W; x++) row.push(chars[Math.floor(Math.random() * chars.length)]);
    glitchBase.push(row);
    glitchBase.shift();
  }

  // Click to force glitch at cursor
  if (pointer.clicked && currentMode === 'glitch') {
    pointer.clicked = false;
    glitchEvent = 10 + Math.floor(Math.random() * 10);
    glitchStrips = [];
    var gy = pointer.gy | 0;
    for (var gs = 0; gs < 3 + Math.floor(Math.random() * 4); gs++) {
      glitchStrips.push({
        y: gy + gs * 2 - 3,
        h: 1 + Math.floor(Math.random() * 3),
        offset: Math.floor((pointer.gx - COLS / 2) * 0.5 + (Math.random() - 0.5) * 10),
        color: Math.floor(Math.random() * 3)
      });
    }
  }

  // Trigger glitch events
  glitchEvent--;
  if (glitchEvent <= 0 && Math.random() < 0.06) {
    glitchEvent = 5 + Math.floor(Math.random() * 12);
    glitchStrips = [];
    var numStrips = 1 + Math.floor(Math.random() * 4);
    for (var s = 0; s < numStrips; s++) {
      glitchStrips.push({
        y: Math.floor(Math.random() * H),
        h: 1 + Math.floor(Math.random() * 4),
        offset: Math.floor((Math.random() - 0.5) * 15),
        color: Math.floor(Math.random() * 3) // 0=cyan, 1=magenta, 2=red
      });
    }
  }

  var glitching = glitchEvent > 0;

  for (var y = 0; y < H; y++) {
    var strip = null;
    if (glitching) {
      for (var s = 0; s < glitchStrips.length; s++) {
        if (y >= glitchStrips[s].y && y < glitchStrips[s].y + glitchStrips[s].h) {
          strip = glitchStrips[s];
          break;
        }
      }
    }

    for (var x = 0; x < W; x++) {
      var sx = x, sy = y;
      var r = 120, g = 130, b = 140;

      if (strip) {
        sx = (x + strip.offset + W) % W;
        if (strip.color === 0) { r = 0; g = 255; b = 255; }
        else if (strip.color === 1) { r = 255; g = 0; b = 255; }
        else { r = 255; g = 50; b = 50; }
      }

      // Static noise
      if (Math.random() < 0.015) {
        var chars = '@#$%!?*';
        drawChar(chars[Math.floor(Math.random() * chars.length)], x, y, 255, 255, 255, 0.3 + Math.random() * 0.5);
        continue;
      }

      if (sy < glitchBase.length && sx < glitchBase[0].length) {
        var ch = glitchBase[sy][sx];
        var alpha = strip ? 0.7 + Math.random() * 0.3 : 0.15 + Math.random() * 0.1;
        drawChar(ch, x, y, r, g, b, alpha);
      }
    }
  }

  // Block corruption
  if (glitching && Math.random() < 0.3) {
    var bx = Math.floor(Math.random() * (W - 8));
    var by = Math.floor(Math.random() * (H - 4));
    var bch = '#@$%'[Math.floor(Math.random() * 4)];
    for (var dy = 0; dy < 3; dy++) {
      for (var dx = 0; dx < 6 + Math.floor(Math.random() * 8); dx++) {
        if (bx + dx < W && by + dy < H)
          drawChar(bch, bx + dx, by + dy, 255, 0, 255, 0.6 + Math.random() * 0.4);
      }
    }
  }
}

// ============================================================
// FLOCK — Boids Swarm with Trails
// ============================================================

var boids = [];
var NUM_BOIDS = 250;
var flockTrail;

function initFlock() {
  boids = [];
  for (var i = 0; i < NUM_BOIDS; i++) {
    boids.push({
      x: Math.random() * COLS, y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2
    });
  }
  flockTrail = new Float32Array(COLS * ROWS);
}
initFlock();

function renderFlock() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!flockTrail || flockTrail.length !== W * H) initFlock();

  // Decay trails
  for (var i = 0; i < flockTrail.length; i++) flockTrail[i] *= 0.93;

  // Update boids
  for (var i = 0; i < boids.length; i++) {
    var b = boids[i];
    var sx = 0, sy = 0, ax = 0, ay = 0, cx = 0, cy = 0;
    var sc = 0, ac = 0, cc = 0;

    // Click attracts flock toward cursor
    if (pointer.down && currentMode === 'flock') {
      var fdx = pointer.gx - b.x, fdy = pointer.gy - b.y;
      var fd = Math.sqrt(fdx * fdx + fdy * fdy) + 1;
      b.vx += fdx / fd * 0.15; b.vy += fdy / fd * 0.15;
    }

    for (var j = 0; j < boids.length; j += 3) { // sample every 3rd for perf
      if (i === j) continue;
      var o = boids[j];
      var dx = o.x - b.x, dy = o.y - b.y;
      var d = dx * dx + dy * dy;
      if (d < 9 && d > 0) { sx -= dx / d; sy -= dy / d; sc++; } // separation
      if (d < 64) { ax += o.vx; ay += o.vy; ac++; } // alignment
      if (d < 144) { cx += dx; cy += dy; cc++; } // cohesion
    }

    if (sc > 0) { b.vx += sx * 0.15; b.vy += sy * 0.15; }
    if (ac > 0) { b.vx += (ax / ac - b.vx) * 0.05; b.vy += (ay / ac - b.vy) * 0.05; }
    if (cc > 0) { b.vx += (cx / cc) * 0.005; b.vy += (cy / cc) * 0.005; }

    var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (spd > 1.5) { b.vx = b.vx / spd * 1.5; b.vy = b.vy / spd * 1.5; }
    if (spd < 0.3) { b.vx *= 1.5; b.vy *= 1.5; }

    b.x += b.vx; b.y += b.vy;
    if (b.x < 0) b.x += W; if (b.x >= W) b.x -= W;
    if (b.y < 0) b.y += H; if (b.y >= H) b.y -= H;

    var gx = b.x | 0, gy = b.y | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      flockTrail[gy * W + gx] = Math.min(flockTrail[gy * W + gx] + 0.5, 1);
    }
  }

  // Render trails
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = flockTrail[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (30 + v * 30) % 360; // warm yellow-orange
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 70 + v * 30, 25 + v * 50);
    }
  }
}

// ============================================================
// ROTO — Rotozoom
// ============================================================

// Roto interaction: click to shift rotation center
var rotoCX, rotoCY;
function renderRoto() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var angle = time * 0.3;
  var scale = 1.5 + Math.sin(time * 0.7) * 0.8;
  var cosA = Math.cos(angle), sinA = Math.sin(angle);
  var cx = W / 2, cy = H / 2;

  if (pointer.down && currentMode === 'roto') {
    rotoCX = pointer.gx; rotoCY = pointer.gy;
  }
  if (rotoCX !== undefined) {
    cx = cx * 0.97 + rotoCX * 0.03;
    cy = cy * 0.97 + rotoCY * 0.03;
    rotoCX = cx; rotoCY = cy;
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var dx = x - cx, dy = y - cy;
      var tx = (dx * cosA - dy * sinA) * scale;
      var ty = (dx * sinA + dy * cosA) * scale;

      // XOR texture
      var ix = ((tx | 0) % 32 + 32) % 32;
      var iy = ((ty | 0) % 32 + 32) % 32;
      var v = ((ix ^ iy) & 31) / 31;

      // Second layer
      var angle2 = time * -0.2;
      var scale2 = 2 + Math.cos(time * 0.5) * 0.5;
      var cosB = Math.cos(angle2), sinB = Math.sin(angle2);
      var tx2 = (dx * cosB - dy * sinB) * scale2;
      var ty2 = (dx * sinB + dy * cosB) * scale2;
      var ix2 = ((tx2 | 0) % 16 + 16) % 16;
      var iy2 = ((ty2 | 0) % 16 + 16) % 16;
      var v2 = ((ix2 ^ iy2) & 15) / 15;

      var combined = (v + v2) * 0.5;
      if (combined < 0.1) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (combined * RAMP_DENSE.length) | 0);
      var hue = (combined * 360 + time * 40) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 70 + combined * 30, 20 + combined * 50);
    }
  }
}

// ============================================================
// EROSION — Terrain Heightmap
// ============================================================

var terrainH;

function initErosion() {
  terrainH = null; // Will generate on first render
}
initErosion();

// Erosion interaction: click to raise terrain
var erosionBumps = [];
function renderErosion() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var sc = 0.04;
  var drift = time * 0.15;

  if (pointer.clicked && currentMode === 'erosion') {
    pointer.clicked = false;
    if (erosionBumps.length > 8) erosionBumps.shift();
    erosionBumps.push({ x: pointer.gx, y: pointer.gy, born: time });
  }

  var terrainChars = ' .,-~:;=+*oO#@';
  var terrainColors = [
    [30,60,120], [40,80,50], [60,120,40], [100,160,50],
    [140,180,60], [180,170,100], [200,190,150], [220,210,180],
    [240,235,220], [255,250,245]
  ];

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var px = x * sc + drift, py = y * sc + drift * 0.3;
      var h = fbm(px, py, 6) * 0.5 + 0.5;

      // Add ridge noise for mountain detail
      var ridge = Math.abs(simplex2(px * 2, py * 2));
      h = h * 0.7 + ridge * 0.3;

      // Add click-raised terrain bumps
      for (var eb = 0; eb < erosionBumps.length; eb++) {
        var bump = erosionBumps[eb];
        var bdx = x - bump.x, bdy = y - bump.y;
        var bd = Math.sqrt(bdx * bdx + bdy * bdy);
        var bAge = time - bump.born;
        if (bd < 10 && bAge < 30) {
          h += (1 - bd / 10) * 0.4 * Math.max(0, 1 - bAge / 30);
        }
      }

      h = Math.max(0, Math.min(1, h));
      if (h < 0.1) continue;

      var ci = Math.min(terrainColors.length - 1, (h * terrainColors.length) | 0);
      var c = terrainColors[ci];
      var ri = Math.min(terrainChars.length - 1, (h * terrainChars.length) | 0);
      drawChar(terrainChars[ri], x, y, c[0], c[1], c[2], 0.3 + h * 0.7);
    }
  }
}

// ============================================================
// GRAVITY — Click to place gravity wells, particles stream
// ============================================================

var gravParticles = [];
var gravWells = [];
var NUM_GRAV_PARTICLES = 500;
var MAX_GRAV_WELLS = 12;
var gravPointerDown = false;
var gravPointerX = 0, gravPointerY = 0;

function initGravity() {
  gravParticles = [];
  gravWells = [];
  gravPointerDown = false;
  for (var i = 0; i < NUM_GRAV_PARTICLES; i++) {
    gravParticles.push({
      x: Math.random() * COLS, y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
      ch: RAMP_DENSE[Math.floor(Math.random() * RAMP_DENSE.length)]
    });
  }
}
initGravity();

canvas.addEventListener('mousedown', function(e) {
  if (currentMode !== 'gravity') return;
  gravPointerDown = true;
  var g = screenToGrid(e.clientX, e.clientY);
  gravPointerX = g.gx; gravPointerY = g.gy;
  if (gravWells.length >= MAX_GRAV_WELLS) gravWells.shift();
  gravWells.push({ x: g.gx, y: g.gy, str: 0.5, born: time });
});
canvas.addEventListener('mousemove', function(e) {
  if (!gravPointerDown || currentMode !== 'gravity') return;
  var g = screenToGrid(e.clientX, e.clientY);
  gravPointerX = g.gx; gravPointerY = g.gy;
  // Strengthen latest well while held
  if (gravWells.length > 0) {
    var w = gravWells[gravWells.length - 1];
    w.str = Math.min(w.str + 0.02, 5);
  }
});
canvas.addEventListener('mouseup', function() { gravPointerDown = false; });

canvas.addEventListener('touchstart', function(e) {
  if (currentMode !== 'gravity') return;
  e.preventDefault();
  gravPointerDown = true;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  gravPointerX = g.gx; gravPointerY = g.gy;
  if (gravWells.length >= MAX_GRAV_WELLS) gravWells.shift();
  gravWells.push({ x: g.gx, y: g.gy, str: 0.5, born: time });
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (!gravPointerDown || currentMode !== 'gravity') return;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  gravPointerX = g.gx; gravPointerY = g.gy;
  if (gravWells.length > 0) gravWells[gravWells.length - 1].str = Math.min(gravWells[gravWells.length - 1].str + 0.02, 5);
}, { passive: true });
canvas.addEventListener('touchend', function() { if (currentMode === 'gravity') gravPointerDown = false; });

function renderGravity() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var trail = new Float32Array(W * H);

  // Decay old wells
  var i = gravWells.length;
  while (i--) {
    var age = time - gravWells[i].born;
    if (age > 20 && !gravPointerDown) { gravWells[i].str *= 0.99; if (gravWells[i].str < 0.05) gravWells.splice(i, 1); }
  }

  // Update particles
  for (var i = 0; i < gravParticles.length; i++) {
    var p = gravParticles[i];
    for (var j = 0; j < gravWells.length; j++) {
      var w = gravWells[j];
      var dx = w.x - p.x, dy = w.y - p.y;
      var d = Math.sqrt(dx * dx + dy * dy) + 1;
      var f = w.str / (d * d) * 0.5;
      p.vx += dx / d * f;
      p.vy += dy / d * f;
    }
    // Slight orbit tendency
    var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > 2) { p.vx = p.vx / spd * 2; p.vy = p.vy / spd * 2; }
    p.vx *= 0.995; p.vy *= 0.995;
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x += W; if (p.x >= W) p.x -= W;
    if (p.y < 0) p.y += H; if (p.y >= H) p.y -= H;

    var gx = p.x | 0, gy = p.y | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      trail[gy * W + gx] = Math.min(trail[gy * W + gx] + 0.3 + spd * 0.2, 1);
    }
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = trail[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (200 + v * 60 + time * 15) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 70 + v * 30, 20 + v * 55);
    }
  }

  // Draw wells as bright centers
  for (var j = 0; j < gravWells.length; j++) {
    var w = gravWells[j];
    var wx = w.x | 0, wy = w.y | 0;
    if (wx >= 0 && wx < W && wy >= 0 && wy < H) {
      drawChar('@', wx, wy, 200, 230, 255, Math.min(1, w.str));
    }
  }
}

// ============================================================
// PAINT — Click/drag to paint ASCII brushstrokes
// ============================================================

var paintGrid, paintHueGrid;
var paintPointerDown = false;
var paintLastX = -1, paintLastY = -1;
var paintHue = 0;

function initPaint() {
  var sz = COLS * ROWS;
  paintGrid = new Float32Array(sz);
  paintHueGrid = new Float32Array(sz);
  paintPointerDown = false;
  paintLastX = -1; paintLastY = -1;
  paintHue = 0;
}
initPaint();

function paintStroke(gx, gy, radius) {
  var W = COLS, H = ROWS;
  var r = radius || 2;
  for (var dy = -r; dy <= r; dy++) {
    for (var dx = -r; dx <= r; dx++) {
      var nx = (gx + dx) | 0, ny = (gy + dy) | 0;
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d > r) continue;
      var strength = (1 - d / r) * 0.4;
      var idx = ny * W + nx;
      paintGrid[idx] = Math.min(paintGrid[idx] + strength, 1);
      paintHueGrid[idx] = paintHue;
    }
  }
}

canvas.addEventListener('mousedown', function(e) {
  if (currentMode !== 'paint') return;
  paintPointerDown = true;
  var g = screenToGrid(e.clientX, e.clientY);
  paintLastX = g.gx; paintLastY = g.gy;
  paintStroke(g.gx, g.gy, 2);
});
canvas.addEventListener('mousemove', function(e) {
  if (!paintPointerDown || currentMode !== 'paint') return;
  var g = screenToGrid(e.clientX, e.clientY);
  // Interpolate between last and current for smooth strokes
  var dx = g.gx - paintLastX, dy = g.gy - paintLastY;
  var steps = Math.max(1, Math.sqrt(dx * dx + dy * dy) | 0);
  for (var s = 0; s <= steps; s++) {
    var t = s / steps;
    paintStroke(paintLastX + dx * t, paintLastY + dy * t, 2);
  }
  paintLastX = g.gx; paintLastY = g.gy;
  paintHue = (paintHue + 0.8) % 360;
});
canvas.addEventListener('mouseup', function() { if (currentMode === 'paint') { paintPointerDown = false; paintLastX = -1; } });

canvas.addEventListener('touchstart', function(e) {
  if (currentMode !== 'paint') return;
  e.preventDefault();
  paintPointerDown = true;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  paintLastX = g.gx; paintLastY = g.gy;
  paintStroke(g.gx, g.gy, 2);
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (!paintPointerDown || currentMode !== 'paint') return;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  var dx = g.gx - paintLastX, dy = g.gy - paintLastY;
  var steps = Math.max(1, Math.sqrt(dx * dx + dy * dy) | 0);
  for (var s = 0; s <= steps; s++) {
    var tt = s / steps;
    paintStroke(paintLastX + dx * tt, paintLastY + dy * tt, 2);
  }
  paintLastX = g.gx; paintLastY = g.gy;
  paintHue = (paintHue + 0.8) % 360;
}, { passive: true });
canvas.addEventListener('touchend', function() { if (currentMode === 'paint') { paintPointerDown = false; paintLastX = -1; } });

function renderPaint() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!paintGrid || paintGrid.length !== W * H) initPaint();

  // Slow decay for trailing effect
  for (var i = 0; i < paintGrid.length; i++) paintGrid[i] *= 0.998;

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      var v = paintGrid[idx];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);

  }

  // Ambient shimmer on painted areas
  if (!paintPointerDown) {

// RIPPLE — Click to create expanding wave rings
// ============================================================

var ripples = [];
var rippleField;
var MAX_RIPPLES = 20;

function initRipple() {
  ripples = [];
  rippleField = new Float32Array(COLS * ROWS);
}
initRipple();

canvas.addEventListener('mousedown', function(e) {
  if (currentMode !== 'ripple') return;
  var g = screenToGrid(e.clientX, e.clientY);
  if (ripples.length >= MAX_RIPPLES) ripples.shift();
  ripples.push({ x: g.gx, y: g.gy, born: time, strength: 1 });
});
canvas.addEventListener('touchstart', function(e) {
  if (currentMode !== 'ripple') return;
  e.preventDefault();
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  if (ripples.length >= MAX_RIPPLES) ripples.shift();
  ripples.push({ x: g.gx, y: g.gy, born: time, strength: 1 });
}, { passive: false });

function renderRipple() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Prune old ripples
  var i = ripples.length;
  while (i--) { if (time - ripples[i].born > 12) ripples.splice(i, 1); }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var sum = 0;
      var px = x * 0.55; // aspect ratio correction

      // Base water texture
      sum += Math.sin(x * 0.08 + time * 0.5) * 0.1 + Math.sin(y * 0.12 - time * 0.3) * 0.08;

      for (var r = 0; r < ripples.length; r++) {
        var rp = ripples[r];
        var age = time - rp.born;
        var dx = px - rp.x * 0.55, dy = y - rp.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        var radius = age * 4;
        var ringDist = Math.abs(d - radius);
        if (ringDist < 3) {
          var wave = Math.cos(ringDist * 1.5) * rp.strength;
          var fade = Math.max(0, 1 - age / 12);
          var ringFade = 1 - ringDist / 3;
          sum += wave * fade * ringFade * 0.8;
        }
      }

      sum = sum * 0.5 + 0.5;
      if (sum < 0.15 || sum > 0.85) {
        var edge = sum < 0.15 ? sum / 0.15 : (1 - sum) / 0.15;
        if (edge < 0.05) continue;
      }
      var v = Math.abs(sum - 0.5) * 2;
      v = Math.min(1, v * 1.5);
      if (v < 0.05) continue;

      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      var hue = (200 + sum * 40 + time * 10) % 360;
      drawCharHSL(RAMP_SOFT[ri], x, y, hue, 60 + v * 40, 20 + v * 50);
    }
  }
}

  clearCanvas();

  // Spawn sand at pointer
  if (sandPointerDown) {
    for (var s = 0; s < 3; s++) {
      var sx = ((sandPointerX + (Math.random() - 0.5) * 4) | 0);
      var sy = ((sandPointerY + (Math.random() - 0.5) * 2) | 0);
      if (sx >= 0 && sx < W && sy >= 0 && sy < H && sandGrid[sy * W + sx] === SAND_EMPTY) {
        sandGrid[sy * W + sx] = SAND_GRAIN;
        sandColorGrid[sy * W + sx] = Math.floor(Math.random() * sandColors.length);
      }
    }
  }

  // Physics — bottom-up scan
  for (var y = H - 2; y >= 0; y--) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      if (sandGrid[idx] !== SAND_GRAIN) continue;
      var below = (y + 1) * W + x;
      if (sandGrid[below] === SAND_EMPTY) {
        sandGrid[below] = SAND_GRAIN;
        sandColorGrid[below] = sandColorGrid[idx];
        sandGrid[idx] = SAND_EMPTY;
      } else {
        // Try diagonal
        var dir = Math.random() < 0.5 ? -1 : 1;
        var nx = x + dir;
        if (nx >= 0 && nx < W && sandGrid[(y + 1) * W + nx] === SAND_EMPTY) {
          sandGrid[(y + 1) * W + nx] = SAND_GRAIN;
          sandColorGrid[(y + 1) * W + nx] = sandColorGrid[idx];
          sandGrid[idx] = SAND_EMPTY;
        } else {
          nx = x - dir;
          if (nx >= 0 && nx < W && sandGrid[(y + 1) * W + nx] === SAND_EMPTY) {
            sandGrid[(y + 1) * W + nx] = SAND_GRAIN;
            sandColorGrid[(y + 1) * W + nx] = sandColorGrid[idx];
            sandGrid[idx] = SAND_EMPTY;
          }
        }
      }
    }
  }

  // Render
  var sandChars = '.:;=+*#@';
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      if (sandGrid[idx] === SAND_WALL) {
        drawChar('#', x, y, 80, 80, 100, 0.6);
      } else if (sandGrid[idx] === SAND_GRAIN) {
        var ci = sandColorGrid[idx];
        var c = sandColors[ci];
        // Height-based brightness — grains near bottom are more packed

        var ch = sandChars[Math.min(sandChars.length - 1, ((0.5 + depth * 0.5) * sandChars.length) | 0)];
        drawChar(ch, x, y, c[0], c[1], c[2], 0.5 + depth * 0.5);
      }
    }
  }

  clearCanvas();

      hue: (time * 30 + Math.random() * 60) % 360 | 0
    });

    var b = orbitBodies[i];

    var d = Math.sqrt(dx * dx + dy * dy) + 0.5;
    var f = 1.5 / (d * d);
    b.vx += dx / d * f; b.vy += dy / d * f;
    var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (spd > 2.5) { b.vx = b.vx / spd * 2.5; b.vy = b.vy / spd * 2.5; }
    b.x += b.vx; b.y += b.vy;

    var gx = b.x | 0, gy = b.y | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      orbitTrail[gy * W + gx] = Math.min(orbitTrail[gy * W + gx] + 0.4, 1);

    }
  }

// GROW — Click to plant fractal trees
// ============================================================

var growBranches = [];
var growGrid;
var growHueGrid;
var MAX_GROW_BRANCHES = 2000;

function initGrow() {
  growBranches = [];
  var sz = COLS * ROWS;
  growGrid = new Float32Array(sz);
  growHueGrid = new Float32Array(sz);
}
initGrow();

function plantTree(gx, gy) {
  var hue = (Math.random() * 120 + 80) | 0; // green-ish range
  growBranches.push({
    x: gx, y: gy, angle: -Math.PI / 2,
    len: 0, maxLen: 6 + Math.random() * 8,
    thickness: 3, depth: 0, maxDepth: 5 + Math.floor(Math.random() * 3),
    speed: 0.15 + Math.random() * 0.1, hue: hue, growing: true
  });
}

canvas.addEventListener('mousedown', function(e) {
  if (currentMode !== 'grow') return;
  var g = screenToGrid(e.clientX, e.clientY);
  plantTree(g.gx, g.gy);
});
canvas.addEventListener('touchstart', function(e) {
  if (currentMode !== 'grow') return;
  e.preventDefault();
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  plantTree(g.gx, g.gy);
}, { passive: false });

function renderGrow() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!growGrid || growGrid.length !== W * H) initGrow();

  // Slow decay
  for (var i = 0; i < growGrid.length; i++) growGrid[i] *= 0.999;

  // Grow branches
  var newBranches = [];
  for (var i = 0; i < growBranches.length; i++) {
    var b = growBranches[i];
    if (!b.growing) continue;

    b.len += b.speed;
    // Plot current position
    var tipX = b.x + Math.cos(b.angle) * b.len;
    var tipY = b.y + Math.sin(b.angle) * b.len;
    var gx = tipX | 0, gy = tipY | 0;

    // Draw trunk/branch thickness
    var thick = Math.max(1, b.thickness | 0);
    for (var dy = -thick; dy <= thick; dy++) {
      for (var dx = -thick; dx <= thick; dx++) {
        var nx = gx + dx, ny = gy + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          var d = Math.sqrt(dx * dx + dy * dy);
          if (d <= thick) {
            var idx = ny * W + nx;
            growGrid[idx] = Math.min(growGrid[idx] + 0.3 * (1 - d / (thick + 1)), 1);
            growHueGrid[idx] = b.hue + b.depth * 20;
          }
        }
      }
    }

    if (b.len >= b.maxLen) {
      b.growing = false;
      // Fork into 2-3 branches
      if (b.depth < b.maxDepth && growBranches.length + newBranches.length < MAX_GROW_BRANCHES) {
        var numForks = 2 + (Math.random() < 0.3 ? 1 : 0);
        for (var f = 0; f < numForks; f++) {
          var spread = 0.3 + Math.random() * 0.5;
          var forkAngle = b.angle + (f - (numForks - 1) / 2) * spread;
          forkAngle += (Math.random() - 0.5) * 0.3; // jitter
          newBranches.push({
            x: tipX, y: tipY, angle: forkAngle,
            len: 0, maxLen: b.maxLen * (0.6 + Math.random() * 0.2),
            thickness: Math.max(0.5, b.thickness * 0.6),
            depth: b.depth + 1, maxDepth: b.maxDepth,
            speed: b.speed * 0.9, hue: b.hue, growing: true
          });
        }
      }
    }
  }
  for (var i = 0; i < newBranches.length; i++) growBranches.push(newBranches[i]);

  // Render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      var v = growGrid[idx];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = growHueGrid[idx] % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 60 + v * 40, 15 + v * 50);
    }
  }
}

canvas.addEventListener('mousemove', function(e) {
  if (currentMode !== 'magnet') return;
  var g = screenToGrid(e.clientX, e.clientY);
  magnetPointerX = g.gx; magnetPointerY = g.gy;

  if (currentMode !== 'magnet') return;
  e.preventDefault();
  var t = e.touches[0];

  magnetPointerX = g.gx; magnetPointerY = g.gy;

canvas.addEventListener('touchmove', function(e) {
  if (currentMode !== 'magnet') return;

  magnetPointerX = g.gx; magnetPointerY = g.gy;
}, { passive: true });
canvas.addEventListener('touchend', function() { if (currentMode === 'magnet') magnetPointerActive = false; });

function renderMagnet() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var phrase = 'TEXTFLOW';
  var magnetRadius = 12;

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      // Base: regular grid of repeating text
      var srcX = x, srcY = y;

      if (magnetPointerActive) {
        var dx = x - magnetPointerX, dy = y - magnetPointerY;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < magnetRadius && d > 0.1) {
          // Warp away from cursor (repel) or toward (attract based on distance)
          var force = (1 - d / magnetRadius);
          force = force * force * 8;
          srcX = x + dx / d * force;
          srcY = y + dy / d * force;
        }
      }

      // Sample from warped position
      var wx = ((srcX | 0) % W + W) % W;
      var wy = ((srcY | 0) % H + H) % H;

      // Generate base pattern (static noise field + text)
      var n = simplex2(wx * 0.08 + time * 0.1, wy * 0.06) * 0.5 + 0.5;
      n += Math.sin(wx * 0.15 + time * 0.3) * 0.2;

      if (n < 0.2) continue;
      n = Math.min(1, n);

      var ci = ((wx + (time * 3 | 0)) % phrase.length + phrase.length) % phrase.length;
      var ch = n > 0.5 ? phrase[ci] : RAMP_DENSE[Math.min(RAMP_DENSE.length - 1, (n * RAMP_DENSE.length) | 0)];

      var hue, sat, lit;
      if (magnetPointerActive) {
        var dx2 = x - magnetPointerX, dy2 = y - magnetPointerY;
        var d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        var proximity = Math.max(0, 1 - d2 / magnetRadius);
        hue = (0 + proximity * 40 + time * 20) % 360;
        sat = 50 + proximity * 50;
        lit = 20 + n * 40 + proximity * 30;
      } else {
        hue = (n * 30 + time * 10) % 360;
        sat = 40 + n * 30;
        lit = 15 + n * 40;
      }
      drawCharHSL(ch, x, y, hue, sat, lit);
    }
  }
}

function shatterAt(gx, gy) {
  var W = COLS, H = ROWS;
  var radius = 8 + Math.random() * 5;
  var chars = 'TEXTFLOW=+-*#@.:;';
  for (var dy = -radius; dy <= radius; dy++) {
    for (var dx = -radius; dx <= radius; dx++) {
      var nx = (gx + dx) | 0, ny = (gy + dy) | 0;
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;

      if (shatterGrid[idx] === 0) continue;
      shatterGrid[idx] = 0;
      if (shatterFrags.length < MAX_SHATTER_FRAGS) {
        var angle = Math.atan2(dy, dx);
        var force = (1 - d / radius) * 2;
        shatterFrags.push({
          x: nx, y: ny,
          vx: Math.cos(angle) * force + (Math.random() - 0.5) * 0.5,
          vy: Math.sin(angle) * force + (Math.random() - 0.5) * 0.5,
          ch: chars[Math.floor(Math.random() * chars.length)],
          life: 5 + Math.random() * 8,
          born: time,
          hue: (Math.atan2(dy, dx) * 57.3 + 180) % 360
        });
      }
    }
  }
  shatterIntact = false;
}

function renderShatter() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!shatterGrid || shatterGrid.length !== W * H) initShatter();

  // Render intact grid
  var chars = 'TEXTFLOW';
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      if (shatterGrid[y * W + x] === 0) continue;
      var ci = (x + y * 3 + (time * 2 | 0)) % chars.length;
      var v = simplex2(x * 0.05 + time * 0.08, y * 0.07) * 0.3 + 0.5;
      var hue = (v * 40 + 200 + time * 5) % 360;
      drawCharHSL(chars[ci], x, y, hue, 50, 20 + v * 25);
    }
  }

  // Render fragments
  var i = shatterFrags.length;
  while (i--) {
    var f = shatterFrags[i];
    var age = time - f.born;
    if (age > f.life) { shatterFrags.splice(i, 1); continue; }
    f.x += f.vx; f.y += f.vy;
    f.vy += 0.02; // gravity
    f.vx *= 0.99; f.vy *= 0.99;
    var fade = 1 - age / f.life;
    var gx = f.x | 0, gy = f.y | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      drawCharHSL(f.ch, gx, gy, f.hue, 70 + fade * 30, 30 + fade * 50);
    }
  }

  // Auto-heal slowly
  if (!shatterIntact && shatterFrags.length === 0) {
    for (var i = 0; i < 20; i++) {
      var rx = Math.floor(Math.random() * W);
      var ry = Math.floor(Math.random() * H);
      shatterGrid[ry * W + rx] = 1;
    }
  }
}

// ============================================================
// PULSE — Click to emit sonar pulse rings through noise
// ============================================================

var pulseRings = [];
var MAX_PULSE_RINGS = 15;
var pulsePointerDown = false;
var pulsePointerX = 0, pulsePointerY = 0;
var pulseSpawnTimer2 = 0;

function initPulse() {

  pulsePointerDown = false;
}
initPulse();

canvas.addEventListener('mousedown', function(e) {
  if (currentMode !== 'pulse') return;
