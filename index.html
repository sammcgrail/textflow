  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = galaxyTrail[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var ch = RAMP_DENSE[ri];
      var dx = x - cx, dy = y - cy;
      var dist = Math.sqrt(dx * dx + dy * dy);
      var hue = (240 + dist * 3 + time * 10) % 360;
      drawCharHSL(ch, x, y, hue | 0, 50 + (v * 30) | 0, (10 + v * 50) | 0);

// ============================================================
// MODE: cloth — ASCII cloth simulation
// ============================================================
var clothPts, clothW, clothH, clothCols, clothRows;
function initCloth() {
  var spacing = 2.5;
  clothCols = Math.min(30, ((COLS - 4) / spacing) | 0);
  clothRows = Math.min(18, ((ROWS - 4) / spacing) | 0);
  if (clothCols < 4) clothCols = 4;
  if (clothRows < 4) clothRows = 4;
  clothW = COLS; clothH = ROWS;
  clothPts = [];
  clothSpacing = spacing;
  var offX = (COLS - clothCols * spacing) * 0.5;
  var offY = 3;
  for (var r = 0; r < clothRows; r++) {
    for (var c = 0; c < clothCols; c++) {
      clothPts.push({
        x: offX + c * spacing, y: offY + r * spacing,
        ox: offX + c * spacing, oy: offY + r * spacing,
        px: offX + c * spacing, py: offY + r * spacing,
        pinned: r === 0 && c % 3 === 0
      });
    }
  }
}
initCloth();

function renderCloth() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (clothW !== W || clothH !== H) initCloth();
  // Gravity + pointer wind
  var grav = 0.08;
  var windX = 0, windY = 0;
  if (pointer.down && currentMode === 'cloth') {
    windX = (pointer.gx - W * 0.5) * 0.003;
    windY = (pointer.gy - H * 0.5) * 0.003;
  }
  // Verlet integration
  for (var i = 0; i < clothPts.length; i++) {
    var p = clothPts[i];
    if (p.pinned) continue;
    var vx = (p.x - p.px) * 0.99 + windX;
    var vy = (p.y - p.py) * 0.99 + grav + windY;
    p.px = p.x; p.py = p.y;
    p.x += vx; p.y += vy;
    // Bounds
    if (p.y > H - 1) { p.y = H - 1; p.py = p.y; }
    if (p.x < 0) { p.x = 0; p.px = p.x; }
    if (p.x > W - 1) { p.x = W - 1; p.px = p.x; }
  }
  // Spring constraints (3 iterations)
  var restX = clothSpacing, restY = clothSpacing;
  for (var iter = 0; iter < 3; iter++) {
    for (var r = 0; r < clothRows; r++) {
      for (var c = 0; c < clothCols; c++) {
        var idx = r * clothCols + c;
        var p = clothPts[idx];
        // Right neighbor
        if (c < clothCols - 1) {
          var q = clothPts[idx + 1];
          var dx = q.x - p.x, dy = q.y - p.y;
          var d = Math.sqrt(dx * dx + dy * dy);
          if (d > 0) {
            var diff = (d - restX) / d * 0.5;
            if (!p.pinned) { p.x += dx * diff; p.y += dy * diff; }
            if (!q.pinned) { q.x -= dx * diff; q.y -= dy * diff; }
          }
        }
        // Bottom neighbor
        if (r < clothRows - 1) {
          var q = clothPts[idx + clothCols];
          var dx = q.x - p.x, dy = q.y - p.y;
          var d = Math.sqrt(dx * dx + dy * dy);
          if (d > 0) {
            var diff = (d - restY) / d * 0.5;
            if (!p.pinned) { p.x += dx * diff; p.y += dy * diff; }
            if (!q.pinned) { q.x -= dx * diff; q.y -= dy * diff; }
          }
        }
      }
    }
  }
  // Draw
  for (var r = 0; r < clothRows; r++) {
    for (var c = 0; c < clothCols; c++) {
      var idx = r * clothCols + c;
      var p = clothPts[idx];
      var sx = p.x | 0, sy = p.y | 0;
      if (sx < 0 || sx >= W || sy < 0 || sy >= H) continue;
      // Strain coloring
      var strain = Math.sqrt((p.x - p.ox) * (p.x - p.ox) + (p.y - p.oy) * (p.y - p.oy));
      var v = Math.min(1, strain * 0.15);
      var ch = p.pinned ? '=' : (v > 0.5 ? '#' : (v > 0.2 ? '+' : '.'));
      var hue = (200 - v * 200) | 0;
      if (hue < 0) hue += 360;
      drawCharHSL(ch, sx, sy, hue, 70, (20 + v * 35) | 0);
    }
  }
}

// ============================================================
// MODE: dla — Diffusion-Limited Aggregation
// ============================================================
var dlaGrid, dlaAge, dlaWalkers, dlaW, dlaH, dlaMaxAge;
function initDla() {
  dlaW = COLS; dlaH = ROWS;
  dlaGrid = new Uint8Array(dlaW * dlaH);
  dlaAge = new Float32Array(dlaW * dlaH);
  dlaMaxAge = 1;
  // Seed center
  var cx = (dlaW / 2) | 0, cy = (dlaH / 2) | 0;
  dlaGrid[cy * dlaW + cx] = 1;
  dlaAge[cy * dlaW + cx] = 0;
  // Walkers
  dlaWalkers = [];
  var numW = isMobile ? 300 : 500;
  for (var i = 0; i < numW; i++) {
    dlaWalkers.push({x: (Math.random() * dlaW) | 0, y: (Math.random() * dlaH) | 0});
  }
}
initDla();

function renderDla() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (dlaW !== W || dlaH !== H) initDla();
  // Click adds seeds
  if (pointer.clicked && currentMode === 'dla') {
    var gx = Math.floor(pointer.gx), gy = Math.floor(pointer.gy);
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      dlaGrid[gy * W + gx] = 1;
      dlaAge[gy * W + gx] = dlaMaxAge;
      dlaMaxAge++;
    }
  }
  // Walk and stick
  for (var i = 0; i < dlaWalkers.length; i++) {
    var w = dlaWalkers[i];
    for (var s = 0; s < 5; s++) {
      var dir = (Math.random() * 4) | 0;
      var nx = w.x + (dir === 0 ? -1 : dir === 1 ? 1 : 0);
      var ny = w.y + (dir === 2 ? -1 : dir === 3 ? 1 : 0);
      if (nx < 0 || nx >= W || ny < 0 || ny >= H) continue;
      // Check neighbors for aggregate
      var stuck = false;
      for (var d = 0; d < 4; d++) {
        var ax = nx + (d === 0 ? -1 : d === 1 ? 1 : 0);
        var ay = ny + (d === 2 ? -1 : d === 3 ? 1 : 0);
        if (ax >= 0 && ax < W && ay >= 0 && ay < H && dlaGrid[ay * W + ax]) {
          stuck = true; break;
        }
      }
      if (stuck && !dlaGrid[ny * W + nx]) {
        dlaGrid[ny * W + nx] = 1;
        dlaAge[ny * W + nx] = dlaMaxAge;
        dlaMaxAge++;
        // Respawn walker
        w.x = (Math.random() * W) | 0;
        w.y = (Math.random() * H) | 0;
        break;
      }
      w.x = nx; w.y = ny;
    }
  }
  // Draw aggregate
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      if (!dlaGrid[y * W + x]) continue;
      var age = dlaAge[y * W + x] / (dlaMaxAge + 1);
      var ri = Math.min(RAMP_DENSE.length - 1, (0.3 + age * 0.7) * RAMP_DENSE.length | 0);
      var ch = RAMP_DENSE[ri];
      var hue = (age * 300 + 30) % 360;
      drawCharHSL(ch, x, y, hue | 0, 70, (20 + age * 40) | 0);
    }
  }
}

// ============================================================
// MODE: slime — Physarum slime mold (PERF STRESS TEST)
// ============================================================
var slimeAgents, slimeTrail, slimeW, slimeH;
function initSlime() {
  slimeW = COLS; slimeH = ROWS;
  slimeTrail = new Float32Array(slimeW * slimeH);
  var numAgents = isMobile ? 5000 : 8000;
  slimeAgents = [];
  var cx = slimeW * 0.5, cy = slimeH * 0.5;
  for (var i = 0; i < numAgents; i++) {
    var ang = Math.random() * Math.PI * 2;
    var r = Math.random() * Math.min(slimeW, slimeH) * 0.3;
    slimeAgents.push({
      x: cx + Math.cos(ang) * r,
      y: cy + Math.sin(ang) * r,
      angle: Math.random() * Math.PI * 2
    });
  }
}
initSlime();

function renderSlime() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (slimeW !== W || slimeH !== H) initSlime();
  var sensorDist = 3, sensorAngle = 0.5, turnSpeed = 0.4, moveSpeed = 0.8;
  // Pointer deposits attractant
  if (pointer.down && currentMode === 'slime') {
    var gx = Math.floor(pointer.gx), gy = Math.floor(pointer.gy);
    for (var dy = -3; dy <= 3; dy++) {
      for (var dx = -3; dx <= 3; dx++) {
        var nx = gx + dx, ny = gy + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          slimeTrail[ny * W + nx] = Math.min(1, slimeTrail[ny * W + nx] + 0.5);
        }
      }
    }
  }
  // Update agents
  for (var i = 0; i < slimeAgents.length; i++) {
    var a = slimeAgents[i];
    // Sense at 3 angles
    var fl = 0, fc = 0, fr = 0;
    var slx = (a.x + Math.cos(a.angle - sensorAngle) * sensorDist) | 0;
    var sly = (a.y + Math.sin(a.angle - sensorAngle) * sensorDist) | 0;
    if (slx >= 0 && slx < W && sly >= 0 && sly < H) fl = slimeTrail[sly * W + slx];
    var scx = (a.x + Math.cos(a.angle) * sensorDist) | 0;
    var scy = (a.y + Math.sin(a.angle) * sensorDist) | 0;
    if (scx >= 0 && scx < W && scy >= 0 && scy < H) fc = slimeTrail[scy * W + scx];
    var srx = (a.x + Math.cos(a.angle + sensorAngle) * sensorDist) | 0;
    var sry = (a.y + Math.sin(a.angle + sensorAngle) * sensorDist) | 0;
    if (srx >= 0 && srx < W && sry >= 0 && sry < H) fr = slimeTrail[sry * W + srx];
    // Turn
    if (fc > fl && fc > fr) { /* go straight */ }
    else if (fl > fr) a.angle -= turnSpeed * (0.5 + Math.random() * 0.5);
    else if (fr > fl) a.angle += turnSpeed * (0.5 + Math.random() * 0.5);
    else a.angle += (Math.random() - 0.5) * turnSpeed;
    // Move
    a.x += Math.cos(a.angle) * moveSpeed;
    a.y += Math.sin(a.angle) * moveSpeed;
    // Wrap
    if (a.x < 0) { a.x = W - 1; a.angle = Math.random() * Math.PI * 2; }
    if (a.x >= W) { a.x = 0; a.angle = Math.random() * Math.PI * 2; }
    if (a.y < 0) { a.y = H - 1; a.angle = Math.random() * Math.PI * 2; }
    if (a.y >= H) { a.y = 0; a.angle = Math.random() * Math.PI * 2; }
    // Deposit
    var ix = a.x | 0, iy = a.y | 0;
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
      slimeTrail[iy * W + ix] = Math.min(1, slimeTrail[iy * W + ix] + 0.05);
    }
  }
  // 3x3 diffusion + decay
  var next = new Float32Array(W * H);
  for (var y = 1; y < H - 1; y++) {
    for (var x = 1; x < W - 1; x++) {
      var idx = y * W + x;
      var sum = 0;
      for (var dy = -1; dy <= 1; dy++) {
        for (var dx = -1; dx <= 1; dx++) {
          sum += slimeTrail[idx + dy * W + dx];
        }
      }
      next[idx] = sum / 9 * 0.95;
    }
  }
  slimeTrail = next;
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = slimeTrail[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var ch = RAMP_DENSE[ri];
      drawCharHSL(ch, x, y, (80 + v * 60) | 0, 80, (10 + v * 50) | 0);
    }
  }
}

// ============================================================

      for (var dx = -2; dx <= 2; dx++) {
        var nx = gx + dx, ny = gy + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          rxnV[ny * W + nx] = 0.5;
          rxnU[ny * W + nx] = 0.25;
        }
      }
    }
    // Pointer shifts params locally
    f = 0.03 + (pointer.gx / W) * 0.05;
    k = 0.04 + (pointer.gy / H) * 0.04;
  }
  // 2 substeps per frame
  for (var sub = 0; sub < 2; sub++) {
    var nextU = new Float32Array(W * H);
    var nextV = new Float32Array(W * H);
    for (var y = 1; y < H - 1; y++) {
      for (var x = 1; x < W - 1; x++) {
        var idx = y * W + x;
        var u = rxnU[idx], v = rxnV[idx];
        var lapU = rxnU[idx - 1] + rxnU[idx + 1] + rxnU[idx - W] + rxnU[idx + W] - 4 * u;
        var lapV = rxnV[idx - 1] + rxnV[idx + 1] + rxnV[idx - W] + rxnV[idx + W] - 4 * v;
        var uvv = u * v * v;
        nextU[idx] = u + Du * lapU - uvv + f * (1 - u);
        nextV[idx] = v + Dv * lapV + uvv - (f + k) * v;
      }
    }
    rxnU = nextU;
    rxnV = nextV;
  }
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = rxnV[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * 2 * RAMP_DENSE.length) | 0);
      var ch = RAMP_DENSE[Math.min(ri, RAMP_DENSE.length - 1)];
      var u = rxnU[y * W + x];
      var hue = (200 + v * 160) % 360;
      drawCharHSL(ch, x, y, hue | 0, 70, (10 + v * 60) | 0);
    }
  }
}

// ============================================================
// MODE: nbody — N-body gravitational sim (PERF STRESS TEST)
// ============================================================
var nbodyParts, nbodyTrail, nbodyW, nbodyH;
function initNbody() {
  nbodyW = COLS; nbodyH = ROWS;
  nbodyTrail = new Float32Array(nbodyW * nbodyH);
  var num = isMobile ? 100 : 150;
  nbodyParts = [];
  var cx = nbodyW * 0.5, cy = nbodyH * 0.5;
  for (var i = 0; i < num; i++) {
    var ang = Math.random() * Math.PI * 2;
    var r = 5 + Math.random() * Math.min(nbodyW, nbodyH) * 0.3;
    var speed = 0.4 / Math.sqrt(r * 0.1 + 1);
    nbodyParts.push({
      x: cx + Math.cos(ang) * r,
      y: cy + Math.sin(ang) * r,
      vx: -Math.sin(ang) * speed,
      vy: Math.cos(ang) * speed,
      mass: 0.5 + Math.random() * 1.5
    });
  }
}
initNbody();

function renderNbody() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (nbodyW !== W || nbodyH !== H) initNbody();
  // Decay trail
  for (var i = 0; i < nbodyTrail.length; i++) nbodyTrail[i] *= 0.92;
  // Click spawns massive body
  if (pointer.clicked && currentMode === 'nbody') {
    nbodyParts.push({
      x: pointer.gx, y: pointer.gy,
      vx: 0, vy: 0, mass: 10
    });
  }
  var softening = 2.0;
  var G = 0.05;
  var n = nbodyParts.length;
  // O(N^2) force computation
  for (var i = 0; i < n; i++) {
    var pi = nbodyParts[i];
    var ax = 0, ay = 0;
    for (var j = 0; j < n; j++) {
      if (i === j) continue;
      var pj = nbodyParts[j];
      var dx = pj.x - pi.x, dy = pj.y - pi.y;
      var d2 = dx * dx + dy * dy + softening * softening;
      var inv = G * pj.mass / (d2 * Math.sqrt(d2));
      ax += dx * inv;
      ay += dy * inv;
    }
    // Pointer attraction
    if (pointer.down && currentMode === 'nbody') {
      var dx = pointer.gx - pi.x, dy = pointer.gy - pi.y;
      var d2 = dx * dx + dy * dy + 4;
      var inv = 2.0 / (d2 * Math.sqrt(d2));
      ax += dx * inv;
      ay += dy * inv;
    }
    pi.vx += ax;
    pi.vy += ay;
  }
  // Leapfrog integration + trail
  for (var i = 0; i < n; i++) {
    var p = nbodyParts[i];
    p.x += p.vx;
    p.y += p.vy;
    // Wrap
    if (p.x < 0) p.x += W;
    if (p.x >= W) p.x -= W;
    if (p.y < 0) p.y += H;
    if (p.y >= H) p.y -= H;
    var ix = p.x | 0, iy = p.y | 0;
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
      nbodyTrail[iy * W + ix] = Math.min(1, nbodyTrail[iy * W + ix] + 0.2 * p.mass);
    }
  }
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = nbodyTrail[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var ch = RAMP_DENSE[ri];
      drawCharHSL(ch, x, y, (40 + v * 30) | 0, 80, (10 + v * 50) | 0);
    }
  }
}

// ============================================================
// MODE: ants — Ant colony foraging
// ============================================================
var antsArr, antFood, antNest, antWalls, antPheroFood, antPheroHome, antW, antH;
function initAnts() {
  antW = COLS; antH = ROWS;
  var sz = antW * antH;
  antPheroFood = new Float32Array(sz);
  antPheroHome = new Float32Array(sz);
  antWalls = new Uint8Array(sz);
  // Nest at center-left
  antNest = {x: (antW * 0.2) | 0, y: (antH * 0.5) | 0};
  // Food sources
  antFood = [];
  antFood.push({x: (antW * 0.8) | 0, y: (antH * 0.3) | 0, amount: 500});
  antFood.push({x: (antW * 0.7) | 0, y: (antH * 0.7) | 0, amount: 500});
  antFood.push({x: (antW * 0.5) | 0, y: (antH * 0.2) | 0, amount: 500});
  var numAnts = isMobile ? 200 : 300;
  antsArr = [];
  for (var i = 0; i < numAnts; i++) {
    antsArr.push({
      x: antNest.x + (Math.random() - 0.5) * 4,
      y: antNest.y + (Math.random() - 0.5) * 4,
      angle: Math.random() * Math.PI * 2,
      hasFood: false
    });
  }
}
initAnts();

function renderAnts() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (antW !== W || antH !== H) initAnts();
  // Click places food
  if (pointer.clicked && currentMode === 'ants') {
    antFood.push({x: Math.floor(pointer.gx), y: Math.floor(pointer.gy), amount: 300});
  }
  // Drag draws walls
  if (pointer.down && !pointer.clicked && currentMode === 'ants') {
    var gx = Math.floor(pointer.gx), gy = Math.floor(pointer.gy);
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) antWalls[gy * W + gx] = 1;
  }
  // Pheromone evaporation + diffusion
  var nextF = new Float32Array(W * H);
  var nextH = new Float32Array(W * H);
  for (var y = 1; y < H - 1; y++) {
    for (var x = 1; x < W - 1; x++) {
      var idx = y * W + x;
      if (antWalls[idx]) continue;
      var sf = 0, sh = 0;
      for (var dy = -1; dy <= 1; dy++) {
        for (var dx = -1; dx <= 1; dx++) {
          var ni = idx + dy * W + dx;
          sf += antPheroFood[ni];
          sh += antPheroHome[ni];
        }
      }
      nextF[idx] = sf / 9 * 0.97;
      nextH[idx] = sh / 9 * 0.97;
    }
  }
  antPheroFood = nextF;
  antPheroHome = nextH;
  // Update ants
  var sensorDist = 2, sensorAngle = 0.5;
  for (var i = 0; i < antsArr.length; i++) {
    var a = antsArr[i];
    var phero = a.hasFood ? antPheroHome : antPheroFood;
    // Sense 3 directions
    var fl = 0, fc = 0, fr = 0;
    var lx = (a.x + Math.cos(a.angle - sensorAngle) * sensorDist) | 0;
    var ly = (a.y + Math.sin(a.angle - sensorAngle) * sensorDist) | 0;
    if (lx >= 0 && lx < W && ly >= 0 && ly < H) fl = phero[ly * W + lx];
    var cx2 = (a.x + Math.cos(a.angle) * sensorDist) | 0;
    var cy2 = (a.y + Math.sin(a.angle) * sensorDist) | 0;
    if (cx2 >= 0 && cx2 < W && cy2 >= 0 && cy2 < H) fc = phero[cy2 * W + cx2];
    var rx = (a.x + Math.cos(a.angle + sensorAngle) * sensorDist) | 0;
    var ry = (a.y + Math.sin(a.angle + sensorAngle) * sensorDist) | 0;
    if (rx >= 0 && rx < W && ry >= 0 && ry < H) fr = phero[ry * W + rx];
    // Turn toward strongest
    if (fc >= fl && fc >= fr) a.angle += (Math.random() - 0.5) * 0.2;
    else if (fl > fr) a.angle -= 0.3;
    else a.angle += 0.3;
    a.angle += (Math.random() - 0.5) * 0.3;
    // Move
    var nx = a.x + Math.cos(a.angle) * 0.8;
    var ny = a.y + Math.sin(a.angle) * 0.8;
    var nxi = nx | 0, nyi = ny | 0;
    if (nxi < 0 || nxi >= W || nyi < 0 || nyi >= H || antWalls[nyi * W + nxi]) {
      a.angle += Math.PI * (0.5 + Math.random());
    } else {
      a.x = nx; a.y = ny;
    }
    // Deposit pheromone
    var ix = a.x | 0, iy = a.y | 0;
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
      if (a.hasFood) {
        antPheroFood[iy * W + ix] = Math.min(1, antPheroFood[iy * W + ix] + 0.1);
      } else {
        antPheroHome[iy * W + ix] = Math.min(1, antPheroHome[iy * W + ix] + 0.05);
      }
    }
    // Check food pickup
    if (!a.hasFood) {
      for (var f = 0; f < antFood.length; f++) {
        var fd = antFood[f];
        if (fd.amount <= 0) continue;
        var dx = a.x - fd.x, dy = a.y - fd.y;
        if (dx * dx + dy * dy < 4) {
          a.hasFood = true;
          fd.amount--;
          a.angle += Math.PI;
          break;
        }
      }
    }
    // Check nest delivery
    if (a.hasFood) {
      var dx = a.x - antNest.x, dy = a.y - antNest.y;
      if (dx * dx + dy * dy < 4) {
        a.hasFood = false;
        a.angle += Math.PI;
      }
    }
  }
  // Draw pheromones
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      if (antWalls[idx]) { drawChar('#', x, y, 80, 60, 40, 0.6); continue; }
      var vf = antPheroFood[idx], vh = antPheroHome[idx];
      var v = Math.max(vf, vh);
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      if (vf > vh) {
        drawChar(RAMP_SOFT[ri], x, y, 50, (100 + vf * 155) | 0, 50, Math.min(1, v * 3));
      } else {
        drawChar(RAMP_SOFT[ri], x, y, 50, 80, (100 + vh * 155) | 0, Math.min(1, v * 3));
      }
    }
  }
  // Draw food sources
  for (var f = 0; f < antFood.length; f++) {
    var fd = antFood[f];
    if (fd.amount <= 0) continue;
    drawChar('F', fd.x, fd.y, 255, 200, 50, 1);
  }
  // Draw nest
  drawChar('N', antNest.x, antNest.y, 200, 100, 255, 1);
  // Draw ants
  for (var i = 0; i < antsArr.length; i++) {
    var a = antsArr[i];
    var ix = a.x | 0, iy = a.y | 0;
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
      if (a.hasFood) {
        drawChar('o', ix, iy, 255, 200, 50, 0.9);
      } else {
        drawChar('.', ix, iy, 200, 150, 100, 0.7);
      }
    }
  }
}

// ============================================================
// MODE: strange — Strange attractor gallery
// ============================================================
var strangeDensity, strangeW, strangeH, strangeType, strangeTimer;
function initStrange() {
  strangeW = COLS; strangeH = ROWS;
  strangeDensity = new Float32Array(strangeW * strangeH);
  strangeType = 0;
  strangeTimer = 0;
}
initStrange();

function renderStrange() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (strangeW !== W || strangeH !== H) initStrange();
  strangeTimer += 0.016;
  if (strangeTimer > 8) { strangeTimer = 0; strangeType = (strangeType + 1) % 5; strangeDensity = new Float32Array(W * H); }
  // Decay
  for (var i = 0; i < strangeDensity.length; i++) strangeDensity[i] *= 0.96;
  // Pointer controls 3D rotation
  var rotX = pointer.down && currentMode === 'strange' ? (pointer.gy / H - 0.5) * 2 : Math.sin(time * 0.3) * 0.5;
  var rotY = pointer.down && currentMode === 'strange' ? (pointer.gx / W - 0.5) * 2 : time * 0.2;
  var steps = isMobile ? 3000 : 5000;
  // Integrate attractor
  var x = 0.1, y = 0.1, z = 0.1;
  var dt = 0.005;
  for (var s = 0; s < steps; s++) {
    var dx, dy, dz;
    if (strangeType === 0) {
      // Rossler
      var a = 0.2, b = 0.2, c = 5.7;
      dx = (-y - z) * dt;
      dy = (x + a * y) * dt;
      dz = (b + z * (x - c)) * dt;
    } else if (strangeType === 1) {
      // Aizawa
      var a = 0.95, b = 0.7, c = 0.6, d = 3.5, e = 0.25, f = 0.1;
      dx = ((z - b) * x - d * y) * dt;
      dy = (d * x + (z - b) * y) * dt;
      dz = (c + a * z - z * z * z / 3 - (x * x + y * y) * (1 + e * z) + f * z * x * x * x) * dt;
    } else if (strangeType === 2) {
      // Thomas
      var b = 0.208186;
      dx = (Math.sin(y) - b * x) * dt * 2;
      dy = (Math.sin(z) - b * y) * dt * 2;
      dz = (Math.sin(x) - b * z) * dt * 2;
    } else if (strangeType === 3) {
      // Halvorsen
      var a = 1.89;
      dx = (-a * x - 4 * y - 4 * z - y * y) * dt * 0.3;
      dy = (-a * y - 4 * z - 4 * x - z * z) * dt * 0.3;
      dz = (-a * z - 4 * x - 4 * y - x * x) * dt * 0.3;
    } else {
      // Dadras
      var p = 3, q = 2.7, r = 1.7, s2 = 2, e = 9;
      dx = (y - p * x + q * y * z) * dt * 0.3;
      dy = (r * y - x * z + z) * dt * 0.3;
      dz = (s2 * x * y - e * z) * dt * 0.3;
    }
    x += dx; y += dy; z += dz;
    // Apply rotation
    var rx = x * Math.cos(rotY) - z * Math.sin(rotY);
    var rz = x * Math.sin(rotY) + z * Math.cos(rotY);
    var ry = y * Math.cos(rotX) - rz * Math.sin(rotX);
    // Project to screen
    var scale = Math.min(W, H) * 0.15;
    var sx = ((rx * scale) + W * 0.5) | 0;
    var sy = ((ry * scale) + H * 0.5) | 0;
    if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
      strangeDensity[sy * W + sx] = Math.min(1, strangeDensity[sy * W + sx] + 0.01);
    }
  }
  // Draw
  var hueBase = strangeType * 72;
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = strangeDensity[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var ch = RAMP_DENSE[ri];
      drawCharHSL(ch, x, y, (hueBase + v * 60) | 0, 80, (10 + v * 55) | 0);
    }
  }
}

// ============================================================
// MODE: mandel — Progressive Mandelbrot zoom
// ============================================================
var mandelCx, mandelCy, mandelZoom, mandelIter, mandelImage, mandelW, mandelH, mandelDirty;
function initMandel() {
  mandelW = COLS; mandelH = ROWS;
  mandelCx = -0.745428; mandelCy = 0.113009;
  mandelZoom = 0.25;
  mandelImage = new Float32Array(mandelW * mandelH);
  mandelDirty = true;
  mandelIter = 0;
}
initMandel();

function mandelCompute() {
  var W = mandelW, H = mandelH;
  var aspect = W / H * 0.5;
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var cr = mandelCx + (x / W - 0.5) * mandelZoom * aspect;
      var ci = mandelCy + (y / H - 0.5) * mandelZoom;
      var zr = 0, zi = 0, iter = 0, maxIter = 150;
      while (zr * zr + zi * zi < 4 && iter < maxIter) {
        var tr = zr * zr - zi * zi + cr;
        zi = 2 * zr * zi + ci;
        zr = tr;
        iter++;
      }
      if (iter === maxIter) {
        mandelImage[y * W + x] = 0;
      } else {
        // Smooth coloring
        var log2 = Math.log(2);
        var nu = Math.log(Math.log(Math.sqrt(zr * zr + zi * zi)) / log2) / log2;
        mandelImage[y * W + x] = (iter + 1 - nu) / maxIter;
      }
    }
  }
}

function renderMandel() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (mandelW !== W || mandelH !== H) initMandel();
  // Click sets center
  if (pointer.clicked && currentMode === 'mandel') {
    var aspect = W / H * 0.5;
    mandelCx += (pointer.gx / W - 0.5) * mandelZoom * aspect;
    mandelCy += (pointer.gy / H - 0.5) * mandelZoom;
    mandelZoom *= 0.5;
    mandelDirty = true;
  }
  // Hold zooms faster (auto-zoom)
  if (pointer.down && !pointer.clicked && currentMode === 'mandel') {
    mandelZoom *= 0.995;
    mandelDirty = true;
  }
  // Auto zoom toward interesting boundary
  if (!pointer.down) {
    mandelZoom *= 0.9995;
    mandelDirty = true;
  }
  if (mandelDirty) {
    mandelCompute();
    mandelDirty = false;
  }
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = mandelImage[y * W + x];
      if (v < 0.005) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length * 2) | 0);
      if (ri >= RAMP_DENSE.length) ri = RAMP_DENSE.length - 1;
      var ch = RAMP_DENSE[ri];
      var hue = (v * 720 + time * 20) % 360;
      drawCharHSL(ch, x, y, hue | 0, 80, (5 + v * 55) | 0);
    }
  }
  // Show zoom level
}

// ============================================================
// MODE: storm — Multi-bolt lightning storm
// ============================================================
var stormBolts, stormFlash, stormCloud, stormGlow, stormW, stormH, stormTimer;
function initStorm() {
  stormW = COLS; stormH = ROWS;
  stormBolts = [];
  stormFlash = 0;
  stormCloud = new Float32Array(stormW);
  stormGlow = new Float32Array(stormW * stormH);
  stormTimer = 0;
  // Init cloud layer
  for (var x = 0; x < stormW; x++) {
    stormCloud[x] = 0.3 + Math.random() * 0.7;
  }
}
initStorm();

function stormGenBolt(startX, startY) {
  var points = [{x: startX, y: startY}];
  var x = startX, y = startY;
  var branches = [];
  while (y < stormH - 1) {
    y += 1 + Math.random() * 0.5;
    x += (Math.random() - 0.5) * 3;
    points.push({x: x | 0, y: y | 0});
    // Branch randomly
    if (Math.random() < 0.15 && branches.length < 4) {
      var bx = x, by = y;
      var branchPts = [{x: bx | 0, y: by | 0}];
      for (var b = 0; b < 5 + Math.random() * 8; b++) {
        by += 1 + Math.random() * 0.5;
        bx += (Math.random() - 0.5) * 4;
        branchPts.push({x: bx | 0, y: by | 0});
      }
      branches.push(branchPts);
    }
  }
  return {points: points, branches: branches, age: 0, maxAge: 0.4 + Math.random() * 0.3};
}

function renderStorm() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (stormW !== W || stormH !== H) initStorm();
  stormTimer += 0.016;
  // Decay glow
  for (var i = 0; i < stormGlow.length; i++) stormGlow[i] *= 0.85;
  // Spawn bolts periodically or on click
  if (Math.random() < 0.06 || (pointer.clicked && currentMode === 'storm')) {
    var sx = pointer.down && currentMode === 'storm' ? pointer.gx : Math.random() * W;
    stormBolts.push(stormGenBolt(sx | 0, 3));
    stormFlash = 1;
  }
  // Update cloud noise
  for (var x = 0; x < W; x++) {
    stormCloud[x] = 0.3 + Math.sin(x * 0.1 + time * 0.5) * 0.2 + Math.sin(x * 0.23 + time * 0.3) * 0.15;
  }
  // Draw clouds (top rows)
  var cloudRows = Math.min(5, H);
  for (var y = 0; y < cloudRows; y++) {
    for (var x = 0; x < W; x++) {
      var v = stormCloud[x] * (1 - y / cloudRows);
      if (v < 0.02) continue;
      var ch = RAMP_SOFT[Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0)];
      var flash = stormFlash * 0.5;
      var bright = (30 + v * 40 + flash * 50) | 0;
      drawCharHSL(ch, x, y, 230, 30, bright);
    }
  }
  // Update and draw bolts
  for (var b = stormBolts.length - 1; b >= 0; b--) {
    var bolt = stormBolts[b];
    bolt.age += 0.016;
    if (bolt.age > bolt.maxAge) { stormBolts.splice(b, 1); continue; }
    var fade = 1 - bolt.age / bolt.maxAge;
    // Draw main bolt
    for (var p = 0; p < bolt.points.length; p++) {
      var pt = bolt.points[p];
      if (pt.x >= 0 && pt.x < W && pt.y >= 0 && pt.y < H) {
        stormGlow[pt.y * W + pt.x] = Math.min(1, stormGlow[pt.y * W + pt.x] + fade);
        var ch = bolt.age < 0.05 ? '#' : (fade > 0.5 ? '|' : ':');
        drawChar(ch, pt.x, pt.y, (200 + fade * 55) | 0, (200 + fade * 55) | 0, 255, fade);
      }
    }
    // Draw branches
    for (var br = 0; br < bolt.branches.length; br++) {
      var branch = bolt.branches[br];
      for (var p = 0; p < branch.length; p++) {
        var pt = branch[p];
        if (pt.x >= 0 && pt.x < W && pt.y >= 0 && pt.y < H) {
          stormGlow[pt.y * W + pt.x] = Math.min(1, stormGlow[pt.y * W + pt.x] + fade * 0.5);
          drawChar(':', pt.x, pt.y, 150, 180, 255, fade * 0.7);
        }
      }
    }
  }
  // Draw afterglow
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = stormGlow[y * W + x];
      if (v < 0.05) continue;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length * 0.5) | 0);
      drawChar(RAMP_SOFT[ri], x, y, 100, 120, (180 + v * 75) | 0, v * 0.4);
    }
  }
  // Flash decay
  stormFlash *= 0.85;
}

// MODE: matrix — Matrix digital rain
// ============================================================
var mtxStreams, mtxW, mtxH;
var MTX_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*+=';
function initMatrix() {
  mtxW = COLS; mtxH = ROWS;
  mtxStreams = [];
  // Dense initial coverage — ~85% of columns get a stream, spread across full height
  for (var x = 0; x < mtxW; x++) {
    if (Math.random() < 0.85) {
      mtxStreams.push({
        x: x,
        y: Math.random() * mtxH * 1.5 - mtxH * 0.5,
        speed: 4 + Math.random() * 14,
        len: 6 + (Math.random() * 25) | 0,
        chars: []
      });
      var st = mtxStreams[mtxStreams.length - 1];
      for (var j = 0; j < st.len; j++) st.chars.push(MTX_CHARS[(Math.random() * MTX_CHARS.length) | 0]);
    }
  }
}
initMatrix();

function renderMatrix() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (mtxW !== W || mtxH !== H) initMatrix();
  var px = pointer.down && currentMode === 'matrix' ? pointer.gx : -100;
  var py = pointer.down && currentMode === 'matrix' ? pointer.gy : -100;
  for (var i = 0; i < mtxStreams.length; i++) {
    var s = mtxStreams[i];
    s.y += s.speed * 0.016;
    if (s.y - s.len > H) {
      s.y = -s.len;
      s.x = (Math.random() * W) | 0;
      s.speed = 4 + Math.random() * 14;
      s.len = 6 + (Math.random() * 25) | 0;
      s.chars = [];
      for (var ci = 0; ci < s.len; ci++) s.chars.push(MTX_CHARS[(Math.random() * MTX_CHARS.length) | 0]);
    }
    // Spawn new streams to keep density high
    if (mtxStreams.length < W * 0.8 && Math.random() < 0.02) {
      mtxStreams.push({ x: (Math.random() * W) | 0, y: -5, speed: 4 + Math.random() * 14, len: 6 + (Math.random() * 25) | 0, chars: [] });
      var ns = mtxStreams[mtxStreams.length - 1];
      for (var ci = 0; ci < ns.len; ci++) ns.chars.push(MTX_CHARS[(Math.random() * MTX_CHARS.length) | 0]);
    }
    // Pointer repel
    var dx = s.x - px, dy = (s.y - s.len * 0.5) - py;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 8) {
      s.x += (dx / (dist + 0.1)) * 0.5;
    }
    // Randomize one char per frame
    var ri = (Math.random() * s.len) | 0;
    s.chars[ri] = MTX_CHARS[(Math.random() * MTX_CHARS.length) | 0];
    for (var j = 0; j < s.len; j++) {
      var cy = (s.y - j) | 0;
      if (cy < 0 || cy >= H) continue;
      var sx = s.x | 0;
      if (sx < 0 || sx >= W) continue;
      if (j === 0) {
        drawChar(s.chars[j], sx, cy, 220, 255, 220, 1);
      } else {
        var fade = 1 - j / s.len;
        drawChar(s.chars[j], sx, cy, 0, (100 + fade * 155) | 0, 0, fade);
      }
    }
  }
}

var snowFlakes, snowCount, snowW, snowH, snowGround;
function initSnowfall() {
  snowW = COLS; snowH = ROWS;
  snowCount = isMobile ? 150 : 300;
  snowFlakes = [];
  snowGround = new Uint8Array(snowW);
  for (var i = 0; i < snowCount; i++) {
    snowFlakes.push({
      x: Math.random() * snowW,
      y: Math.random() * snowH,
      speed: 1 + Math.random() * 3,
      size: Math.random()
    });
  }
}
initSnowfall();

function renderSnowfall() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (snowW !== W || snowH !== H) initSnowfall();
  var wind = Math.sin(time * 0.3) * 2;
  if (pointer.down && currentMode === 'snowfall') {
    wind += (pointer.gx - W * 0.5) * 0.1;
  }
  for (var i = 0; i < snowCount; i++) {
    var f = snowFlakes[i];
    f.y += f.speed * 0.016 * 30;
    f.x += (wind + Math.sin(time * 2 + i) * 0.5) * 0.016 * 15;
    if (f.x < 0) f.x += W;
    if (f.x >= W) f.x -= W;
    var gx = f.x | 0;
    if (gx >= 0 && gx < W && f.y >= H - 1 - snowGround[gx]) {
      if (snowGround[gx] < H * 0.3) snowGround[gx]++;
      f.y = -1;
      f.x = Math.random() * W;
      continue;
    }
    if (f.y >= H) { f.y = -1; f.x = Math.random() * W; continue; }
    var ix = f.x | 0, iy = f.y | 0;
    if (ix < 0 || ix >= W || iy < 0 || iy >= H) continue;
    var ch = f.size < 0.3 ? '.' : (f.size < 0.6 ? '*' : '#');
    var b = (180 + f.size * 75) | 0;
    drawChar(ch, ix, iy, b, b, 255, 0.7 + f.size * 0.3);
  }
  // Draw ground
  for (var x = 0; x < W; x++) {
    for (var g = 0; g < snowGround[x]; g++) {
      var gy = H - 1 - g;
      if (gy < 0) break;
      var v = 1 - g / (H * 0.3);
      drawChar('#', x, gy, 200, 210, 230, v);
    }
  }
}

// ============================================================
// MODE: firework — Particle fireworks
// ============================================================
var fwRockets, fwParticles, fwW, fwH, fwTimer;
function initFirework() {
  fwW = COLS; fwH = ROWS;
  fwRockets = [];
  fwParticles = [];
  fwTimer = 0;
  // Initial burst — 3 rockets already mid-flight so it's not blank on load
  for (var i = 0; i < 3; i++) {
    var x = fwW * 0.2 + Math.random() * fwW * 0.6;
    fwRockets.push({ x: x, y: fwH * 0.3 + Math.random() * fwH * 0.3, vx: (Math.random() - 0.5) * 2, vy: -(3 + Math.random() * 4), hue: (Math.random() * 360) | 0 });
  }
  // Plus 2 already-exploded bursts
  for (var i = 0; i < 2; i++) {
    var fakeR = { x: fwW * 0.25 + Math.random() * fwW * 0.5, y: fwH * 0.2 + Math.random() * fwH * 0.25, hue: (Math.random() * 360) | 0 };
    fwExplode(fakeR);
  }
}
initFirework();

function fwLaunch(x) {
  fwRockets.push({ x: x, y: fwH - 1, vx: (Math.random() - 0.5) * 2, vy: -(12 + Math.random() * 8), hue: (Math.random() * 360) | 0 });
}

function fwExplode(r) {
  var count = isMobile ? 40 : 70;
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 2 + Math.random() * 8;
    fwParticles.push({
      x: r.x, y: r.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      hue: r.hue + (Math.random() - 0.5) * 30
    });
  }
}

function renderFirework() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (fwW !== W || fwH !== H) initFirework();
  fwTimer += 0.016;
  if (fwTimer > 0.8 + Math.random() * 1.2) {
    fwLaunch(W * 0.2 + Math.random() * W * 0.6);
    fwTimer = 0;
  }
  if (pointer.clicked && currentMode === 'firework') {
    fwLaunch(pointer.gx);
  }
  // Update rockets
  for (var i = fwRockets.length - 1; i >= 0; i--) {
    var r = fwRockets[i];
    r.x += r.vx * 0.016 * 15;
    r.y += r.vy * 0.016 * 15;
    r.vy += 5 * 0.016;
    if (r.vy > -2) { fwExplode(r); fwRockets.splice(i, 1); continue; }
    var ix = r.x | 0, iy = r.y | 0;
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) drawChar('|', ix, iy, 255, 255, 200, 1);
  }
  // Update particles
  for (var i = fwParticles.length - 1; i >= 0; i--) {
    var p = fwParticles[i];
    p.x += p.vx * 0.016 * 10;
    p.y += p.vy * 0.016 * 10;
    p.vy += 6 * 0.016;
    p.vx *= 0.99;
    p.life -= p.decay;
    if (p.life <= 0) { fwParticles.splice(i, 1); continue; }
    var ix = p.x | 0, iy = p.y | 0;
    if (ix < 0 || ix >= W || iy < 0 || iy >= H) continue;
    var ri = Math.min(RAMP_FIRE.length - 1, (p.life * RAMP_FIRE.length) | 0);
    drawCharHSL(RAMP_FIRE[ri], ix, iy, ((p.hue + 360) % 360) | 0, 90, (20 + p.life * 50) | 0);
  }
}

// ============================================================
// MODE: kaleidoscope — Symmetric kaleidoscope patterns
// ============================================================
var kalW, kalH;
function initKaleidoscope() { kalW = COLS; kalH = ROWS; }
initKaleidoscope();

function renderKaleidoscope() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (kalW !== W || kalH !== H) initKaleidoscope();
  var cx = W * 0.5, cy = H * 0.5;
  var mx = pointer.down && currentMode === 'kaleidoscope' ? pointer.gx / W : 0.5;
  var my = pointer.down && currentMode === 'kaleidoscope' ? pointer.gy / H : 0.5;
  var segments = 8;
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var dx = (x - cx) / (W * 0.5);
      var dy = (y - cy) / (H * 0.5);
      var angle = Math.atan2(dy, dx);
      var r = Math.sqrt(dx * dx + dy * dy);
      // Fold into one segment
      var segAngle = (Math.PI * 2) / segments;
      angle = ((angle % segAngle) + segAngle) % segAngle;
      if (angle > segAngle * 0.5) angle = segAngle - angle;
      // Generate pattern
      var v = Math.sin(r * 8 + time * 2 + mx * 10) * 0.5 +
              Math.sin(angle * 6 + time * 1.5 + my * 8) * 0.3 +
              Math.sin(r * 4 - time + angle * 3) * 0.2;
      v = (v + 1) * 0.5;
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (v * 360 + time * 30 + r * 100) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue | 0, 80, (10 + v * 50) | 0);
    }
  }
}

// ============================================================
// MODE: radar — Rotating radar sweep with blips
// ============================================================
var radarBlips, radarAngle, radarW, radarH, radarTargets;
function initRadar() {
  radarW = COLS; radarH = ROWS;
  radarAngle = 0;
  radarBlips = new Float32Array(radarW * radarH);
  radarTargets = [];
  for (var i = 0; i < 8; i++) {
    radarTargets.push({ a: Math.random() * Math.PI * 2, r: 0.2 + Math.random() * 0.7 });
  }
}
initRadar();

function renderRadar() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (radarW !== W || radarH !== H) initRadar();
  var cx = W * 0.5, cy = H * 0.5;
  var maxR = Math.min(cx, cy) - 1;
  radarAngle += 0.016 * 2;
  // Decay blips
  for (var i = 0; i < radarBlips.length; i++) radarBlips[i] *= 0.97;
  // Add target on click
  if (pointer.clicked && currentMode === 'radar') {
    var ta = Math.atan2(pointer.gy - cy, pointer.gx - cx);
    var tr = Math.sqrt(Math.pow(pointer.gx - cx, 2) + Math.pow(pointer.gy - cy, 2)) / maxR;
    radarTargets.push({ a: ta, r: Math.min(tr, 0.95) });
  }
  // Sweep line + detect targets
  var sweepA = radarAngle % (Math.PI * 2);
  for (var d = 0; d < maxR; d++) {
    var sx = (cx + Math.cos(sweepA) * d) | 0;
    var sy = (cy + Math.sin(sweepA) * d * 0.6) | 0;
    if (sx >= 0 && sx < W && sy >= 0 && sy < H) radarBlips[sy * W + sx] = 1;
  }
  // Light up targets near sweep
  for (var t = 0; t < radarTargets.length; t++) {
    var tg = radarTargets[t];
    var diff = Math.abs(sweepA - ((tg.a + Math.PI * 2) % (Math.PI * 2)));
    if (diff > Math.PI) diff = Math.PI * 2 - diff;
    if (diff < 0.15) {
      var tx = (cx + Math.cos(tg.a) * tg.r * maxR) | 0;
      var ty = (cy + Math.sin(tg.a) * tg.r * maxR * 0.6) | 0;
      if (tx >= 0 && tx < W && ty >= 0 && ty < H) {
        radarBlips[ty * W + tx] = 1;
        if (tx + 1 < W) radarBlips[ty * W + tx + 1] = 0.8;
        if (ty + 1 < H) radarBlips[(ty + 1) * W + tx] = 0.8;
      }
    }
  }
  // Draw circle border
  for (var a = 0; a < Math.PI * 2; a += 0.03) {
    var bx = (cx + Math.cos(a) * maxR) | 0;
    var by = (cy + Math.sin(a) * maxR * 0.6) | 0;
    if (bx >= 0 && bx < W && by >= 0 && by < H) drawChar('.', bx, by, 0, 120, 0, 0.5);
  }
  // Draw crosshair
  for (var d = -maxR; d <= maxR; d++) {
    var hx = (cx + d) | 0, hy = cy | 0;
    if (hx >= 0 && hx < W && hy >= 0 && hy < H) drawChar('-', hx, hy, 0, 60, 0, 0.2);
    var vx = cx | 0, vy = (cy + d * 0.6) | 0;
    if (vx >= 0 && vx < W && vy >= 0 && vy < H) drawChar('|', vx, vy, 0, 60, 0, 0.2);
  }
  // Draw blips
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = radarBlips[y * W + x];
      if (v < 0.05) continue;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      drawChar(RAMP_SOFT[ri], x, y, 0, (80 + v * 175) | 0, 0, v);
    }
  }
}

// MODE: fountain — Particle fountain

var ftnParts, ftnCount, ftnW, ftnH, ftnBaseX;

// ============================================================
// MODE: coral — Coral/crystal growth simulation
// ============================================================
var coralGrid, coralW, coralH, coralHues, coralActive;
function initCoral() {
  coralW = COLS; coralH = ROWS;
  coralGrid = new Uint8Array(coralW * coralH);
  coralHues = new Float32Array(coralW * coralH);
  coralActive = [];
  // Seed points along bottom
  var seeds = 5 + (Math.random() * 5) | 0;
  for (var s = 0; s < seeds; s++) {
    var sx = (coralW * (s + 0.5) / seeds) | 0;
    var sy = coralH - 1;
    var hue = (s * 360 / seeds) | 0;
    coralGrid[sy * coralW + sx] = 1;
    coralHues[sy * coralW + sx] = hue;
    coralActive.push({ x: sx, y: sy, hue: hue });
  }
}
initCoral();

function renderCoral() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (coralW !== W || coralH !== H) initCoral();
  // Add seed on click
  if (pointer.clicked && currentMode === 'coral') {
    var cx = pointer.gx | 0, cy = pointer.gy | 0;
    if (cx >= 0 && cx < W && cy >= 0 && cy < H && !coralGrid[cy * W + cx]) {
      var hue = (Math.random() * 360) | 0;
      coralGrid[cy * W + cx] = 1;
      coralHues[cy * W + cx] = hue;
      coralActive.push({ x: cx, y: cy, hue: hue });
    }
  }
  // Grow a few cells per frame
  var steps = Math.min(coralActive.length, 8);
  for (var s = 0; s < steps; s++) {
    if (coralActive.length === 0) break;
    var idx = (Math.random() * coralActive.length) | 0;
    var a = coralActive[idx];
    // Biased upward growth
    var dirs = [[-1,-1],[0,-1],[1,-1],[-1,0],[1,0],[0,-1],[0,-1]];
    var d = dirs[(Math.random() * dirs.length) | 0];
    var nx = a.x + d[0], ny = a.y + d[1];
    if (nx >= 0 && nx < W && ny >= 0 && ny < H && !coralGrid[ny * W + nx]) {
      coralGrid[ny * W + nx] = 1;
      coralHues[ny * W + nx] = a.hue + (Math.random() - 0.5) * 10;
      coralActive.push({ x: nx, y: ny, hue: coralHues[ny * W + nx] });
    }
    // Remove inactive (surrounded)
    var surrounded = true;
    for (var dy = -1; dy <= 1 && surrounded; dy++) {
      for (var dx = -1; dx <= 1 && surrounded; dx++) {
        if (dx === 0 && dy === 0) continue;
        var tx = a.x + dx, ty = a.y + dy;
        if (tx >= 0 && tx < W && ty >= 0 && ty < H && !coralGrid[ty * W + tx]) surrounded = false;
      }
    }
    if (surrounded) coralActive.splice(idx, 1);
  }
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      if (!coralGrid[y * W + x]) continue;
      var hue = coralHues[y * W + x];
      var ri = Math.min(RAMP_DENSE.length - 1, 5 + ((y / H) * (RAMP_DENSE.length - 5)) | 0);
      drawCharHSL(RAMP_DENSE[ri], x, y, ((hue + 360) % 360) | 0, 70, (25 + (1 - y / H) * 35) | 0);
    }
  }
}

  }

  if (smokeW !== W || smokeH !== H) initSmoke();
  // Clear grid

  if (pointer.down && currentMode === 'smoke') {
    pushX = (pointer.gx - W * 0.5) * 0.3;
    pushY = (pointer.gy - H * 0.5) * 0.3;
  }
  for (var i = 0; i < smokeCount; i++) {
    var p = smokeParts[i];
    if (p.life <= 0) {
      p.x = baseX + (Math.random() - 0.5) * 4;
      p.y = H - 1;
      p.vx = (Math.random() - 0.5) * 2;
      p.vy = -(3 + Math.random() * 4);
      p.life = 1;
    }
    var turb = Math.sin(p.y * 0.3 + time * 2) * 2 + Math.sin(p.x * 0.2 + time * 1.3) * 1.5;
    p.vx += (turb + pushX) * 0.016;
    p.vy += (-2 + pushY) * 0.016;
    p.vx *= 0.98;
    p.x += p.vx * 0.016 * 15;
    p.y += p.vy * 0.016 * 15;
    p.life -= 0.008;
    var ix = p.x | 0, iy = p.y | 0;
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
      smokeGrid[iy * W + ix] = Math.min(1, smokeGrid[iy * W + ix] + p.life * 0.3);
    }
  }
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = smokeGrid[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      var b = (80 + v * 150) | 0;
      drawChar(RAMP_SOFT[ri], x, y, b, b, b, v * 0.8);
    }
  }
}

// MODE: dna — Rotating DNA double helix
// ============================================================
var dnaW, dnaH, dnaRotSpeed;
function initDna() { dnaW = COLS; dnaH = ROWS; dnaRotSpeed = 2; }
initDna();

function renderDna() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (dnaW !== W || dnaH !== H) initDna();
  var cx = W * 0.5;
  var amplitude = Math.min(W * 0.3, 20);
  if (pointer.down && currentMode === 'dna') {
    dnaRotSpeed = 0.5 + (pointer.gx / W) * 5;
  }
  var bases = 'ATGC';
  var colors = [[255,80,80],[80,80,255],[80,255,80],[255,200,80]];
  for (var y = 0; y < H; y++) {
    var phase = y * 0.3 + time * dnaRotSpeed;
    var x1 = cx + Math.sin(phase) * amplitude;
    var x2 = cx + Math.sin(phase + Math.PI) * amplitude;
    var depth1 = Math.cos(phase);
    var depth2 = Math.cos(phase + Math.PI);
    // Base pair connection
    var lx = Math.min(x1, x2) | 0;
    var rx = Math.max(x1, x2) | 0;
    if (Math.abs(depth1) < 0.7) {
      for (var x = lx + 1; x < rx; x++) {
        if (x >= 0 && x < W) drawChar('-', x, y, 60, 60, 80, 0.3);
      }
    }
    // Strand 1
    var bi = (y * 7 + 1) % 4;
    var ix1 = x1 | 0;
    if (ix1 >= 0 && ix1 < W) {
      var a1 = 0.4 + (depth1 + 1) * 0.3;
      drawChar(bases[bi], ix1, y, colors[bi][0], colors[bi][1], colors[bi][2], a1);
    }
    // Strand 2
    var bi2 = (3 - bi);
    var ix2 = x2 | 0;
    if (ix2 >= 0 && ix2 < W) {
      var a2 = 0.4 + (depth2 + 1) * 0.3;
      drawChar(bases[bi2], ix2, y, colors[bi2][0], colors[bi2][1], colors[bi2][2], a2);
    }
  }
}

// ============================================================
var circGrid, circW, circH, circTraces, circNodes;
function initCircuit() {
  circW = COLS; circH = ROWS;
  circGrid = new Uint8Array(circW * circH);
  circNodes = new Float32Array(circW * circH);
  circTraces = [];
  // Spawn initial traces
  for (var i = 0; i < 8; i++) {
    circTraces.push({
      x: (Math.random() * circW) | 0,
      y: (Math.random() * circH) | 0,
      dx: Math.random() < 0.5 ? 1 : 0,
      dy: Math.random() < 0.5 ? 1 : 0,
      life: 20 + (Math.random() * 40) | 0,
      hue: (Math.random() * 360) | 0
    });
    if (circTraces[circTraces.length - 1].dx === 0 && circTraces[circTraces.length - 1].dy === 0) circTraces[circTraces.length - 1].dx = 1;
  }
}
initCircuit();

function renderCircuit() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (circW !== W || circH !== H) initCircuit();
  // Add trace on click
  if (pointer.clicked && currentMode === 'circuit') {
    circTraces.push({
      x: pointer.gx | 0, y: pointer.gy | 0,
      dx: Math.random() < 0.5 ? 1 : -1, dy: 0,
      life: 20 + (Math.random() * 40) | 0,
      hue: (Math.random() * 360) | 0
    });
  }
  // Decay node blinks
  for (var i = 0; i < circNodes.length; i++) circNodes[i] *= 0.98;
  // Grow traces
  var steps = Math.min(circTraces.length, 6);
  for (var s = 0; s < steps; s++) {
    if (circTraces.length === 0) break;
    var idx = (Math.random() * circTraces.length) | 0;
    var t = circTraces[idx];
    t.x += t.dx; t.y += t.dy; t.life--;
    if (t.x < 0 || t.x >= W || t.y < 0 || t.y >= H || t.life <= 0) {
      circTraces.splice(idx, 1); continue;
    }
    circGrid[t.y * W + t.x] = 1;
    // Turn 90 degrees randomly
    if (Math.random() < 0.15) {
      circNodes[t.y * W + t.x] = 1;
      if (t.dx !== 0) { t.dy = Math.random() < 0.5 ? 1 : -1; t.dx = 0; }
      else { t.dx = Math.random() < 0.5 ? 1 : -1; t.dy = 0; }
      // Fork
      if (Math.random() < 0.3) {
        circTraces.push({ x: t.x, y: t.y, dx: -t.dx || (Math.random() < 0.5 ? 1 : -1), dy: -t.dy || (Math.random() < 0.5 ? 1 : -1), life: 10 + (Math.random() * 20) | 0, hue: t.hue });
      }
    }
  }
  // Draw grid
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      if (!circGrid[y * W + x]) continue;
      var node = circNodes[y * W + x];
      var ch = node > 0.5 ? 'O' : (node > 0.1 ? '+' : '-');
      var blink = node > 0.5 ? Math.sin(time * 10 + x + y) * 0.5 + 0.5 : 0;
      drawChar(ch, x, y, 0, (120 + blink * 135) | 0, (80 + blink * 80) | 0, 0.6 + node * 0.4);
    }
  }
}

// ============================================================
// MODE: rain3d — Isometric 3D rain on a surface
// ============================================================
var r3dDrops, r3dCount, r3dW, r3dH, r3dSplashes;
function initRain3d() {
  r3dW = COLS; r3dH = ROWS;
  r3dCount = isMobile ? 200 : 500;
  r3dDrops = [];
  r3dSplashes = [];
  // 3 depth layers of rain covering full screen width
  for (var i = 0; i < r3dCount; i++) {
    var layer = (Math.random() * 3) | 0; // 0=far, 1=mid, 2=near
    r3dDrops.push({
      x: Math.random() * r3dW,
      y: Math.random() * r3dH,
      speed: [6, 12, 22][layer] + Math.random() * 4,
      layer: layer,
      windX: -0.5 - layer * 0.3,
      len: [1, 2, 3][layer]
    });
  }
}
initRain3d();

function renderRain3d() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (r3dW !== W || r3dH !== H) initRain3d();
  // Draw ground puddles at bottom 15%
  var groundY = (H * 0.85) | 0;
  for (var gy = groundY; gy < H; gy++) {
    for (var gx = 0; gx < W; gx++) {
      var wave = Math.sin(gx * 0.3 + time * 2 + gy * 0.5) * 0.15;
      var ch = Math.random() < 0.15 ? '~' : (((gx + gy) & 1) === 0 ? '.' : ' ');
      drawChar(ch, gx, gy, 20, 25, (50 + wave * 40) | 0, 0.15 + wave);
    }
  }
  // Decay and draw splashes
  for (var i = r3dSplashes.length - 1; i >= 0; i--) {
    var sp = r3dSplashes[i];
    sp.age += 0.016;
    if (sp.age > 0.5) { r3dSplashes.splice(i, 1); continue; }
    var alpha = 1 - sp.age / 0.5;
    var rad = sp.age * 5;
    // Expanding ring
    for (var a = 0; a < 6; a++) {
      var ang = a * Math.PI / 3;
      var rx = (sp.x + Math.cos(ang) * rad) | 0;
      var ry = (sp.y + Math.sin(ang) * rad * 0.3) | 0;
      if (rx >= 0 && rx < W && ry >= 0 && ry < H) {
        drawChar('·', rx, ry, 140, 170, 255, alpha * 0.7);
      }
    }
    // Center splash
    if (sp.age < 0.15) {
      var sx = sp.x | 0, sy = sp.y | 0;
      if (sx >= 0 && sx < W && sy >= 0 && sy < H) drawChar('*', sx, sy, 200, 220, 255, alpha);
    }
  }
  // Pointer interaction — umbrella effect, repels rain
  var umbX = -100, umbY = -100;
  if (pointer.down && currentMode === 'rain3d') {
    umbX = pointer.gx; umbY = pointer.gy;
    // Draw umbrella hint
    var ux = umbX | 0, uy = umbY | 0;
    for (var dx = -4; dx <= 4; dx++) {
      var px = ux + dx;
      if (px >= 0 && px < W && uy >= 0 && uy < H) {
        drawChar('_', px, uy, 200, 200, 255, 0.4);
      }
    }
  }
  if (pointer.clicked && currentMode === 'rain3d') {
    // Lightning flash — brief bright column
    var lx = (pointer.gx | 0);
    for (var ly = 0; ly < H; ly++) {
      if (lx >= 0 && lx < W) drawChar('|', lx, ly, 255, 255, 255, 0.8 * Math.random());
    }
    // Burst of splashes around click
    for (var bi = 0; bi < 8; bi++) {
      r3dSplashes.push({ x: pointer.gx + (Math.random() - 0.5) * 10, y: pointer.gy + (Math.random() - 0.5) * 3, age: 0 });
    }
  }
  // Update and draw rain — by layer (far first, near last for overlap)
  for (var layer = 0; layer < 3; layer++) {
    var chars = [':', '|', '|'][layer];
    var alphaBase = [0.15, 0.35, 0.7][layer];
    var r = [60, 100, 160][layer];
    var g = [70, 120, 180][layer];
    var b = [120, 180, 255][layer];
    for (var i = 0; i < r3dDrops.length; i++) {
      var d = r3dDrops[i];
      if (d.layer !== layer) continue;
      d.y += d.speed * 0.016;
      d.x += d.windX * 0.016;
      // Umbrella repel
      var udx = d.x - umbX, udy = d.y - umbY;
      if (udx * udx + udy * udy < 25) {
        d.x += udx * 0.4;
        d.y -= 0.5;
      }
      if (d.y > groundY) {
        // Splash on ground
        if (r3dSplashes.length < 60) r3dSplashes.push({ x: d.x, y: groundY, age: 0 });
        d.y = -d.len;
        d.x = Math.random() * W;
      }
      if (d.x < -2) d.x = W + 1;
      var ix = d.x | 0;
      if (ix < 0 || ix >= W) continue;
      for (var s = 0; s < d.len; s++) {
        var sy = (d.y - s) | 0;
        if (sy >= 0 && sy < H) {
          drawChar(chars, ix, sy, r, g, b, alphaBase * (1 - s * 0.25));
        }
      }
    }
  }
}

// ============================================================
// MODE: boids — Flocking simulation with predator
// ============================================================
var boidList, boidPred, boidCount, boidW, boidH;
function initBoids() {
  boidW = COLS; boidH = ROWS;
  boidCount = isMobile ? 100 : 200;
  boidList = [];
  for (var i = 0; i < boidCount; i++) {
    boidList.push({
      x: Math.random() * boidW,
      y: Math.random() * boidH,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4
    });
  }
  boidPred = { x: boidW * 0.5, y: boidH * 0.5, vx: 1, vy: 1 };
}
initBoids();

function renderBoids() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (boidW !== W || boidH !== H) initBoids();
  var sep = 3, ali = 5, coh = 5, predR = 10, maxSpd = 8;
  // Update predator — chase nearest boid
  var nearest = null, nearDist = 999;
  for (var i = 0; i < boidCount; i++) {
    var dx = boidList[i].x - boidPred.x, dy = boidList[i].y - boidPred.y;
    var d = dx * dx + dy * dy;
    if (d < nearDist) { nearDist = d; nearest = boidList[i]; }
  }
  if (nearest) {
    boidPred.vx += (nearest.x - boidPred.x) * 0.02;
    boidPred.vy += (nearest.y - boidPred.y) * 0.02;
  }
  var ps = Math.sqrt(boidPred.vx * boidPred.vx + boidPred.vy * boidPred.vy);
  if (ps > 6) { boidPred.vx *= 6 / ps; boidPred.vy *= 6 / ps; }
  boidPred.x += boidPred.vx; boidPred.y += boidPred.vy;
  if (boidPred.x < 0) boidPred.x = W; if (boidPred.x > W) boidPred.x = 0;
  if (boidPred.y < 0) boidPred.y = H; if (boidPred.y > H) boidPred.y = 0;
  // Pointer as second predator
  var px2 = -999, py2 = -999;
  if (pointer.down && currentMode === 'boids') { px2 = pointer.gx; py2 = pointer.gy; }
  // Update boids
  for (var i = 0; i < boidCount; i++) {
    var b = boidList[i];
    var sx = 0, sy = 0, ax = 0, ay = 0, cx = 0, cy = 0, sc = 0, ac = 0, cc = 0;
    for (var j = 0; j < boidCount; j++) {
      if (i === j) continue;
      var dx = boidList[j].x - b.x, dy = boidList[j].y - b.y;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < sep) { sx -= dx / (d + 0.1); sy -= dy / (d + 0.1); sc++; }
      if (d < ali) { ax += boidList[j].vx; ay += boidList[j].vy; ac++; }
      if (d < coh) { cx += boidList[j].x; cy += boidList[j].y; cc++; }
    }
    if (sc > 0) { b.vx += sx * 0.15; b.vy += sy * 0.15; }
    if (ac > 0) { b.vx += (ax / ac - b.vx) * 0.05; b.vy += (ay / ac - b.vy) * 0.05; }
    if (cc > 0) { b.vx += (cx / cc - b.x) * 0.005; b.vy += (cy / cc - b.y) * 0.005; }
    // Flee predator
    var dpx = b.x - boidPred.x, dpy = b.y - boidPred.y;
    var dp = Math.sqrt(dpx * dpx + dpy * dpy);
    if (dp < predR) { b.vx += dpx / (dp + 0.1) * 2; b.vy += dpy / (dp + 0.1) * 2; }
    // Flee pointer
    var dpx2 = b.x - px2, dpy2 = b.y - py2;
    var dp2 = Math.sqrt(dpx2 * dpx2 + dpy2 * dpy2);
    if (dp2 < predR) { b.vx += dpx2 / (dp2 + 0.1) * 2; b.vy += dpy2 / (dp2 + 0.1) * 2; }
    var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (spd > maxSpd) { b.vx *= maxSpd / spd; b.vy *= maxSpd / spd; }
    b.x += b.vx * 0.5; b.y += b.vy * 0.5;
    if (b.x < 0) b.x += W; if (b.x >= W) b.x -= W;
    if (b.y < 0) b.y += H; if (b.y >= H) b.y -= H;
    var ix = b.x | 0, iy = b.y | 0;
    if (ix >= 0 && ix < W && iy >= 0 && iy < H) {
      drawCharHSL('>', ix, iy, 200, 80, 55);
    }
  }
  // Draw predator
  var pix = boidPred.x | 0, piy = boidPred.y | 0;
  if (pix >= 0 && pix < W && piy >= 0 && piy < H) drawChar('@', pix, piy, 255, 50, 50, 1);
}

// MODE: waves3d — 3D wireframe ocean waves
// ============================================================
var w3dW, w3dH, w3dGX, w3dGZ;
function initWaves3d() {
  w3dW = COLS; w3dH = ROWS;
  w3dGX = 40; w3dGZ = 25;
}
initWaves3d();

function renderWaves3d() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (w3dW !== W || w3dH !== H) initWaves3d();
  var cx = W * 0.5, cy = H * 0.4;
  var clickWx = -999, clickWz = -999;
  if (pointer.down && currentMode === 'waves3d') {
    clickWx = (pointer.gx - cx) * 0.1;
    clickWz = (pointer.gy - cy) * 0.2;
  }
  for (var gz = w3dGZ - 1; gz >= 0; gz--) {
    for (var gx = -w3dGX / 2; gx < w3dGX / 2; gx++) {
      var wx = gx, wz = gz;
      var h = Math.sin(wx * 0.5 + time * 2) * 1.5 +
              Math.sin(wz * 0.4 + time * 1.5) * 1.2 +
              Math.sin(wx * 0.3 + wz * 0.3 + time * 1.8) * 0.8;
      // Pointer wave
      if (clickWx > -100) {
        var dd = (wx - clickWx) * (wx - clickWx) + (wz - clickWz) * (wz - clickWz);
        h += Math.sin(Math.sqrt(dd) * 2 - time * 5) * 3 / (1 + dd * 0.1);
      }
      // Project to screen
      var sx = cx + (gx - gz * 0.3) * 2.5;
      var sy = cy + gz * 1.2 - h * 2;
      var ix = sx | 0, iy = sy | 0;
      if (ix < 0 || ix >= W || iy < 0 || iy >= H) continue;
      var depth = 1 - gz / w3dGZ;
      var v = (h + 3) / 6;
      var ch = v > 0.6 ? '~' : (v > 0.4 ? '-' : '.');
      drawCharHSL(ch, ix, iy, (200 + h * 10) | 0, 70, (15 + depth * 40 + v * 15) | 0);
    }
  }

// ============================================================
// MODE: tree — Fractal tree with wind
// ============================================================
var treeTrunks, treeW, treeH, treeBuf;
function initTree() {
  treeW = COLS; treeH = ROWS;
  treeTrunks = [];
  treeBuf = new Float32Array(treeW * treeH * 3); // r,g,b packed
  // Plant initial trees
  var count = Math.max(1, Math.min(3, (treeW / 30) | 0));
  for (var i = 0; i < count; i++) {
    treeTrunks.push({ x: treeW * (i + 0.5) / count, y: treeH - 1 });
  }
}
initTree();

function treeDrawBranch(x, y, angle, len, depth, hue) {
  if (depth <= 0 || len < 1) return;
  var wind = Math.sin(time * 1.5 + x * 0.1) * 0.1 * depth;
  if (pointer.down && currentMode === 'tree') {
    wind += (pointer.gx - treeW * 0.5) / treeW * 0.3 * depth;
  }
  var ex = x + Math.cos(angle + wind) * len;
  var ey = y + Math.sin(angle + wind) * len;
  // Draw line (Bresenham-lite)
  var steps = (len * 1.5) | 0;
  for (var s = 0; s <= steps; s++) {
    var t = s / steps;
    var px = (x + (ex - x) * t) | 0;
    var py = (y + (ey - y) * t) | 0;
    if (px >= 0 && px < treeW && py >= 0 && py < treeH) {
      var idx = (py * treeW + px) * 3;
      if (depth > 3) {
        treeBuf[idx] = 0.4; treeBuf[idx + 1] = 0.25; treeBuf[idx + 2] = 0.1;
      } else {
        treeBuf[idx] = 0.2; treeBuf[idx + 1] = 0.6 + Math.sin(hue) * 0.2; treeBuf[idx + 2] = 0.15;
      }
    }
  }
  // Leaves at tips
  if (depth <= 2) {
    var lx = ex | 0, ly = ey | 0;
    if (lx >= 0 && lx < treeW && ly >= 0 && ly < treeH) {
      var idx = (ly * treeW + lx) * 3;
      treeBuf[idx] = 0.1; treeBuf[idx + 1] = 0.8; treeBuf[idx + 2] = 0.2;
    }
  }
  var spread = 0.4 + Math.sin(time * 0.3) * 0.05;
  treeDrawBranch(ex, ey, angle - spread, len * 0.72, depth - 1, hue + 0.3);
  treeDrawBranch(ex, ey, angle + spread, len * 0.72, depth - 1, hue - 0.3);
  if (depth > 4 && Math.random() < 0.3) {
    treeDrawBranch(ex, ey, angle + (Math.random() - 0.5) * 0.8, len * 0.5, depth - 2, hue);
  }
}

function renderTree() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (treeW !== W || treeH !== H) initTree();
  // Add tree on click
  if (pointer.clicked && currentMode === 'tree') {
    treeTrunks.push({ x: pointer.gx, y: H - 1 });
  }
  // Clear buffer
  for (var i = 0; i < treeBuf.length; i++) treeBuf[i] = 0;
  // Draw all trees
  for (var t = 0; t < treeTrunks.length; t++) {
    var tr = treeTrunks[t];

// MODE: chem — Chemistry molecular simulation
// ============================================================

      x: Math.random() * chemW,
      y: Math.random() * chemH,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,

  clearCanvas();

    for (var i = 0; i < chemCount; i++) {
      var dx = chemMols[i].x - pointer.gx, dy = chemMols[i].y - pointer.gy;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < 10) {
        chemMols[i].vx += dx / (d + 0.1) * 0.5;
        chemMols[i].vy += dy / (d + 0.1) * 0.5;
      }
    }
  }
  // Lennard-Jones forces
  for (var i = 0; i < chemCount; i++) {
    var a = chemMols[i];
    for (var j = i + 1; j < chemCount; j++) {
      var b = chemMols[j];
      var dx = b.x - a.x, dy = b.y - a.y;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < 0.5) d = 0.5;
      var sigma = 3;
      var r6 = Math.pow(sigma / d, 6);
      var f = 24 * (2 * r6 * r6 - r6) / d;
      f = Math.max(-2, Math.min(2, f));
      var fx = f * dx / d, fy = f * dy / d;
      a.vx -= fx * 0.1; a.vy -= fy * 0.1;
      b.vx += fx * 0.1; b.vy += fy * 0.1;
    }
  }
  // Update positions
  for (var i = 0; i < chemCount; i++) {
    var m = chemMols[i];
    m.vx *= 0.99; m.vy *= 0.99;
    var spd = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
    if (spd > 10) { m.vx *= 10 / spd; m.vy *= 10 / spd; }
    m.x += m.vx * 0.3; m.y += m.vy * 0.3;
    if (m.x < 1) { m.x = 1; m.vx *= -0.8; }
    if (m.x > W - 2) { m.x = W - 2; m.vx *= -0.8; }
    if (m.y < 1) { m.y = 1; m.vy *= -0.8; }
    if (m.y > H - 2) { m.y = H - 2; m.vy *= -0.8; }
  }

    for (var j = i + 1; j < chemCount; j++) {
      var dx = chemMols[j].x - chemMols[i].x, dy = chemMols[j].y - chemMols[i].y;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < 5) {
        var steps = (d * 1.5) | 0;
        for (var s = 1; s < steps; s++) {
          var t = s / steps;
          var bx = (chemMols[i].x + dx * t) | 0;
          var by = (chemMols[i].y + dy * t) | 0;

    var m = chemMols[i];

    var spd = Math.sqrt(m.vx * m.vx + m.vy * m.vy);

}

// MODE: conway3 — 3-state cellular automaton (Brian's Brain)
// ============================================================
var c3Grid, c3Next, c3W, c3H;
function initConway3() {
  c3W = COLS; c3H = ROWS;

  c3Next = new Uint8Array(c3W * c3H);
  // Random initial state
  for (var i = 0; i < c3Grid.length; i++) {
    c3Grid[i] = Math.random() < 0.1 ? 2 : 0; // 0=dead, 1=dying, 2=alive
  }
}

function renderConway3() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (c3W !== W || c3H !== H) initConway3();
  // Click to toggle
  if (pointer.clicked && currentMode === 'conway3') {
    var cx = pointer.gx | 0, cy = pointer.gy | 0;
    if (cx >= 0 && cx < W && cy >= 0 && cy < H) {
      c3Grid[cy * W + cx] = c3Grid[cy * W + cx] === 2 ? 0 : 2;
    }
  }
  // Brian's Brain rules
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var state = c3Grid[y * W + x];
      if (state === 2) {
        c3Next[y * W + x] = 1; // alive -> dying
      } else if (state === 1) {
        c3Next[y * W + x] = 0; // dying -> dead
      } else {
        // dead -> alive if exactly 2 alive neighbors
        var alive = 0;
        for (var dy = -1; dy <= 1; dy++) {
          for (var dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            var nx = (x + dx + W) % W, ny = (y + dy + H) % H;
            if (c3Grid[ny * W + nx] === 2) alive++;
          }
        }
        c3Next[y * W + x] = alive === 2 ? 2 : 0;
      }
    }
  }
  // Swap
  var tmp = c3Grid; c3Grid = c3Next; c3Next = tmp;
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var s = c3Grid[y * W + x];
      if (s === 0) continue;
      if (s === 2) {
        drawCharHSL('#', x, y, 40, 90, 55);
      } else {
        drawCharHSL('.', x, y, 200, 70, 35);
      }
    }
  }
}

// MODE: wfc — Wave Function Collapse visualization
// ============================================================
var wfcGrid, wfcW, wfcH, wfcGW, wfcGH, wfcTiles, wfcQueue, wfcDone, wfcTimer;

function initWfc() {

function wfcAddNeighbors(x, y) {
  var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (var d = 0; d < 4; d++) {
    var nx = x + dirs[d][0], ny = y + dirs[d][1];

      var already = false;
      for (var q = 0; q < wfcQueue.length; q++) {
        if (wfcQueue[q].x === nx && wfcQueue[q].y === ny) { already = true; break; }
      }
      if (!already) wfcQueue.push({ x: nx, y: ny });
    }
  }
}

  clearCanvas();
  var W = COLS, H = ROWS;

          if (nx >= 0 && nx < wfcGW && ny >= 0 && ny < wfcGH) {

    }
  }
  // Hold to disrupt — erase cells around pointer
  if (pointer.down && currentMode === 'wfc') {
    var ox2 = ((W - wfcGW) * 0.5) | 0;
    var oy2 = ((H - wfcGH) * 0.5) | 0;
    var cx = (pointer.gx - ox2) | 0, cy = (pointer.gy - oy2) | 0;
    for (var dy = -1; dy <= 1; dy++) {
      for (var dx = -1; dx <= 1; dx++) {

        if (nx >= 0 && nx < wfcGW && ny >= 0 && ny < wfcGH && wfcGrid[ny * wfcGW + nx] >= 0) {

buttons.forEach(function(b) {
  b.addEventListener('click', function() { switchMode(b.dataset.mode); scrollNavToMode(b.dataset.mode); });
});

// Random mode picker
function getRandomMode() {
  var modeKeys = Object.keys(renderers);
  // Exclude vid modes that need user input
  var filtered = modeKeys.filter(function(m) { return m !== 'vidascii'; });
  return filtered[Math.floor(Math.random() * filtered.length)];
}

// Logo click → random mode
document.getElementById('logo-btn').addEventListener('click', function() {
  var mode = getRandomMode();
  switchMode(mode);
  scrollNavToMode(mode);
});

// URL-based mode routing
function getModeFromPath() {
  var path = window.location.pathname.replace(/\/+$/, '');
  var parts = path.split('/');
  var last = parts[parts.length - 1];
  if (last && renderers[last]) return last;
  return getRandomMode();
}

function updateURL(mode) {
  var base = window.location.pathname.replace(/\/+$/, '').split('/');
  // Remove trailing mode if present
  if (base.length > 1 && renderers[base[base.length - 1]]) base.pop();
  var newPath = base.join('/') + '/' + mode;
  history.replaceState(null, '', newPath);
}

function scrollNavToMode(mode, instant) {
  var container = document.querySelector('.nav-buttons');
  var btn = container.querySelector('button[data-mode="' + mode + '"]');
  if (btn) {
    var containerRect = container.getBoundingClientRect();
    var btnRect = btn.getBoundingClientRect();
    var scrollLeft = btn.offsetLeft - containerRect.width / 2 + btnRect.width / 2;
    container.scrollTo({ left: Math.max(0, scrollLeft), behavior: instant ? 'instant' : 'smooth' });
  }
}

// Mouse wheel horizontal scrolling on nav bar (desktop)
var navBtnsEl = document.querySelector('.nav-buttons');
navBtnsEl.addEventListener('wheel', function(e) {
  e.preventDefault();
  navBtnsEl.scrollLeft += e.deltaY || e.deltaX;
}, { passive: false });

// Wait for font to load before starting
document.fonts.ready.then(function() {
  resize();
  var startMode = getModeFromPath();
  if (startMode !== 'lava') switchMode(startMode);
  scrollNavToMode(startMode, true);
  // Reveal nav after scroll is positioned — no flash
  var nav = document.querySelector('nav');
  nav.style.visibility = 'visible';
  nav.style.opacity = '1';
  loop();
});
