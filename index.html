  var g = screenToGrid(e.clientX, e.clientY);
  pulsePointerX = g.gx; pulsePointerY = g.gy;
  if (pulseRings.length >= MAX_PULSE_RINGS) pulseRings.shift();
  pulseRings.push({ x: g.gx, y: g.gy, born: time, strength: 1.5 });
});
canvas.addEventListener('mousemove', function(e) {
  if (!pulsePointerDown || currentMode !== 'pulse') return;
  var g = screenToGrid(e.clientX, e.clientY);
  pulsePointerX = g.gx; pulsePointerY = g.gy;
});
canvas.addEventListener('mouseup', function() { if (currentMode === 'pulse') pulsePointerDown = false; });

canvas.addEventListener('touchstart', function(e) {
  if (currentMode !== 'pulse') return;
  e.preventDefault();
  pulsePointerDown = true;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  pulsePointerX = g.gx; pulsePointerY = g.gy;
  if (pulseRings.length >= MAX_PULSE_RINGS) pulseRings.shift();
  pulseRings.push({ x: g.gx, y: g.gy, born: time, strength: 1.5 });
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  if (!pulsePointerDown || currentMode !== 'pulse') return;
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  pulsePointerX = g.gx; pulsePointerY = g.gy;
}, { passive: true });
canvas.addEventListener('touchend', function() { if (currentMode === 'pulse') pulsePointerDown = false; });

function renderPulse() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Continuous emit while held
  if (pulsePointerDown) {
    pulseSpawnTimer2++;
    if (pulseSpawnTimer2 % 15 === 0) {
      if (pulseRings.length >= MAX_PULSE_RINGS) pulseRings.shift();
      pulseRings.push({ x: pulsePointerX, y: pulsePointerY, born: time, strength: 1 });
    }
  }

  // Prune old
  var i = pulseRings.length;
  while (i--) { if (time - pulseRings[i].born > 10) pulseRings.splice(i, 1); }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var px = x * 0.55;
      // Base noise terrain that pulses reveal
      var terrain = fbm(x * 0.04, y * 0.06, 3) * 0.5 + 0.5;
      var totalPulse = 0;

      for (var r = 0; r < pulseRings.length; r++) {
        var ring = pulseRings[r];
        var age = time - ring.born;
        var dx = px - ring.x * 0.55, dy = y - ring.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        var radius = age * 5;
        var ringWidth = 2 + age * 0.5;
        var ringDist = Math.abs(d - radius);
        if (ringDist < ringWidth) {
          var fade = Math.max(0, 1 - age / 10);
          var ringFade = 1 - ringDist / ringWidth;
          totalPulse += ring.strength * fade * ringFade;
        }
        // Also illuminate inside the ring (sonar reveal)
        if (d < radius) {
          var innerFade = Math.max(0, 1 - age / 10) * 0.15;
          totalPulse += innerFade * terrain;
        }
      }

      if (totalPulse < 0.05) continue;
      totalPulse = Math.min(1, totalPulse);

      var v = totalPulse * terrain + totalPulse * 0.3;
      v = Math.min(1, v);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (160 + terrain * 40 + totalPulse * 60) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 60 + v * 40, 15 + v * 55);
    }
  }
}

// ============================================================
// WORM — Click to spawn text-eating worms
// ============================================================

var worms = [];
var wormGrid;
var wormTrail;
var MAX_WORMS = 30;

function initWorm() {
  worms = [];
  var sz = COLS * ROWS;
  wormGrid = new Uint8Array(sz);
  wormTrail = new Float32Array(sz);
  // Fill grid with characters
  for (var i = 0; i < sz; i++) wormGrid[i] = 1;
}
initWorm();

canvas.addEventListener('mousedown', function(e) {
  if (currentMode !== 'worm') return;
  var g = screenToGrid(e.clientX, e.clientY);
  spawnWorm(g.gx, g.gy);
});
canvas.addEventListener('touchstart', function(e) {
  if (currentMode !== 'worm') return;
  e.preventDefault();
  var t = e.touches[0];
  var g = screenToGrid(t.clientX, t.clientY);
  spawnWorm(g.gx, g.gy);
}, { passive: false });

function spawnWorm(gx, gy) {
  if (worms.length >= MAX_WORMS) worms.shift();
  var angle = Math.random() * Math.PI * 2;
  var segments = [];
  for (var i = 0; i < 8; i++) {
    segments.push({ x: gx - Math.cos(angle) * i, y: gy - Math.sin(angle) * i });
  }
  worms.push({
    segments: segments,
    angle: angle,
    speed: 0.3 + Math.random() * 0.3,
    turnRate: 0.1 + Math.random() * 0.15,
    hue: (Math.random() * 360) | 0,
    life: 15 + Math.random() * 20,
    born: time
  });
}

function renderWorm() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!wormGrid || wormGrid.length !== W * H) initWorm();

  // Decay trail glow
  for (var i = 0; i < wormTrail.length; i++) wormTrail[i] *= 0.97;

  // Update worms
  var i = worms.length;
  while (i--) {
    var w = worms[i];
    var age = time - w.born;
    if (age > w.life) { worms.splice(i, 1); continue; }

    // Steer — random wandering with bias toward uneaten areas
    w.angle += (Math.random() - 0.5) * w.turnRate * 2;

    // Look ahead and prefer uneaten cells
    var bestAngle = w.angle;
    var bestFood = 0;
    for (var a = -3; a <= 3; a++) {
      var testAngle = w.angle + a * 0.3;
      var lookX = (w.segments[0].x + Math.cos(testAngle) * 3) | 0;
      var lookY = (w.segments[0].y + Math.sin(testAngle) * 3) | 0;
      if (lookX >= 0 && lookX < W && lookY >= 0 && lookY < H) {
        var food = wormGrid[lookY * W + lookX];
        if (food > bestFood) { bestFood = food; bestAngle = testAngle; }
      }
    }
    w.angle = w.angle * 0.7 + bestAngle * 0.3;

    // Move head
    var head = w.segments[0];
    var newX = head.x + Math.cos(w.angle) * w.speed;
    var newY = head.y + Math.sin(w.angle) * w.speed;

    // Wrap
    if (newX < 0) newX += W; if (newX >= W) newX -= W;
    if (newY < 0) newY += H; if (newY >= H) newY -= H;

    // Shift segments
    for (var s = w.segments.length - 1; s > 0; s--) {
      w.segments[s].x = w.segments[s - 1].x;
      w.segments[s].y = w.segments[s - 1].y;
    }
    w.segments[0] = { x: newX, y: newY };

    // Eat grid and leave trail
    var gx = newX | 0, gy = newY | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      wormGrid[gy * W + gx] = 0;
      wormTrail[gy * W + gx] = 1;
    }

    // Draw worm body
    for (var s = 0; s < w.segments.length; s++) {
      var seg = w.segments[s];
      var sgx = seg.x | 0, sgy = seg.y | 0;
      if (sgx >= 0 && sgx < W && sgy >= 0 && sgy < H) {
        var brightness = 1 - s / w.segments.length;
        var ch = s === 0 ? '@' : (s < 3 ? '#' : '*');
        var fade = Math.max(0, 1 - age / w.life);
        drawCharHSL(ch, sgx, sgy, w.hue, 70 + brightness * 30, 30 + brightness * 50 * fade);
      }
    }
  }

  // Render grid (uneaten chars)
  var gridChars = '.:;=+*#';
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      if (wormGrid[idx] === 0) {
        // Show trail glow
        var tv = wormTrail[idx];
        if (tv > 0.05) {
          var ri = Math.min(RAMP_SOFT.length - 1, (tv * RAMP_SOFT.length) | 0);
          drawCharHSL(RAMP_SOFT[ri], x, y, 100, 50, 10 + tv * 20);
        }
        continue;
      }
      var n = simplex2(x * 0.06 + time * 0.05, y * 0.08) * 0.5 + 0.5;
      if (n < 0.15) continue;
      var ci = Math.min(gridChars.length - 1, (n * gridChars.length) | 0);
      drawCharHSL(gridChars[ci], x, y, (120 + n * 40) % 360, 40 + n * 30, 10 + n * 25);
    }
  }

  // Slowly regrow eaten cells
  if (worms.length === 0) {
    for (var r = 0; r < 10; r++) {
      var rx = Math.floor(Math.random() * W);
      var ry = Math.floor(Math.random() * H);
      wormGrid[ry * W + rx] = 1;
    }
  }
}

// ============================================================
// SNAKE — Click to steer a growing snake
// ============================================================

var snakeBody = [];
var snakeAngle = 0;
var snakeTrailGrid;
var snakeTarget = null;

function initSnake() {
  snakeBody = [{ x: COLS / 2, y: ROWS / 2 }];
  snakeAngle = -Math.PI / 2;
  snakeTrailGrid = new Float32Array(COLS * ROWS);
  snakeTarget = null;
}
initSnake();

function renderSnake() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!snakeTrailGrid || snakeTrailGrid.length !== W * H) initSnake();

  // Click sets target direction
  if (pointer.clicked && currentMode === 'snake') {
    pointer.clicked = false;
    snakeTarget = { x: pointer.gx, y: pointer.gy };
  }
  if (pointer.down && currentMode === 'snake') {
    snakeTarget = { x: pointer.gx, y: pointer.gy };
  }

  // Steer toward target
  if (snakeTarget) {
    var head = snakeBody[0];
    var targetAngle = Math.atan2(snakeTarget.y - head.y, snakeTarget.x - head.x);
    var diff = targetAngle - snakeAngle;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    snakeAngle += diff * 0.08;
  }

  // Move head
  var speed = 0.4;
  var newHead = {
    x: snakeBody[0].x + Math.cos(snakeAngle) * speed,
    y: snakeBody[0].y + Math.sin(snakeAngle) * speed
  };
  // Wrap
  if (newHead.x < 0) newHead.x += W; if (newHead.x >= W) newHead.x -= W;
  if (newHead.y < 0) newHead.y += H; if (newHead.y >= H) newHead.y -= H;

  snakeBody.unshift(newHead);
  if (snakeBody.length > 200) snakeBody.pop();

  // Trail decay
  for (var i = 0; i < snakeTrailGrid.length; i++) snakeTrailGrid[i] *= 0.995;

  // Draw snake and trail
  for (var s = 0; s < snakeBody.length; s++) {
    var seg = snakeBody[s];
    var gx = seg.x | 0, gy = seg.y | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      snakeTrailGrid[gy * W + gx] = Math.min(1, snakeTrailGrid[gy * W + gx] + 0.3);
    }
  }

  // Render trail
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = snakeTrailGrid[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (120 + v * 40 + time * 15) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 60 + v * 40, 15 + v * 55);
    }
  }

  // Draw snake body brighter
  for (var s = 0; s < snakeBody.length; s++) {
    var seg = snakeBody[s];
    var gx = seg.x | 0, gy = seg.y | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      var bright = 1 - s / snakeBody.length;
      var ch = s === 0 ? '@' : (s < 5 ? '#' : '*');
      drawCharHSL(ch, gx, gy, (140 + bright * 30) % 360, 80, 30 + bright * 50);
    }
  }
}

// ============================================================
// FLUID — Click/drag to push fluid velocity field
// ============================================================

var fluidVX, fluidVY, fluidDens;

function initFluid() {
  var sz = COLS * ROWS;
  fluidVX = new Float32Array(sz);
  fluidVY = new Float32Array(sz);
  fluidDens = new Float32Array(sz);
  // Seed some initial density
  for (var i = 0; i < sz; i++) fluidDens[i] = Math.random() * 0.2;
}
initFluid();

function renderFluid() {
  clearCanvas();
  var W = COLS, H = ROWS, sz = W * H;
  if (!fluidDens || fluidDens.length !== sz) initFluid();

  // Click adds velocity and density
  if (pointer.down && currentMode === 'fluid') {
    var fx = pointer.gx | 0, fy = pointer.gy | 0;
    for (var fdy = -3; fdy <= 3; fdy++) {
      for (var fdx = -3; fdx <= 3; fdx++) {
        var nx = fx + fdx, ny = fy + fdy;
        if (nx >= 1 && nx < W - 1 && ny >= 1 && ny < H - 1) {
          var idx = ny * W + nx;
          fluidDens[idx] = Math.min(fluidDens[idx] + 0.15, 1);
          // Add velocity in drag direction (based on pointer movement heuristic)
          fluidVX[idx] += (Math.random() - 0.5) * 0.3;
          fluidVY[idx] += (Math.random() - 0.5) * 0.3 - 0.1;
        }
      }
    }
  }

  // Simple advection + diffusion
  var newDens = new Float32Array(sz);
  var newVX = new Float32Array(sz);
  var newVY = new Float32Array(sz);

  for (var y = 1; y < H - 1; y++) {
    for (var x = 1; x < W - 1; x++) {
      var idx = y * W + x;
      // Advect density
      var srcX = x - fluidVX[idx];
      var srcY = y - fluidVY[idx];
      srcX = Math.max(0.5, Math.min(W - 1.5, srcX));
      srcY = Math.max(0.5, Math.min(H - 1.5, srcY));
      var sx0 = srcX | 0, sy0 = srcY | 0;
      var sx1 = sx0 + 1, sy1 = sy0 + 1;
      var fx = srcX - sx0, fy = srcY - sy0;
      newDens[idx] = (1 - fx) * (1 - fy) * fluidDens[sy0 * W + sx0] +
                     fx * (1 - fy) * fluidDens[sy0 * W + sx1] +
                     (1 - fx) * fy * fluidDens[sy1 * W + sx0] +
                     fx * fy * fluidDens[sy1 * W + sx1];

      // Diffuse velocity
      newVX[idx] = fluidVX[idx] * 0.99 + (fluidVX[idx - 1] + fluidVX[idx + 1] + fluidVX[idx - W] + fluidVX[idx + W] - 4 * fluidVX[idx]) * 0.1;
      newVY[idx] = fluidVY[idx] * 0.99 + (fluidVY[idx - 1] + fluidVY[idx + 1] + fluidVY[idx - W] + fluidVY[idx + W] - 4 * fluidVY[idx]) * 0.1;
      newDens[idx] *= 0.998;
    }
  }
  fluidDens = newDens; fluidVX = newVX; fluidVY = newVY;

  // Render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = fluidDens[y * W + x];
      if (v < 0.02) continue;
      v = Math.min(1, v);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var vel = Math.sqrt(fluidVX[y * W + x] * fluidVX[y * W + x] + fluidVY[y * W + x] * fluidVY[y * W + x]);
      var hue = (200 + vel * 100 + time * 10) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 60 + v * 40, 15 + v * 50);
    }
  }
}

    });
    if (spirals.length > 15) spirals.shift();

  // Decay
  for (var i = 0; i < spiralGrid.length; i++) spiralGrid[i] *= 0.97;

  // Draw spirals
  for (var si = 0; si < spirals.length; si++) {
    var sp = spirals[si];
    var age = time - sp.born;
    if (age > 25) { spirals.splice(si, 1); si--; continue; }
    var maxAngle = age * 3 * sp.speed;

    for (var a = 0; a < maxAngle; a += 0.15) {
      var r = a * 0.4;
      var px = sp.x + Math.cos(a * sp.dir) * r;
      var py = sp.y + Math.sin(a * sp.dir) * r * 0.6; // aspect correction
      var gx = px | 0, gy = py | 0;
      if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
        var brightness = fade * (1 - a / (maxAngle + 1));
        spiralGrid[gy * W + gx] = Math.min(1, spiralGrid[gy * W + gx] + brightness * 0.3);
      }

  }

  // Render

    for (var x = 0; x < W; x++) {

}

// ============================================================
// CIPHER — Click to decode/encrypt text in expanding circles
// ============================================================

var cipherDecodes = [];
var cipherText;

function initCipher() {
  cipherDecodes = [];
  cipherText = [];
  var msg = 'THE QUICK BROWN FOX JUMPS OVER THE LAZY DOG -- TEXTFLOW CIPHER MODE -- SEBLAND.COM -- ';
  for (var y = 0; y < ROWS; y++) {
    var row = [];
    for (var x = 0; x < COLS; x++) {
      row.push(msg[(x + y * COLS) % msg.length]);
    }
    cipherText.push(row);
  }
}
initCipher();

function renderCipher() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!cipherText || cipherText.length !== H) initCipher();

  if (pointer.clicked && currentMode === 'cipher') {
    pointer.clicked = false;
    cipherDecodes.push({ x: pointer.gx, y: pointer.gy, born: time });
    if (cipherDecodes.length > 10) cipherDecodes.shift();
  }

  // Prune old decodes
  var ci = cipherDecodes.length;
  while (ci--) { if (time - cipherDecodes[ci].born > 12) cipherDecodes.splice(ci, 1); }

  var scrambleChars = '@#$%&*!?><{}[]=/+-~^';

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var decoded = false;
      var bestFade = 0;

      for (var d = 0; d < cipherDecodes.length; d++) {
        var dec = cipherDecodes[d];
        var dx = x - dec.x, dy = y - dec.y;
        var dist = Math.sqrt(dx * dx * 0.3 + dy * dy);
        var age = time - dec.born;
        var radius = age * 4;
        var fade = Math.max(0, 1 - age / 12);

        if (dist < radius) {
          decoded = true;
          if (fade > bestFade) bestFade = fade;
        }
      }

      if (decoded) {
        var ch = cipherText[y][x];
        var lit = 30 + bestFade * 50;
        drawCharHSL(ch, x, y, 120, 80, lit);
      } else {
        // Show scrambled
        if (Math.random() < 0.02) continue; // gaps
        var sch = scrambleChars[(x * 7 + y * 13 + (time * 3 | 0)) % scrambleChars.length];
        drawCharHSL(sch, x, y, 0, 0, 12 + Math.random() * 8);
      }
    }
  }
}

// ============================================================
// AURORA — Click to add curtain wave points
// ============================================================

var auroraWaves = [];

function initAurora() {
  auroraWaves = [];
  // Start with a few default curtains
  for (var i = 0; i < 3; i++) {
    auroraWaves.push({
      x: COLS * (0.2 + i * 0.3), phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.3, born: -100
    });
  }
}
initAurora();

function renderAurora() {
  clearCanvas();
  var W = COLS, H = ROWS;

  if (pointer.clicked && currentMode === 'aurora') {
    pointer.clicked = false;
    auroraWaves.push({
      x: pointer.gx, phase: Math.random() * Math.PI * 2,
      speed: 0.2 + Math.random() * 0.4, born: time
    });
    if (auroraWaves.length > 12) auroraWaves.shift();
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var totalV = 0;
      var bestHue = 120;

      for (var aw = 0; aw < auroraWaves.length; aw++) {
        var wave = auroraWaves[aw];
        var dx = x - wave.x;
        var spread = 15 + Math.sin(time * wave.speed + wave.phase) * 5;
        var xFade = Math.exp(-dx * dx / (2 * spread * spread));

        // Vertical curtain — stronger at top
        var yFade = Math.max(0, 1 - y / (H * 0.8));
        yFade = yFade * yFade;

        // Shimmer
        var shimmer = Math.sin(y * 0.3 + x * 0.05 + time * wave.speed * 3 + wave.phase) * 0.5 + 0.5;
        shimmer *= Math.sin(y * 0.15 - time * 0.5 + wave.phase) * 0.5 + 0.5;

        var v = xFade * yFade * shimmer;
        if (wave.born > 0) {
          var age = time - wave.born;
          if (age < 2) v *= age / 2; // fade in
          if (age > 20) v *= Math.max(0, 1 - (age - 20) / 10);
        }

        totalV += v;
        if (v > 0.1) bestHue = (120 + aw * 40 + y * 0.5) % 360;
      }

      if (totalV < 0.03) continue;
      totalV = Math.min(1, totalV);
      var ri = Math.min(RAMP_SOFT.length - 1, (totalV * RAMP_SOFT.length) | 0);
      drawCharHSL(RAMP_SOFT[ri], x, y, bestHue, 60 + totalV * 40, 15 + totalV * 50);
    }
  }
}

// ============================================================
// PENDULUM — Click to drop swinging pendulums
// ============================================================

var pendulums = [];
var pendulumTrail;

function initPendulum() {
  pendulums = [];
  pendulumTrail = new Float32Array(COLS * ROWS);
}
initPendulum();

function renderPendulum() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!pendulumTrail || pendulumTrail.length !== W * H) initPendulum();

  if (pointer.clicked && currentMode === 'pendulum') {
    pointer.clicked = false;
    pendulums.push({
      pivotX: pointer.gx, pivotY: pointer.gy,
      len: 5 + Math.random() * 10,
      angle: (Math.random() - 0.5) * Math.PI * 0.8,
      vel: 0,
      hue: (Math.random() * 360) | 0,
      born: time
    });
    if (pendulums.length > 20) pendulums.shift();
  }

  // Decay trail
  for (var i = 0; i < pendulumTrail.length; i++) pendulumTrail[i] *= 0.97;

  // Update pendulums
  for (var pi = 0; pi < pendulums.length; pi++) {
    var p = pendulums[pi];
    var age = time - p.born;
    // Simple pendulum physics
    var gravity = 0.015;
    p.vel += -gravity * Math.sin(p.angle);
    p.vel *= 0.999; // tiny damping
    p.angle += p.vel;

    // Draw arm and bob
    var bobX = p.pivotX + Math.sin(p.angle) * p.len;
    var bobY = p.pivotY + Math.cos(p.angle) * p.len;

    // Draw arm
    var steps = p.len | 0;
    for (var s = 0; s <= steps; s++) {
      var t = s / steps;
      var ax = (p.pivotX + (bobX - p.pivotX) * t) | 0;
      var ay = (p.pivotY + (bobY - p.pivotY) * t) | 0;
      if (ax >= 0 && ax < W && ay >= 0 && ay < H) {
        drawCharHSL('|', ax, ay, p.hue, 40, 25);
      }
    }

    // Bob leaves trail
    var bx = bobX | 0, by = bobY | 0;
    if (bx >= 0 && bx < W && by >= 0 && by < H) {
      pendulumTrail[by * W + bx] = 1;
      drawCharHSL('@', bx, by, p.hue, 80, 60);
    }
    // Pivot
    var px = p.pivotX | 0, py = p.pivotY | 0;
    if (px >= 0 && px < W && py >= 0 && py < H) {
      drawCharHSL('+', px, py, p.hue, 50, 40);
    }
  }

  // Render trails
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = pendulumTrail[y * W + x];
      if (v < 0.03) continue;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      drawCharHSL(RAMP_SOFT[ri], x, y, (30 + v * 30) % 360, 60, 10 + v * 35);
    }
  }
}

var diffuseGrid;
var diffuseHueGrid;

function initDiffuse() {
  var sz = COLS * ROWS;
  diffuseGrid = new Float32Array(sz);
  diffuseHueGrid = new Float32Array(sz);
}
initDiffuse();

function renderDiffuse() {
  clearCanvas();
  var W = COLS, H = ROWS, sz = W * H;
  if (!diffuseGrid || diffuseGrid.length !== sz) initDiffuse();

  // Click to drop ink
  if (pointer.down && currentMode === 'diffuse') {
    var ix = pointer.gx | 0, iy = pointer.gy | 0;
    var inkHue = (time * 30) % 360;
    for (var idy = -1; idy <= 1; idy++) {
      for (var idx = -1; idx <= 1; idx++) {
        var nx = ix + idx, ny = iy + idy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          var ii = ny * W + nx;
          diffuseGrid[ii] = Math.min(1, diffuseGrid[ii] + 0.3);
          diffuseHueGrid[ii] = inkHue;
        }
      }
    }
  }

  // Diffuse
  var newGrid = new Float32Array(sz);
  for (var y = 1; y < H - 1; y++) {
    for (var x = 1; x < W - 1; x++) {
      var idx = y * W + x;
      var avg = (diffuseGrid[idx - 1] + diffuseGrid[idx + 1] + diffuseGrid[idx - W] + diffuseGrid[idx + W]) * 0.25;
      newGrid[idx] = diffuseGrid[idx] * 0.95 + avg * 0.05;
      newGrid[idx] *= 0.9995;
      // Blend hue
      if (avg > diffuseGrid[idx] * 0.5) {
        diffuseHueGrid[idx] = diffuseHueGrid[idx] * 0.95 +
          (diffuseHueGrid[idx - 1] + diffuseHueGrid[idx + 1] + diffuseHueGrid[idx - W] + diffuseHueGrid[idx + W]) * 0.0125;
      }
    }
  }
  diffuseGrid = newGrid;

  // Render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = diffuseGrid[y * W + x];
      if (v < 0.02) continue;
      v = Math.min(1, v);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = diffuseHueGrid[y * W + x] % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 60 + v * 40, 15 + v * 50);
    }
  }
}

// ============================================================
// STATIC — Click to tune through TV static channels
// ============================================================

var staticChannel = 0;
var staticTuning = 0;
var staticChannelData = [];

function initStatic() {
  staticChannel = 0;
  staticTuning = 0;
  // Pre-generate "channel" patterns
  staticChannelData = [];
  var patterns = [
    function(x, y, t) { return 'TEXTFLOW'[(x + (t * 5 | 0)) % 8]; }, // scrolling text
    function(x, y, t) { return ((x ^ y) & 7) / 7; }, // XOR pattern
    function(x, y, t) { var d = Math.sqrt((x - COLS/2)*(x-COLS/2) + (y-ROWS/2)*(y-ROWS/2)); return Math.sin(d * 0.2 - t * 2) * 0.5 + 0.5; }, // circles
    function(x, y, t) { return (Math.sin(x * 0.1 + t) + Math.sin(y * 0.15 - t * 0.7)) * 0.25 + 0.5; }, // waves
    function(x, y, t) { return (x % 8 < 4) !== (y % 6 < 3) ? 0.8 : 0.1; }, // checkerboard
  ];
  staticChannelData = patterns;
}
initStatic();

function renderStatic() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Click to change channel
  if (pointer.clicked && currentMode === 'tvstatic') {
    pointer.clicked = false;
    staticTuning = 15; // frames of static while tuning
    staticChannel = (staticChannel + 1) % staticChannelData.length;
  }

  if (staticTuning > 0) {
    staticTuning--;
    // Pure static noise while tuning
    for (var y = 0; y < H; y++) {
      for (var x = 0; x < W; x++) {
        if (Math.random() < 0.6) continue;
        var v = Math.random();
        var chars = '@#$%&*!?.,:;+-=~';
        var ch = chars[Math.floor(Math.random() * chars.length)];
        var grey = (v * 200) | 0;
        drawChar(ch, x, y, grey, grey, grey, 0.3 + v * 0.7);
      }
    }
    // Horizontal bars
    for (var sy = 0; sy < 3; sy++) {
      var barY = Math.floor(Math.random() * H);
      for (var x = 0; x < W; x++) {
        drawChar('-', x, barY, 255, 255, 255, 0.5);
      }
    }
  } else {
    // Show current channel with some static overlay
    var pattern = staticChannelData[staticChannel];
    for (var y = 0; y < H; y++) {
      for (var x = 0; x < W; x++) {
        var v;
        var result = pattern(x, y, time);
        if (typeof result === 'string') {
          // Text channel
          var ch = result;
          drawCharHSL(ch, x, y, (time * 20 + x) % 360, 60, 40);
          continue;
        }
        v = result;
        // Add static noise
        v += (Math.random() - 0.5) * 0.1;
        v = Math.max(0, Math.min(1, v));
        if (v < 0.1) continue;

        var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
        var grey = (v * 255) | 0;
        drawChar(RAMP_DENSE[ri], x, y, grey, grey, grey, 0.3 + v * 0.7);
      }
    }
  }

  // Scanlines
  for (var y = 0; y < H; y += 2) {
    for (var x = 0; x < W; x++) {
      if (Math.random() < 0.95) continue;
      drawChar('-', x, y, 50, 50, 50, 0.15);
    }
  }
}

// ============================================================
// CRT — Retro phosphor monitor, click to change display
// ============================================================

var crtProgram = 0;
var crtBurnIn;
var CRT_PROGRAMS = 5;

function initCRT() {
  crtProgram = 0;
  crtBurnIn = new Float32Array(COLS * ROWS);
}
initCRT();

function renderCRT() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!crtBurnIn || crtBurnIn.length !== W * H) initCRT();

  if (pointer.clicked && currentMode === 'crt') {
    pointer.clicked = false;
    crtProgram = (crtProgram + 1) % CRT_PROGRAMS;
  }

  // Burn-in decay
  for (var i = 0; i < crtBurnIn.length; i++) crtBurnIn[i] *= 0.992;

  for (var y = 0; y < H; y++) {
    // CRT barrel distortion
    var ny = (y / H - 0.5) * 2;
    var distortY = ny * (1 + ny * ny * 0.08);
    var srcY = (distortY * 0.5 + 0.5) * H;

    // Scanline darkening
    var scanline = (y % 2 === 0) ? 1.0 : 0.7;
    // Vignette
    var vy = 1 - Math.abs(ny) * 0.3;

    for (var x = 0; x < W; x++) {
      var nx = (x / W - 0.5) * 2;
      var distortX = nx * (1 + nx * nx * 0.05);
      var srcX = (distortX * 0.5 + 0.5) * W;

      var vx = 1 - Math.abs(nx) * 0.2;
      var vignette = vx * vy;
      if (vignette < 0.1) continue;

      var sx = srcX | 0, sy = srcY | 0;
      if (sx < 0 || sx >= W || sy < 0 || sy >= H) continue;

      var v = 0;
      // Different "programs"
      if (crtProgram === 0) {
        // Bouncing logo
        var lx = W / 2 + Math.sin(time * 0.7) * W * 0.3;
        var ly = H / 2 + Math.cos(time * 0.5) * H * 0.3;
        var msg = 'TEXTFLOW';
        var dx = sx - lx, dy = sy - ly;
        if (Math.abs(dy) < 2 && Math.abs(dx) < msg.length * 0.6) {
          var ci = ((dx / 0.6 + msg.length / 2) | 0);
          if (ci >= 0 && ci < msg.length) {
            var ch = msg[ci];
            v = 1;
            drawChar(ch, x, y, 0, (255 * vignette * scanline) | 0, 0, v * vignette);
            crtBurnIn[y * W + x] = Math.min(1, crtBurnIn[y * W + x] + 0.05);
            continue;
          }
        }
      } else if (crtProgram === 1) {
        // Color bars
        var barIdx = (sx / (W / 7)) | 0;
        var barColors = [[255,255,255],[255,255,0],[0,255,255],[0,255,0],[255,0,255],[255,0,0],[0,0,255]];
        var c = barColors[Math.min(6, barIdx)];
        v = 0.8;
        drawChar('#', x, y, (c[0]*vignette*scanline)|0, (c[1]*vignette*scanline)|0, (c[2]*vignette*scanline)|0, v * vignette);
        continue;
      } else if (crtProgram === 2) {
        // Sine test pattern
        v = Math.sin(sx * 0.3 + time) * 0.5 + 0.5;
        v *= Math.sin(sy * 0.2 - time * 0.7) * 0.5 + 0.5;
      } else if (crtProgram === 3) {
        // Grid pattern
        v = ((sx % 10 < 1) || (sy % 8 < 1)) ? 0.8 : 0.05;
      } else {
        // Noise channel
        v = ((sx * 31 + sy * 17 + (time * 10 | 0)) % 97) / 97;
        if (v < 0.5) v = 0;
      }

      v *= scanline * vignette;
      if (v < 0.05) {
        // Show burn-in
        var bi = crtBurnIn[y * W + x];
        if (bi > 0.02) drawChar('.', x, y, 0, (bi * 40) | 0, 0, bi * 0.3);
        continue;
      }

      crtBurnIn[y * W + x] = Math.min(1, crtBurnIn[y * W + x] + v * 0.01);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      // Green phosphor
      drawChar(RAMP_DENSE[ri], x, y, 0, (v * 255) | 0, (v * 60) | 0, 0.3 + v * 0.7);
    }
  }
}

// ============================================================
// VHS — Tape effect with tracking, click to glitch
// ============================================================

var vhsTrackOffset = 0;
var vhsGlitchTimer = 0;
var vhsMessage = '  PLAY >  00:' + ('0' + Math.floor(Math.random() * 60)).slice(-2) + ':' + ('0' + Math.floor(Math.random() * 60)).slice(-2) + '  REC ';

function initVHS() {
  vhsTrackOffset = 0;
  vhsGlitchTimer = 0;
}
initVHS();

function renderVHS() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Click triggers tracking glitch
  if (pointer.clicked && currentMode === 'vhs') {
    pointer.clicked = false;
    vhsGlitchTimer = 20 + Math.floor(Math.random() * 20);
  }
  // Hold to continuously glitch
  if (pointer.down && currentMode === 'vhs') {
    vhsGlitchTimer = Math.max(vhsGlitchTimer, 5);
  }

  var glitching = vhsGlitchTimer > 0;
  if (glitching) vhsGlitchTimer--;

  // Update VHS timestamp
  var secs = (time * 1) | 0;
  var mins = (secs / 60) | 0;
  var hrs = (mins / 60) | 0;
  vhsMessage = '  PLAY >  ' + ('0' + (hrs % 24)).slice(-2) + ':' + ('0' + (mins % 60)).slice(-2) + ':' + ('0' + (secs % 60)).slice(-2) + '  ';

  // Base content — a "recorded" scene
  for (var y = 0; y < H; y++) {
    var rowOffset = 0;

    // Tracking distortion
    if (glitching) {
      var trackZone = Math.sin(y * 0.3 + time * 5) * 0.5 + 0.5;
      if (trackZone > 0.7) rowOffset = (Math.random() * 10 - 5) | 0;
      // Horizontal tear
      if (Math.random() < 0.05) rowOffset = (Math.random() * W * 0.5 - W * 0.25) | 0;
    }

    // Subtle ongoing tracking wobble
    rowOffset += Math.sin(y * 0.05 + time * 2) * 0.5 | 0;

    for (var x = 0; x < W; x++) {
      var sx = (x + rowOffset + W) % W;

      // VHS "recorded" content — a landscape scene
      var scene = simplex2(sx * 0.04 + time * 0.05, y * 0.06) * 0.5 + 0.5;
      scene += simplex2(sx * 0.08 - time * 0.03, y * 0.1 + 5) * 0.3;
      scene = Math.max(0, Math.min(1, scene));

      // Color bleed — shift R channel
      var bleedX = (sx + 2 + W) % W;
      var rScene = simplex2(bleedX * 0.04 + time * 0.05, y * 0.06) * 0.5 + 0.5;

      if (scene < 0.15) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (scene * RAMP_DENSE.length) | 0);
      var r = (rScene * 200 + 55) | 0;
      var g = (scene * 180 + 40) | 0;
      var b = (scene * 160 + 30) | 0;

      // VHS noise overlay
      if (Math.random() < 0.02) { r = 255; g = 255; b = 255; }

      // Scanline
      var scan = (y % 2 === 0) ? 1 : 0.75;
      drawChar(RAMP_DENSE[ri], x, y, (r * scan) | 0, (g * scan) | 0, (b * scan) | 0, 0.3 + scene * 0.6);
    }
  }

  // VHS OSD overlay (timestamp, PLAY indicator)
  var osdY = 2;
  for (var oi = 0; oi < vhsMessage.length && oi < W; oi++) {
    var ch = vhsMessage[oi];
    if (ch !== ' ') drawChar(ch, oi + 2, osdY, 255, 255, 255, 0.9);
  }

  // REC dot blink
  if ((time * 2 | 0) % 2 === 0) {
    drawChar('●', W - 5, 2, 255, 30, 30, 0.9);
    drawChar('R', W - 4, 2, 255, 255, 255, 0.8);
    drawChar('E', W - 3, 2, 255, 255, 255, 0.8);
    drawChar('C', W - 2, 2, 255, 255, 255, 0.8);
  }

  // Bottom tracking bar
  if (glitching) {
    var barY = (H * 0.7 + Math.sin(time * 3) * H * 0.2) | 0;
    for (var bx = 0; bx < W; bx++) {
      drawChar('=', bx, barY, 200, 200, 200, 0.4 + Math.random() * 0.3);
    }
  }
}

  termBuffer = [];
  termCursorX = 0;
  termCursorY = 0;
  termAutoLine = 0;
  termAutoTimer = 0;
  termTyping = '';
  termTypeIdx = 0;
}
initTerminal();

function termAddChar(ch) {
  if (ch === '\n' || termCursorX >= COLS - 1) {
    termCursorX = 0;
    termCursorY++;
    if (termCursorY >= ROWS) {
      termBuffer.shift();
      termCursorY = ROWS - 1;
    }
    while (termBuffer.length <= termCursorY) termBuffer.push([]);
    if (ch === '\n') return;
  }
  while (termBuffer.length <= termCursorY) termBuffer.push([]);
  termBuffer[termCursorY][termCursorX] = ch;
  termCursorX++;
}

function renderTerminal() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Click adds a random system message
  if (pointer.clicked && currentMode === 'terminal') {
    pointer.clicked = false;
    var msgs = [
      '> ACCESS GRANTED',
      '> SCANNING PORT ' + ((Math.random() * 65535) | 0) + '...',
      '> DECRYPTING SECTOR ' + ((Math.random() * 999) | 0) + '...',
      '> BUFFER OVERFLOW DETECTED AT 0x' + ((Math.random() * 0xFFFFFF) | 0).toString(16).toUpperCase(),
      '> SIGNAL ACQUIRED: ' + ((Math.random() * 900 + 100) | 0) + ' MHz',
      '> INJECTING PAYLOAD................ OK',
      '> WARNING: UNAUTHORIZED ACCESS ATTEMPT',
      '> TRACE ROUTE: ' + ((Math.random()*255)|0) + '.' + ((Math.random()*255)|0) + '.' + ((Math.random()*255)|0) + '.' + ((Math.random()*255)|0),
    ];
    termTyping = msgs[Math.floor(Math.random() * msgs.length)];
    termTypeIdx = 0;
    termAddChar('\n');
  }

  // Auto-type boot sequence
  termAutoTimer++;
  if (termAutoLine < termMessages.length && termAutoTimer % 2 === 0) {
    if (termTyping === '') {
      termTyping = termMessages[termAutoLine];
      termTypeIdx = 0;
      termAutoLine++;
      termAddChar('\n');
    }
  }

  // Type current message character by character
  if (termTyping !== '' && termTypeIdx < termTyping.length) {
    termTypeTimer++;
    if (termTypeTimer % 2 === 0) {
      termAddChar(termTyping[termTypeIdx]);
      termTypeIdx++;
      if (termTypeIdx >= termTyping.length) termTyping = '';
    }
  }

  // Render buffer
  for (var y = 0; y < termBuffer.length && y < H; y++) {
    var row = termBuffer[y];
    if (!row) continue;
    for (var x = 0; x < row.length && x < W; x++) {
      var ch = row[x];
      if (!ch || ch === ' ') continue;
      // Green phosphor with slight flicker
      var flicker = 0.9 + Math.random() * 0.1;
      var bright = ch === '>' ? 0.5 : 0.85;
      drawChar(ch, x, y, 0, (bright * 255 * flicker) | 0, (bright * 80 * flicker) | 0, bright);
    }
  }

  // Blinking cursor
  if ((time * 3 | 0) % 2 === 0) {
    drawChar('_', termCursorX, termCursorY, 0, 255, 80, 0.9);
  }

  // Scanlines
  for (var y = 0; y < H; y += 2) {
    for (var x = 0; x < W; x += 4) {
      drawChar(' ', x, y, 0, 0, 0, 0);
    }
  }
}

// ============================================================
// OSCILLOSCOPE — Click to add waveforms / Lissajous curves
// ============================================================

var scopeWaves = [];
var scopeTrail;

function initScope() {
  scopeWaves = [{ freqX: 3, freqY: 2, phaseX: 0, phaseY: Math.PI / 2, hue: 120 }];
  scopeTrail = new Float32Array(COLS * ROWS);
}
initScope();

function renderScope() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!scopeTrail || scopeTrail.length !== W * H) initScope();

  // Click to add a new waveform
  if (pointer.clicked && currentMode === 'oscilloscope') {
    pointer.clicked = false;
    scopeWaves.push({
      freqX: 1 + Math.floor(Math.random() * 6),
      freqY: 1 + Math.floor(Math.random() * 6),
      phaseX: Math.random() * Math.PI * 2,
      phaseY: Math.random() * Math.PI * 2,
      hue: (Math.random() * 360) | 0
    });
    if (scopeWaves.length > 8) scopeWaves.shift();
  }

  // Decay trail
  for (var i = 0; i < scopeTrail.length; i++) scopeTrail[i] *= 0.96;

  // Draw grid
  var gridChars = '·';
  for (var y = 0; y < H; y += 4) {
    for (var x = 0; x < W; x += 6) {
      drawChar(gridChars, x, y, 0, 40, 20, 0.3);
    }
  }
  // Axes
  var midY = H / 2 | 0;
  var midX = W / 2 | 0;
  for (var x = 0; x < W; x++) drawChar('-', x, midY, 0, 60, 30, 0.3);
  for (var y = 0; y < H; y++) drawChar('|', midX, y, 0, 60, 30, 0.3);

  // Draw Lissajous curves
  for (var wi = 0; wi < scopeWaves.length; wi++) {
    var w = scopeWaves[wi];
    var steps = 500;
    for (var s = 0; s < steps; s++) {
      var t = (s / steps) * Math.PI * 2;
      var px = Math.sin(t * w.freqX + w.phaseX + time * 0.5) * (W * 0.4) + W / 2;
      var py = Math.sin(t * w.freqY + w.phaseY + time * 0.3) * (H * 0.4) + H / 2;
      var gx = px | 0, gy = py | 0;
      if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
        scopeTrail[gy * W + gx] = Math.min(1, scopeTrail[gy * W + gx] + 0.15);
      }
    }
    // Slowly drift phase
    w.phaseX += 0.002;
    w.phaseY += 0.003;
  }

  // Render trails
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = scopeTrail[y * W + x];
      if (v < 0.03) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      // Phosphor green with brightness
      drawChar(RAMP_DENSE[ri], x, y, 0, (v * 255) | 0, (v * 120) | 0, 0.3 + v * 0.7);
    }
  }
}

// ============================================================
// DIAL — Radio dial tuning, drag to tune between stations
// ============================================================

var dialFreq = 88.0;
var dialTarget = 88.0;
var dialStations = [
  { freq: 91.1, name: 'TEXTFLOW FM', type: 'music' },
  { freq: 95.5, name: 'ASCII RADIO', type: 'talk' },
  { freq: 99.9, name: 'NOISE CORP', type: 'noise' },
  { freq: 103.7, name: 'WAVE STATION', type: 'wave' },
  { freq: 107.3, name: 'SEBLAND FM', type: 'music' },
];

function initDial() {
  dialFreq = 88.0;
  dialTarget = 88.0;
}
initDial();

function renderDial() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Drag left/right to tune
  if (pointer.down && currentMode === 'dial') {
    dialTarget = 88.0 + (pointer.gx / W) * 20; // 88-108 MHz range
  }
  // Smooth tuning
  dialFreq += (dialTarget - dialFreq) * 0.1;

  // Find closest station
  var closestStation = null;
  var closestDist = 999;
  for (var si = 0; si < dialStations.length; si++) {
    var d = Math.abs(dialFreq - dialStations[si].freq);
    if (d < closestDist) { closestDist = d; closestStation = dialStations[si]; }
  }

  var tuned = closestDist < 0.5;
  var signalStrength = tuned ? Math.max(0, 1 - closestDist / 0.5) : 0;

  // Draw dial background
  var dialY = 4;
  var freqStr = dialFreq.toFixed(1) + ' MHz';
  for (var fi = 0; fi < freqStr.length; fi++) {
    drawChar(freqStr[fi], (W / 2 - freqStr.length / 2 + fi) | 0, dialY, 255, 200, 100, 0.9);
  }

  // Frequency markers
  var markerY = dialY + 2;
  for (var f = 88; f <= 108; f += 1) {
    var mx = ((f - 88) / 20 * (W - 4) + 2) | 0;
    var isMajor = f % 2 === 0;
    drawChar(isMajor ? '|' : '.', mx, markerY, 150, 150, 100, isMajor ? 0.6 : 0.3);
    // Station markers
    for (var ss = 0; ss < dialStations.length; ss++) {
      if (Math.abs(f - dialStations[ss].freq) < 0.5) {
        drawChar('▼', mx, markerY - 1, 255, 100, 100, 0.7);
      }
    }
  }

  // Tuning needle
  var needleX = ((dialFreq - 88) / 20 * (W - 4) + 2) | 0;
  drawChar('▲', needleX, markerY + 1, 255, 255, 100, 0.9);

  // Station name
  if (tuned && closestStation) {
    var nameStr = '[ ' + closestStation.name + ' ]';
    for (var ni = 0; ni < nameStr.length; ni++) {
      var nx = (W / 2 - nameStr.length / 2 + ni) | 0;
      drawChar(nameStr[ni], nx, markerY + 3, 100, 255, 100, signalStrength * 0.9);
    }
  }

  // Audio visualization area
  var vizStart = markerY + 6;
  var vizH = H - vizStart - 2;

  if (tuned && closestStation) {
    // Different visualizations per station type
    if (closestStation.type === 'music') {
      // Frequency bars
      var numBars = 32;
      for (var b = 0; b < numBars; b++) {
        var barX = ((b / numBars) * W) | 0;
        var barW = Math.max(1, (W / numBars - 1) | 0);
        var barH = (Math.sin(b * 0.5 + time * 3) * 0.5 + 0.5) * vizH * signalStrength;
        barH *= (Math.sin(b * 1.3 + time * 5) * 0.3 + 0.7);
        for (var by = 0; by < barH; by++) {
          var bpy = vizStart + vizH - by;
          if (bpy >= vizStart && bpy < H) {
            var bv = by / vizH;
            for (var bx = 0; bx < barW && barX + bx < W; bx++) {
              drawCharHSL('#', barX + bx, bpy, (120 - bv * 120 + 360) % 360, 70, 20 + bv * 40);
            }
          }
        }
      }
    } else if (closestStation.type === 'wave') {
      // Sine wave
      for (var x = 0; x < W; x++) {
        var wy = Math.sin(x * 0.1 + time * 3) * vizH * 0.3 * signalStrength;
        wy += Math.sin(x * 0.05 - time * 1.5) * vizH * 0.15;
        var py = (vizStart + vizH / 2 + wy) | 0;
        if (py >= vizStart && py < H) {
          drawCharHSL('~', x, py, (200 + x * 2) % 360, 70, 40 * signalStrength);
        }
      }
    } else if (closestStation.type === 'talk') {
      // Waveform bars
      for (var x = 0; x < W; x++) {
        var amp = Math.abs(Math.sin(x * 0.2 + time * 8) * Math.sin(x * 0.07 + time * 2)) * vizH * 0.4 * signalStrength;
        var midRow = vizStart + vizH / 2;
        for (var dy = -(amp | 0); dy <= (amp | 0); dy++) {
          var py = (midRow + dy) | 0;
          if (py >= vizStart && py < H) {
            drawChar('|', x, py, 100, (200 * signalStrength) | 0, 100, 0.3 + Math.abs(dy / amp) * 0.5);
          }
        }
      }
    } else {
      // Noise
      for (var y = vizStart; y < H; y++) {
        for (var x = 0; x < W; x++) {
          if (Math.random() < 0.85) continue;
          var nv = Math.random() * signalStrength;
          drawChar('@#$%'[Math.floor(Math.random() * 4)], x, y, (nv * 200) | 0, (nv * 150) | 0, (nv * 100) | 0, nv * 0.6);
        }
      }
    }
  } else {
    // Static noise between stations
    for (var y = vizStart; y < H; y++) {
      for (var x = 0; x < W; x++) {
        if (Math.random() < 0.7) continue;
        var nv = Math.random() * 0.3;
        var grey = (nv * 200) | 0;
        drawChar('.', x, y, grey, grey, grey, nv);
      }
    }
  }

  // Signal strength meter
  var meterY = vizStart - 2;
  var meterStr = 'SIGNAL: ';
  var bars = (signalStrength * 10) | 0;
  for (var mi = 0; mi < meterStr.length; mi++) {
    drawChar(meterStr[mi], mi + 2, meterY, 150, 150, 150, 0.6);
  }
  for (var mi = 0; mi < 10; mi++) {
    var ch = mi < bars ? '█' : '░';
    var hue = mi < 3 ? 0 : (mi < 7 ? 60 : 120);
    drawCharHSL(ch, meterStr.length + 2 + mi, meterY, hue, 70, mi < bars ? 40 : 10);
  }
}

// ============================================================
// PROPFONT — Proportional fonts with weight/style variation per cell
// Somnai technique #1: Georgia + weight 300/500/800 + italic
// ============================================================

var PROP_FAMILY = 'Georgia, Palatino, "Times New Roman", serif';
var PROP_WEIGHTS = [300, 500, 800];
var PROP_STYLES = ['normal', 'italic'];
var PROP_CHARSET = ' .,:;!+-=*#@%&abcdefghijklmnopqrstuvwxyz0123456789';
var propPalette = [];
var propReady = false;
var propDens, propTempDens;
var propEmitters = [
  { cx: 0.3, cy: 0.35, orbitR: 0.12, freq: 0.25, phase: 0, strength: 0.2 },
  { cx: 0.7, cy: 0.4, orbitR: 0.1, freq: 0.3, phase: 2.0, strength: 0.16 },
  { cx: 0.5, cy: 0.65, orbitR: 0.14, freq: 0.2, phase: 4.0, strength: 0.22 }
];

function initPropPalette() {
  if (propReady) return;
  var measCanvas = document.createElement('canvas');
  measCanvas.width = measCanvas.height = 28;
  var measCtx = measCanvas.getContext('2d', { willReadFrequently: true });
  propPalette = [];
  for (var si = 0; si < PROP_STYLES.length; si++) {
    var style = PROP_STYLES[si];
    for (var wi = 0; wi < PROP_WEIGHTS.length; wi++) {
      var weight = PROP_WEIGHTS[wi];
      var fontStr = (style === 'italic' ? 'italic ' : '') + weight + ' ' + FONT_SIZE + 'px ' + PROP_FAMILY;
      for (var ci = 0; ci < PROP_CHARSET.length; ci++) {
        var ch = PROP_CHARSET[ci];
        if (ch === ' ') continue;
        // Measure width
        measCtx.font = fontStr;
        var w = measCtx.measureText(ch).width;
        if (w <= 0) continue;
        // Measure brightness
        measCtx.clearRect(0, 0, 28, 28);
        measCtx.fillStyle = '#fff';
        measCtx.textBaseline = 'middle';
        measCtx.fillText(ch, 1, 14);
        var imgData = measCtx.getImageData(0, 0, 28, 28).data;
        var sum = 0;
        for (var pi = 3; pi < imgData.length; pi += 4) sum += imgData[pi];
        var brightness = sum / (255 * 784);
        propPalette.push({ char: ch, weight: weight, style: style, font: fontStr, width: w, brightness: brightness });
      }
    }
  }
  // Normalize brightness
  var maxB = 0;
  for (var i = 0; i < propPalette.length; i++) if (propPalette[i].brightness > maxB) maxB = propPalette[i].brightness;
  if (maxB > 0) for (var i = 0; i < propPalette.length; i++) propPalette[i].brightness /= maxB;
  propPalette.sort(function(a, b) { return a.brightness - b.brightness; });
  propReady = true;
}

function propFindBest(targetB) {
  var lo = 0, hi = propPalette.length - 1;
  while (lo < hi) {
    var mid = (lo + hi) >> 1;
    if (propPalette[mid].brightness < targetB) lo = mid + 1;
    else hi = mid;
  }
  var best = propPalette[lo], bestScore = 999;
  for (var i = Math.max(0, lo - 12); i < Math.min(propPalette.length, lo + 12); i++) {
    var score = Math.abs(propPalette[i].brightness - targetB);
    if (score < bestScore) { bestScore = score; best = propPalette[i]; }
  }
  return best;
}

function initPropfont() {
  initPropPalette();
  var sz = COLS * ROWS;
  propDens = new Float32Array(sz);
  propTempDens = new Float32Array(sz);
}
initPropfont();

function renderPropfont() {
  clearCanvas();
  var W = COLS, H = ROWS, sz = W * H;
  if (!propDens || propDens.length !== sz) initPropfont();
  if (!propReady || propPalette.length === 0) return;

  var t = time;
  var aspect = CHAR_W / CHAR_H;
  var aspect2 = aspect * aspect;

  // Click injects density
  if (pointer.down && currentMode === 'propfont') {
    var fx = pointer.gx | 0, fy = pointer.gy | 0;
    for (var dy = -4; dy <= 4; dy++) {
      for (var dx = -4; dx <= 4; dx++) {
        var nx = fx + dx, ny = fy + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          var dist = Math.sqrt(dx * dx + dy * dy);
          var s = Math.max(0, 1 - dist / 5);
          propDens[ny * W + nx] = Math.min(1, propDens[ny * W + nx] + s * 0.25);
        }
      }
    }
  }

  // Velocity field + advection
  for (var r = 0; r < H; r++) {
    for (var c = 0; c < W; c++) {
      var nx = c / W, ny = r / H;
      var vx = Math.sin(ny * 6.28 + t * 0.3) * 2 + Math.cos((nx + ny) * 12 + t * 0.5) * 0.7;
      var vy = (Math.cos(nx * 5 + t * 0.4) * 1.5 + Math.sin((nx - ny) * 10 + t * 0.4) * 0.8) * aspect;
      var sx = Math.max(0, Math.min(W - 1.001, c - vx));
      var sy = Math.max(0, Math.min(H - 1.001, r - vy));
      var x0 = sx | 0, y0 = sy | 0;
      var x1 = Math.min(x0 + 1, W - 1), y1 = Math.min(y0 + 1, H - 1);
      var ffx = sx - x0, ffy = sy - y0;
      propTempDens[r * W + c] = propDens[y0 * W + x0] * (1 - ffx) * (1 - ffy) +
        propDens[y0 * W + x1] * ffx * (1 - ffy) +
        propDens[y1 * W + x0] * (1 - ffx) * ffy +
        propDens[y1 * W + x1] * ffx * ffy;
    }
  }
  var swap = propDens; propDens = propTempDens; propTempDens = swap;

  // Emitters
  for (var ei = 0; ei < propEmitters.length; ei++) {
    var e = propEmitters[ei];
    var ex = (e.cx + Math.cos(t * e.freq + e.phase) * e.orbitR) * W;
    var ey = (e.cy + Math.sin(t * e.freq * 0.7 + e.phase) * e.orbitR * 0.8) * H;
    var ec = ex | 0, er = ey | 0;
    for (var dr = -4; dr <= 4; dr++) {
      for (var dc = -4; dc <= 4; dc++) {
        var rr = er + dr, cc = ec + dc;
        if (rr >= 0 && rr < H && cc >= 0 && cc < W) {
          var dist = Math.sqrt(dr * dr + dc * dc);
          var s = Math.max(0, 1 - dist / 5);
          propDens[rr * W + cc] = Math.min(1, propDens[rr * W + cc] + s * e.strength);
        }
      }
    }
  }

  // Decay
  for (var i = 0; i < sz; i++) propDens[i] *= 0.985;

  // Render using proportional font palette
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var b = propDens[y * W + x];
      if (b < 0.02) continue;
      b = Math.min(1, b);
      var m = propFindBest(b);
      // Set the specific proportional font for this character
      ctx.font = m.font;
      var hue = (220 + b * 60 + time * 15) % 360;
      var alpha = Math.max(0.15, Math.min(1, b * 1.5));
      ctx.fillStyle = 'hsla(' + (hue | 0) + ',50%,' + (20 + b * 45 | 0) + '%,' + alpha.toFixed(2) + ')';
      ctx.fillText(m.char, x * CHAR_W, NAV_H + y * CHAR_H);
    }
  }
  // Restore monospace font for other modes
  ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
}

// ============================================================
// BRIGHTMATCH — Brightness-matched character selection
// Somnai technique #2: pre-measured brightness per glyph in monospace
// ============================================================

var bmPalette = [];
var bmReady = false;
var bmDens, bmTempDens;
var BM_CHARSET = ' .`\'-,:;_~"^!|/\\(){}[]<>+=*#%@$&0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';

function initBMPalette() {

  if (maxB > 0) for (var i = 0; i < bmPalette.length; i++) bmPalette[i].brightness /= maxB;
  bmPalette.sort(function(a, b) { return a.brightness - b.brightness; });

function bmFindBest(targetB) {

  while (lo < hi) {

    if (bmPalette[mid].brightness < targetB) lo = mid + 1;

  var best = bmPalette[lo], bestScore = 999;
  for (var i = Math.max(0, lo - 5); i < Math.min(bmPalette.length, lo + 5); i++) {
    var score = Math.abs(bmPalette[i].brightness - targetB);
    if (score < bestScore) { bestScore = score; best = bmPalette[i]; }
  }
  return best;
}

var bmBlobs = [];
function initBrightmatch() {
  initBMPalette();
  var sz = COLS * ROWS;
  bmDens = new Float32Array(sz);
  bmTempDens = new Float32Array(sz);

      x: Math.random() * COLS, y: Math.random() * ROWS,

    });
  }
}
initBrightmatch();

function renderBrightmatch() {
  clearCanvas();
  var W = COLS, H = ROWS, sz = W * H;

  if (!bmReady || bmPalette.length === 0) return;

  if (pointer.down && currentMode === 'brightmatch') {
    for (var bi = 0; bi < bmBlobs.length; bi++) {
      var b = bmBlobs[bi];
      var dx = pointer.gx - b.x, dy = pointer.gy - b.y;
      var dist = Math.sqrt(dx * dx + dy * dy) + 1;
      b.vx += dx / dist * 0.3;
      b.vy += dy / dist * 0.3;
    }
  }

  // Update blobs
  for (var bi = 0; bi < bmBlobs.length; bi++) {
    var b = bmBlobs[bi];
    b.x += b.vx * 0.03;
    b.y += b.vy * 0.03;
    // Bounce
    if (b.x < 0) { b.x = 0; b.vx = Math.abs(b.vx); }
    if (b.x >= W) { b.x = W - 1; b.vx = -Math.abs(b.vx); }
    if (b.y < 0) { b.y = 0; b.vy = Math.abs(b.vy); }
    if (b.y >= H) { b.y = H - 1; b.vy = -Math.abs(b.vy); }
    // Damping
    b.vx *= 0.999;
    b.vy *= 0.999;
  }

  // Compute metaball field
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var sum = 0;
      for (var bi = 0; bi < bmBlobs.length; bi++) {
        var b = bmBlobs[bi];
        var dx = x - b.x, dy = y - b.y;
        var d2 = dx * dx + dy * dy + 0.1;
        sum += (b.r * b.r) / d2;
      }
      bmDens[y * W + x] = Math.min(1, sum * 0.15);
    }
  }

  // Render using brightness-matched characters
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = bmDens[y * W + x];
      if (v < 0.015) continue;
      var m = bmFindBest(Math.min(1, v));
      // Color based on density — warm tones
      var hue = 30 - v * 30;
      var sat = 60 + v * 30;
      var lit = 10 + v * 55;
      drawCharHSL(m.char, x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// SMOOTHFLUID — Aspect-ratio-corrected diffusion kernel
// Somnai technique #3: proper anisotropic diffusion + tighter advection
// ============================================================

var sfDens, sfTempDens;
var sfEmitters = [
  { cx: 0.25, cy: 0.4, orbitR: 0.14, freq: 0.3, phase: 0, strength: 0.18 },
  { cx: 0.7, cy: 0.35, orbitR: 0.1, freq: 0.25, phase: 2.1, strength: 0.15 },
  { cx: 0.45, cy: 0.65, orbitR: 0.16, freq: 0.35, phase: 4.2, strength: 0.2 },
  { cx: 0.8, cy: 0.6, orbitR: 0.08, freq: 0.4, phase: 1.0, strength: 0.14 }
];

function initSmoothfluid() {
  var sz = COLS * ROWS;
  sfDens = new Float32Array(sz);
  sfTempDens = new Float32Array(sz);
}
initSmoothfluid();

function renderSmoothfluid() {
  clearCanvas();
  var W = COLS, H = ROWS, sz = W * H;
  if (!sfDens || sfDens.length !== sz) initSmoothfluid();

  var t = time;
  var aspect = CHAR_W / CHAR_H;
  var aspect2 = aspect * aspect;

  // Click injects density with velocity impulse
  if (pointer.down && currentMode === 'smoothfluid') {
    var fx = pointer.gx | 0, fy = pointer.gy | 0;
    for (var dy = -5; dy <= 5; dy++) {
      for (var dx = -5; dx <= 5; dx++) {
        var nx = fx + dx, ny = fy + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          var drScaled = dy / aspect;
          var dist = Math.sqrt(drScaled * drScaled + dx * dx);
          var s = Math.max(0, 1 - dist / 6);
          sfDens[ny * W + nx] = Math.min(1, sfDens[ny * W + nx] + s * 0.3);
        }
      }
    }
  }

  // Semi-lagrangian advection with multi-frequency velocity field
  for (var r = 0; r < H; r++) {
    for (var c = 0; c < W; c++) {
      var nx = c / W, ny = r / H;
      // Multi-octave velocity (somnai style — 3 frequency layers)
      var vx = Math.sin(ny * 6.28 + t * 0.3) * 2
             + Math.cos((nx + ny) * 12.5 + t * 0.55) * 0.7
             + Math.sin(nx * 25 + ny * 18 + t * 0.8) * 0.25;
      var vy = Math.cos(nx * 5 + t * 0.4) * 1.5
             + Math.sin((nx - ny) * 10 + t * 0.4) * 0.8
             + Math.cos(nx * 18 - ny * 25 + t * 0.7) * 0.25;
      // Aspect-ratio correction on vertical velocity
      vy *= aspect;
      // Backwards advection with bilinear interpolation
      var sx = Math.max(0, Math.min(W - 1.001, c - vx));
      var sy = Math.max(0, Math.min(H - 1.001, r - vy));
      var x0 = sx | 0, y0 = sy | 0;
      var x1 = Math.min(x0 + 1, W - 1), y1 = Math.min(y0 + 1, H - 1);
      var ffx = sx - x0, ffy = sy - y0;
      sfTempDens[r * W + c] = sfDens[y0 * W + x0] * (1 - ffx) * (1 - ffy)
        + sfDens[y0 * W + x1] * ffx * (1 - ffy)
        + sfDens[y1 * W + x0] * (1 - ffx) * ffy
        + sfDens[y1 * W + x1] * ffx * ffy;
    }
  }
  var swap = sfDens; sfDens = sfTempDens; sfTempDens = swap;

  // Aspect-ratio-corrected diffusion pass (somnai's technique)
  // Horizontal neighbors weighted by 1, vertical by aspect^2
  for (var r = 1; r < H - 1; r++) {
    for (var c = 1; c < W - 1; c++) {
      var i = r * W + c;
      var avg = (sfDens[i - 1] + sfDens[i + 1] + (sfDens[i - W] + sfDens[i + W]) * aspect2) / (2 + 2 * aspect2);
      sfTempDens[i] = sfDens[i] * 0.92 + avg * 0.08;
    }
  }
  swap = sfDens; sfDens = sfTempDens; sfTempDens = swap;

  // Orbiting emitters
  var spread = 4;
  for (var ei = 0; ei < sfEmitters.length; ei++) {
    var e = sfEmitters[ei];
    var ex = (e.cx + Math.cos(t * e.freq + e.phase) * e.orbitR) * W;
    var ey = (e.cy + Math.sin(t * e.freq * 0.7 + e.phase) * e.orbitR * 0.8) * H;
    var ec = ex | 0, er = ey | 0;
    for (var dr = -spread; dr <= spread; dr++) {
      for (var dc = -spread; dc <= spread; dc++) {
        var rr = er + dr, cc = ec + dc;
        if (rr >= 0 && rr < H && cc >= 0 && cc < W) {
          var drScaled = dr / aspect;
          var dist = Math.sqrt(drScaled * drScaled + dc * dc);
          var s = Math.max(0, 1 - dist / (spread + 1));
          sfDens[rr * W + cc] = Math.min(1, sfDens[rr * W + cc] + s * e.strength);
        }
      }
    }
  }

  // Global decay
  for (var i = 0; i < sz; i++) sfDens[i] *= 0.984;

  // Render — gradient from cool blue to hot white
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = sfDens[y * W + x];
      if (v < 0.02) continue;
      v = Math.min(1, v);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      // Somnai-style color: cold=deep blue, warm=cyan, hot=white
      var hue = 220 - v * 40;
      var sat = 80 - v * 60;
      var lit = 10 + v * 70;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

var VA_RAMP = ' `.-\':_,^=;><+!rc*/z?sLTv)J7(|Fi{C}fI31tlu[neoZ5Yxjya]2ESwqkP6h9d4VpOGbUAKXHm8RD#$Bg0MNWQ%&@';

// Drop handler for video files

  if (currentMode === 'vidascii') {

canvas.addEventListener('drop', function(e) {
  if (currentMode !== 'vidascii') return;

  if (!file || !file.type.startsWith('video/')) return;
  var url = URL.createObjectURL(file);

  };

  if (currentMode !== 'vidascii' || !vidLoaded) return;

    vidEl.play().catch(function(){});
    vidPaused = false;
  } else {
    vidEl.pause();
    vidPaused = true;
  }
});

function renderVidascii() {
  clearCanvas();
  var W = COLS, H = ROWS;

  if (!vidLoaded) {
    drawFancyLoading('drop video here');
    return;
  }

  // Sample video frame
  var vw = vidEl.videoWidth || 1;
  var vh = vidEl.videoHeight || 1;

  // Size offscreen canvas to match grid
  if (vidCanvas.width !== W || vidCanvas.height !== H) {
    vidCanvas.width = W;
    vidCanvas.height = H;
  }

  vidCtx.drawImage(vidEl, 0, 0, W, H);
  var imgData = vidCtx.getImageData(0, 0, W, H).data;

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var pi = (y * W + x) * 4;
      var r = imgData[pi];
      var g = imgData[pi + 1];
      var b = imgData[pi + 2];
      // Perceived brightness
      var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      if (lum < 0.02) continue;
      var ri = Math.min(VA_RAMP.length - 1, (lum * VA_RAMP.length) | 0);
      var ch = VA_RAMP[ri];
      // Use actual video color
      var alpha = Math.max(0.2, Math.min(1, lum * 1.3));
      drawChar(ch, x, y, r, g, b, alpha);
    }
  }

  // Paused indicator
  if (vidPaused) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '9px "JetBrains Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText('PAUSED', window.innerWidth - 10, NAV_H + 10);
    ctx.textAlign = 'left';
    ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
  }
}

  }

  vidNeonCtx.drawImage(vidNeonEl, 0, 0, W, H);
  var imgData = vidNeonCtx.getImageData(0, 0, W, H).data;

      var pi = (y * W + x) * 4;
      var r = imgData[pi];
      var g = imgData[pi + 1];
      var b = imgData[pi + 2];

      if (lum < 0.02) continue;
      var ri = Math.min(VA_RAMP.length - 1, (lum * VA_RAMP.length) | 0);
      var ch = VA_RAMP[ri];
      // Boost saturation for neon pop
      var maxC = Math.max(r, g, b);
      var boost = maxC > 0 ? 255 / maxC : 1;
      var br = Math.min(255, r * boost * 0.7 + r * 0.3);
      var bg = Math.min(255, g * boost * 0.7 + g * 0.3);
      var bb = Math.min(255, b * boost * 0.7 + b * 0.3);
      var alpha = Math.max(0.25, Math.min(1, lum * 1.5));
      drawChar(ch, x, y, br | 0, bg | 0, bb | 0, alpha);
    }
  }

  if (vidNeonPaused) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '9px "JetBrains Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText('PAUSED', window.innerWidth - 10, NAV_H + 10);

    ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
  }
}

// ============================================================
// MODE: noise — Flowing value noise (fbm)
// ============================================================
var noiseP = [];
function initNoise() {
  noiseP = [];
  for (var i = 0; i < 512; i++) noiseP[i] = (Math.random() * 256) | 0;
}
initNoise();

function noiseLerp(a, b, t) { return a + (b - a) * t; }
function noiseVal(px, py) {
  var xi = Math.floor(px) & 255, yi = Math.floor(py) & 255;
  var xf = px - Math.floor(px), yf = py - Math.floor(py);
  var u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  var aa = noiseP[(noiseP[xi] + yi) & 255] / 255;
  var ab = noiseP[(noiseP[xi] + yi + 1) & 255] / 255;
  var ba = noiseP[(noiseP[(xi + 1) & 255] + yi) & 255] / 255;
  var bb = noiseP[(noiseP[(xi + 1) & 255] + yi + 1) & 255] / 255;
  return noiseLerp(noiseLerp(aa, ba, u), noiseLerp(ab, bb, u), v);
}
function noiseFbm(px, py) {
  var val = 0, amp = 0.5, freq = 1;
  for (var i = 0; i < 4; i++) {
    val += noiseVal(px * freq, py * freq) * amp;
    amp *= 0.5; freq *= 2;
  }
  return val;
}

function renderNoise() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var t = time * 0.4;
  var lx = pointer.down && currentMode === 'noise' ? pointer.gx : -999;
  var ly = pointer.down && currentMode === 'noise' ? pointer.gy : -999;
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {

      // Pointer lens distortion
      var ddx = x - lx, ddy = y - ly;
      var dd = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dd < 8) {
        var warp = (1 - dd / 8) * 3;
        nx += Math.sin(dd + time * 5) * warp;
        ny += Math.cos(dd + time * 5) * warp;
      }
      var v = noiseFbm(nx, ny);
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var ch = RAMP_DENSE[ri];
      var hue = (v * 360 + time * 30) % 360;
      drawCharHSL(ch, x, y, hue | 0, 60, (10 + v * 45) | 0);
    }
  }
}

// ============================================================
// MODE: automata — Elementary cellular automata (1D Wolfram rules)
// ============================================================
var autoGrid, autoRule, autoW, autoH;
function initAutomata() {
  autoW = COLS;
  autoH = ROWS;
  autoGrid = new Uint8Array(autoW * autoH);
  autoRule = 30;
  // Seed top row with single center cell
  autoGrid[Math.floor(autoW / 2)] = 1;
  // Generate all rows
  for (var y = 1; y < autoH; y++) {
    for (var x = 0; x < autoW; x++) {
      var l = x > 0 ? autoGrid[(y - 1) * autoW + x - 1] : 0;
      var c = autoGrid[(y - 1) * autoW + x];
      var r = x < autoW - 1 ? autoGrid[(y - 1) * autoW + x + 1] : 0;
      var idx = (l << 2) | (c << 1) | r;
      autoGrid[y * autoW + x] = (autoRule >> idx) & 1;
    }
  }
}
initAutomata();

function renderAutomata() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (autoW !== W || autoH !== H) initAutomata();
  // Click toggles cells
  if (pointer.clicked && currentMode === 'automata') {
    var gx = Math.floor(pointer.gx), gy = Math.floor(pointer.gy);
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      autoGrid[gy * W + gx] ^= 1;
      // Regenerate rows below
      for (var y = Math.max(1, gy + 1); y < H; y++) {
        for (var x = 0; x < W; x++) {
          var l = x > 0 ? autoGrid[(y - 1) * W + x - 1] : 0;
          var c = autoGrid[(y - 1) * W + x];
          var r = x < W - 1 ? autoGrid[(y - 1) * W + x + 1] : 0;
          var idx2 = (l << 2) | (c << 1) | r;
          autoGrid[y * W + x] = (autoRule >> idx2) & 1;
        }
      }
    }
  }
  // Drag changes rule — horizontal position maps to rule 0-255
  if (pointer.down && currentMode === 'automata') {
    var newRule = Math.floor((pointer.gx / W) * 256);
    if (newRule !== autoRule && newRule >= 0 && newRule < 256) {
      autoRule = newRule;
      // Regenerate
      for (var y = 1; y < H; y++) {
        for (var x = 0; x < W; x++) {
          var l = x > 0 ? autoGrid[(y - 1) * W + x - 1] : 0;
          var c = autoGrid[(y - 1) * W + x];
          var r = x < W - 1 ? autoGrid[(y - 1) * W + x + 1] : 0;
          var idx3 = (l << 2) | (c << 1) | r;
          autoGrid[y * W + x] = (autoRule >> idx3) & 1;
        }
      }
    }
  }
  // Scroll animation: shift rows up periodically
  var scrollInterval = 0.1;
  var scrollPhase = (time / scrollInterval) | 0;
  var hue = (autoRule * 1.4) % 360;
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var val = autoGrid[y * W + x];
      if (val === 0) continue;
      var bright = 0.5 + (y / H) * 0.5;
      var ch = RAMP_DENSE[((bright * RAMP_DENSE.length) | 0) % RAMP_DENSE.length];
      drawCharHSL(ch, x, y, (hue + y * 2) | 0, 80, (20 + bright * 35) | 0);
    }
  }
  // Show current rule
}

// ============================================================
// MODE: maze — Animated maze generation + solving
// ============================================================
var mazeGrid, mazeW, mazeH, mazeStack, mazeGenDone, mazeSolvePath, mazeSolveIdx;
var mazeCurX, mazeCurY, mazeStart, mazeEnd, mazeFrameCount;
function initMaze() {
  mazeW = Math.floor(COLS / 2);
  mazeH = Math.floor(ROWS / 2);
  if (mazeW < 3) mazeW = 3;
  if (mazeH < 3) mazeH = 3;
  mazeGrid = new Uint8Array(mazeW * mazeH); // 0=wall, 1=passage, 2=visited-solve, 3=solution
  mazeCurX = 1; mazeCurY = 1;
  mazeGrid[mazeCurY * mazeW + mazeCurX] = 1;
  mazeStack = [{x: mazeCurX, y: mazeCurY}];
  mazeGenDone = false;
  mazeSolvePath = [];
  mazeSolveIdx = 0;
  mazeStart = {x: 1, y: 1};
  mazeEnd = {x: mazeW - 2, y: mazeH - 2};
  mazeFrameCount = 0;
}
initMaze();

function mazeNeighbors(x, y) {
  var dirs = [{dx:0,dy:-2},{dx:2,dy:0},{dx:0,dy:2},{dx:-2,dy:0}];
  var res = [];
  for (var i = 0; i < dirs.length; i++) {
    var nx = x + dirs[i].dx, ny = y + dirs[i].dy;
    if (nx > 0 && nx < mazeW - 1 && ny > 0 && ny < mazeH - 1 && mazeGrid[ny * mazeW + nx] === 0) {
      res.push({x: nx, y: ny, wx: x + dirs[i].dx / 2, wy: y + dirs[i].dy / 2});
    }
  }
  return res;
}

function mazeStepGen() {
  if (mazeStack.length === 0) { mazeGenDone = true; return; }
  var cur = mazeStack[mazeStack.length - 1];
  var nbrs = mazeNeighbors(cur.x, cur.y);
  if (nbrs.length > 0) {
    var pick = nbrs[(Math.random() * nbrs.length) | 0];
    mazeGrid[pick.wy * mazeW + pick.wx] = 1;
    mazeGrid[pick.y * mazeW + pick.x] = 1;
    mazeStack.push({x: pick.x, y: pick.y});
  } else {
    mazeStack.pop();
  }
}

function mazeSolve() {
  // BFS from start to end
  var visited = new Uint8Array(mazeW * mazeH);
  var parent = new Int32Array(mazeW * mazeH).fill(-1);
  var queue = [mazeStart.y * mazeW + mazeStart.x];
  visited[mazeStart.y * mazeW + mazeStart.x] = 1;
  var endIdx = mazeEnd.y * mazeW + mazeEnd.x;
  while (queue.length > 0) {
    var ci = queue.shift();
    if (ci === endIdx) break;
    var cx = ci % mazeW, cy = (ci / mazeW) | 0;
    var dirs = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];
    for (var d = 0; d < 4; d++) {
      var nx = cx + dirs[d].dx, ny = cy + dirs[d].dy;
      var ni = ny * mazeW + nx;
      if (nx >= 0 && nx < mazeW && ny >= 0 && ny < mazeH && !visited[ni] && mazeGrid[ni] === 1) {
        visited[ni] = 1;
        parent[ni] = ci;
        queue.push(ni);
      }
    }
  }
  mazeSolvePath = [];
  var idx = endIdx;
  while (idx !== -1) {
    mazeSolvePath.push(idx);
    idx = parent[idx];
  }
  mazeSolvePath.reverse();
  mazeSolveIdx = 0;
}

function renderMaze() {
  clearCanvas();
  mazeFrameCount++;
  var W = COLS, H = ROWS;
  if (Math.floor(COLS / 2) !== mazeW || Math.floor(ROWS / 2) !== mazeH) initMaze();
  // Click sets start/end
  if (pointer.clicked && currentMode === 'maze') {
    var mx = Math.floor(pointer.gx / 2), my = Math.floor(pointer.gy / 2);
    if (mx >= 0 && mx < mazeW && my >= 0 && my < mazeH && mazeGrid[my * mazeW + mx] === 1) {
      if (!mazeGenDone) { /* ignore during gen */ }
      else { mazeEnd = {x: mx, y: my}; mazeSolve(); }
    }
  }
  // Animate generation
  if (!mazeGenDone) {
    for (var s = 0; s < 3; s++) mazeStepGen();
    if (mazeGenDone) mazeSolve();
  }
  // Animate solve path
  if (mazeGenDone && mazeSolveIdx < mazeSolvePath.length) {
    mazeSolveIdx = Math.min(mazeSolveIdx + 2, mazeSolvePath.length);
  }
  // Draw
  for (var y = 0; y < mazeH && y * 2 < H; y++) {
    for (var x = 0; x < mazeW && x * 2 < W; x++) {
      var val = mazeGrid[y * mazeW + x];
      var sx = x * 2, sy = y * 2;
      if (val === 0) {
        drawChar('#', sx, sy, 40, 50, 60, 0.5);
        if (sx + 1 < W) drawChar('#', sx + 1, sy, 40, 50, 60, 0.5);
      } else {
        drawChar('.', sx, sy, 30, 40, 30, 0.2);
      }
    }
  }
  // Draw solution path
  for (var i = 0; i < mazeSolveIdx && i < mazeSolvePath.length; i++) {
    var pi = mazeSolvePath[i];
    var px = (pi % mazeW) * 2, py = ((pi / mazeW) | 0) * 2;
    var prog = i / mazeSolvePath.length;
    drawCharHSL('*', px, py, (120 + prog * 240) | 0, 80, 45);
  }
  // Draw gen stack head
  if (!mazeGenDone && mazeStack.length > 0) {
    var head = mazeStack[mazeStack.length - 1];
    drawChar('@', head.x * 2, head.y * 2, 255, 255, 100, 1);
  }
}

// ============================================================
// MODE: langton — Langton's Ant (multi-color variant)
// ============================================================
var langGrid, langAnts, langW, langH, langRule;
function initLangton() {
  langW = COLS; langH = ROWS;
  langGrid = new Uint8Array(langW * langH);
  langRule = [1, 0, 1, 1]; // RLLR
  langAnts = [{x: Math.floor(langW / 2), y: Math.floor(langH / 2), dir: 0}];
}
initLangton();

function renderLangton() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (langW !== W || langH !== H) initLangton();
  // Click adds ants
  if (pointer.clicked && currentMode === 'langton') {
    var ax = Math.floor(pointer.gx), ay = Math.floor(pointer.gy);
    if (ax >= 0 && ax < W && ay >= 0 && ay < H) {
      langAnts.push({x: ax, y: ay, dir: (Math.random() * 4) | 0});
    }
  }
  // Steps per frame — hold to speed up
  var stepsPerFrame = pointer.down && currentMode === 'langton' ? 200 : 50;
  var numStates = langRule.length;
  for (var s = 0; s < stepsPerFrame; s++) {
    for (var a = 0; a < langAnts.length; a++) {
      var ant = langAnts[a];
      if (ant.x < 0 || ant.x >= W || ant.y < 0 || ant.y >= H) continue;
      var idx = ant.y * W + ant.x;
      var state = langGrid[idx];
      // Turn: 1 = right, 0 = left
      if (langRule[state]) {
        ant.dir = (ant.dir + 1) & 3;
      } else {
        ant.dir = (ant.dir + 3) & 3;
      }
      // Cycle state
      langGrid[idx] = (state + 1) % numStates;
      // Move
      if (ant.dir === 0) ant.y--;
      else if (ant.dir === 1) ant.x++;
      else if (ant.dir === 2) ant.y++;
      else ant.x--;
      // Wrap
      if (ant.x < 0) ant.x = W - 1;
      if (ant.x >= W) ant.x = 0;
      if (ant.y < 0) ant.y = H - 1;
      if (ant.y >= H) ant.y = 0;
    }
  }
  // Draw grid
  var hues = [0, 200, 60, 300];
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var val = langGrid[y * W + x];
      if (val === 0) continue;
      var bright = 0.3 + val / numStates * 0.7;
      var ri = Math.min(RAMP_DENSE.length - 1, (bright * RAMP_DENSE.length) | 0);
      drawCharHSL(RAMP_DENSE[ri], x, y, hues[val % hues.length], 70, (15 + bright * 40) | 0);
    }
  }
  // Draw ants
  for (var a = 0; a < langAnts.length; a++) {
    var ant = langAnts[a];
    drawChar('@', ant.x, ant.y, 255, 255, 255, 1);
  }
}

// ============================================================
// MODE: wave2d — 2D wave equation
// ============================================================
var wave2dA, wave2dB, wave2dC, wave2dW, wave2dH;
function initWave2d() {
  wave2dW = COLS; wave2dH = ROWS;
  var sz = wave2dW * wave2dH;
  wave2dA = new Float32Array(sz);
  wave2dB = new Float32Array(sz);
  wave2dC = new Float32Array(sz);
  // Drop initial stones for visual interest
  for (var i = 0; i < 5; i++) {
    var sx = (Math.random() * wave2dW * 0.6 + wave2dW * 0.2) | 0;
    var sy = (Math.random() * wave2dH * 0.6 + wave2dH * 0.2) | 0;
    for (var dy = -2; dy <= 2; dy++) {
      for (var dx = -2; dx <= 2; dx++) {
        var nx = sx + dx, ny = sy + dy;
        if (nx >= 0 && nx < wave2dW && ny >= 0 && ny < wave2dH) {
          wave2dA[ny * wave2dW + nx] = (1 - Math.sqrt(dx*dx+dy*dy)/3) * 0.8;
        }
      }
    }
  }
}
initWave2d();

function renderWave2d() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (wave2dW !== W || wave2dH !== H) initWave2d();
  // Click drops stones
  if (pointer.down && currentMode === 'wave2d') {
    var gx = Math.floor(pointer.gx), gy = Math.floor(pointer.gy);
    if (gx > 0 && gx < W - 1 && gy > 0 && gy < H - 1) {
      if (pointer.clicked) {
        wave2dA[gy * W + gx] = 2.0;
      } else {
        // Oscillating source when held
        wave2dA[gy * W + gx] = Math.sin(time * 10) * 1.5;
      }
    }
  }
  // Wave equation step
  var damping = 0.995;
  for (var y = 1; y < H - 1; y++) {
    for (var x = 1; x < W - 1; x++) {
      var idx = y * W + x;
      var lap = wave2dA[idx - 1] + wave2dA[idx + 1] + wave2dA[idx - W] + wave2dA[idx + W] - 4 * wave2dA[idx];
      wave2dC[idx] = (2 * wave2dA[idx] - wave2dB[idx] + lap * 0.45) * damping;
    }
  }
  // Rotate buffers
  var tmp = wave2dB;
  wave2dB = wave2dA;
  wave2dA = wave2dC;
  wave2dC = tmp;
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = wave2dA[y * W + x];
      var av = Math.abs(v);
      if (av < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (av * RAMP_DENSE.length * 0.5) | 0);
      var ch = RAMP_DENSE[ri];
      if (v > 0) {
        drawChar(ch, x, y, 80, (100 + v * 150) | 0, 255, Math.min(1, av));
      } else {
        drawChar(ch, x, y, 80, 80, (100 - v * 150) | 0, Math.min(1, av));

    }
  }
}

// ============================================================
// MODE: heat — Heat diffusion simulation
// ============================================================
var heatGrid, heatW, heatH;
function initHeat() {
  heatW = COLS; heatH = ROWS;
  heatGrid = new Float32Array(heatW * heatH);
  // Initial heat spots
  for (var i = 0; i < 4; i++) {
    var sx = (Math.random() * heatW * 0.6 + heatW * 0.2) | 0;
    var sy = (Math.random() * heatH * 0.6 + heatH * 0.2) | 0;
    for (var dy = -3; dy <= 3; dy++) {
      for (var dx = -3; dx <= 3; dx++) {
        var nx = sx + dx, ny = sy + dy;
        if (nx >= 0 && nx < heatW && ny >= 0 && ny < heatH) {
          heatGrid[ny * heatW + nx] = Math.max(0, 1 - Math.sqrt(dx*dx+dy*dy)/4);
        }
      }
    }
  }
}
initHeat();

function renderHeat() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (heatW !== W || heatH !== H) initHeat();
  // Click places heat sources
  if (pointer.down && currentMode === 'heat') {
    var gx = Math.floor(pointer.gx), gy = Math.floor(pointer.gy);
    for (var dy = -2; dy <= 2; dy++) {
      for (var dx = -2; dx <= 2; dx++) {
        var nx = gx + dx, ny = gy + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          heatGrid[ny * W + nx] = Math.min(1, heatGrid[ny * W + nx] + 0.3);
        }
      }
    }
  }
  // Permanent pulsing heat emitters
  var emitters = [
    {x: W * 0.25, y: H * 0.3}, {x: W * 0.75, y: H * 0.7},
    {x: W * 0.5, y: H * 0.5}, {x: W * 0.2, y: H * 0.8}
  ];
  for (var ei = 0; ei < emitters.length; ei++) {
    var ex = emitters[ei].x | 0, ey = emitters[ei].y | 0;
    var pulse = 0.5 + Math.sin(time * 1.5 + ei * 1.7) * 0.3;
    for (var dy = -2; dy <= 2; dy++) {
      for (var dx = -2; dx <= 2; dx++) {
        var nx = ex + dx, ny = ey + dy;
        if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
          heatGrid[ny * W + nx] = Math.min(1, heatGrid[ny * W + nx] + pulse * 0.08);
        }
      }
    }
  }
  // Diffuse
  var next = new Float32Array(W * H);
  var alpha = 0.15;
  for (var y = 1; y < H - 1; y++) {
    for (var x = 1; x < W - 1; x++) {
      var idx = y * W + x;
      var lap = heatGrid[idx - 1] + heatGrid[idx + 1] + heatGrid[idx - W] + heatGrid[idx + W] - 4 * heatGrid[idx];
      next[idx] = heatGrid[idx] + alpha * lap;
      next[idx] *= 0.998; // slow decay
    }
  }
  heatGrid = next;
  // Draw with blue->red->yellow->white colormap
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = heatGrid[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_FIRE.length - 1, (v * RAMP_FIRE.length) | 0);
      var ch = RAMP_FIRE[ri];
      var r, g, b;
      if (v < 0.25) { r = 0; g = 0; b = (v / 0.25) * 255; }
      else if (v < 0.5) { var t2 = (v - 0.25) / 0.25; r = t2 * 255; g = 0; b = (1 - t2) * 255; }
      else if (v < 0.75) { var t2 = (v - 0.5) / 0.25; r = 255; g = t2 * 255; b = 0; }
      else { var t2 = (v - 0.75) / 0.25; r = 255; g = 255; b = t2 * 255; }
      drawChar(ch, x, y, r | 0, g | 0, b | 0, Math.min(1, v * 2));
    }
  }
}

// ============================================================
// MODE: lorenz — Lorenz strange attractor
// ============================================================
var lorenzParts, lorenzDensity, lorenzW, lorenzH;
function initLorenz() {
  lorenzW = COLS; lorenzH = ROWS;
  lorenzDensity = new Float32Array(lorenzW * lorenzH);
  lorenzParts = [];
  for (var i = 0; i < 300; i++) {
    lorenzParts.push({
      x: (Math.random() - 0.5) * 2,
      y: (Math.random() - 0.5) * 2,
      z: Math.random() * 30 + 10
    });
  }
}
initLorenz();

function renderLorenz() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (lorenzW !== W || lorenzH !== H) initLorenz();
  var sigma = 10, rho = 28, beta = 8 / 3;
  if (pointer.down && currentMode === 'lorenz') {
    rho = 10 + (pointer.gx / W) * 40;
    sigma = 5 + (pointer.gy / H) * 20;
  }
  // Decay density
  for (var i = 0; i < lorenzDensity.length; i++) lorenzDensity[i] *= 0.92;
  // Integrate particles
  var dt = 0.005;
  for (var i = 0; i < lorenzParts.length; i++) {
    var p = lorenzParts[i];
    for (var s = 0; s < 5; s++) {
      var dx = sigma * (p.y - p.x) * dt;
      var dy = (p.x * (rho - p.z) - p.y) * dt;
      var dz = (p.x * p.y - beta * p.z) * dt;
      p.x += dx; p.y += dy; p.z += dz;
    }
    // Project 3D -> 2D
    var sx = ((p.x / 50 + 0.5) * W) | 0;
    var sy = ((p.z / 60) * H) | 0;
    if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
      lorenzDensity[sy * W + sx] = Math.min(1, lorenzDensity[sy * W + sx] + 0.15);
    }
  }
  // Draw
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = lorenzDensity[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var ch = RAMP_DENSE[ri];
      drawCharHSL(ch, x, y, (270 + v * 60) | 0, 80, (10 + v * 50) | 0);
    }
  }
}

// ============================================================
// MODE: galaxy — Spiral galaxy simulation

var galaxyStars, galaxyTrail, galaxyW, galaxyH;

    galaxyStars.push({
      dist: dist,

    });

initGalaxy();

function renderGalaxy() {
  clearCanvas();
  var W = COLS, H = ROWS;

  var cx = W * 0.5, cy = H * 0.5;

  for (var i = 0; i < galaxyTrail.length; i++) galaxyTrail[i] *= 0.93;
  // Pointer gravitational perturber
  var px = pointer.down && currentMode === 'galaxy' ? pointer.gx : -999;
  var py = pointer.down && currentMode === 'galaxy' ? pointer.gy : -999;
  for (var i = 0; i < galaxyStars.length; i++) {
    var s = galaxyStars[i];

    var sx = (cx + Math.cos(s.angle) * r) | 0;
    var sy = (cy + Math.sin(s.angle) * r * 0.5) | 0;
    // Pointer perturbation
    if (px > -900) {
      var ddx = sx - px, ddy = sy - py;
      var dd = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dd < 15 && dd > 0.5) {
        s.angle += 0.02 / (dd * 0.3 + 0.1);
      }
    }
    if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
      galaxyTrail[sy * W + sx] = Math.min(1, galaxyTrail[sy * W + sx] + s.bright * 0.2);
    }
