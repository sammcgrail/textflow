<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<title>textflow</title>
<style>

  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  html, body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 0.75rem;
    background: rgba(10, 10, 15, 0.9);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  nav::-webkit-scrollbar { display: none; }

  nav .logo {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255, 255, 255, 0.4);
    margin-right: 0.5rem;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  nav button {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.5);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    padding: 0.35rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  nav button:hover {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.8);
  }

  nav button.active {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
    color: #fff;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    height: 100dvh;
  }
</style>
</head>
<body>

<nav>
  <span class="logo">textflow</span>
  <button class="active" data-mode="lava">lava</button>
  <button data-mode="rain">rain</button>
  <button data-mode="wave">wave</button>
  <button data-mode="fire">fire</button>
  <button data-mode="plasma">plasma</button>
  <button data-mode="life">life</button>
  <button data-mode="warp">warp</button>
  <button data-mode="swirl">swirl</button>
  <button data-mode="rift">rift</button>
  <button data-mode="voronoi">voronoi</button>
  <button data-mode="bolt">bolt</button>
  <button data-mode="moire">moire</button>
  <button data-mode="fold">fold</button>
  <button data-mode="copper">copper</button>
  <button data-mode="glitch">glitch</button>
  <button data-mode="flock">flock</button>
  <button data-mode="roto">roto</button>
  <button data-mode="erosion">erosion</button>
</nav>

<canvas id="c"></canvas>

<script>
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('selectstart', function(e) { e.preventDefault(); });

// ============================================================
// TEXTFLOW — Canvas-based ASCII text renderer
// Zero DOM manipulation per frame. Just fillText calls.
// ============================================================

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var buttons = document.querySelectorAll('nav button');
var currentMode = 'lava';
var COLS, ROWS;
var time = 0;
var CHAR_W, CHAR_H, FONT_SIZE;
var NAV_H = 36;
var dpr = window.devicePixelRatio || 1;

var RAMP_DENSE = ' .`-:;=+*#%@$';
var RAMP_FIRE  = ' .:-=+*%#@';
var RAMP_SOFT  = ' .,-~:;=!*#';

function resize() {
  var w = window.innerWidth;
  var h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);

  FONT_SIZE = Math.max(10, Math.min(16, w / 70));
  ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
  CHAR_W = ctx.measureText('M').width;
  CHAR_H = FONT_SIZE * 1.25;

  COLS = Math.floor(w / CHAR_W);
  ROWS = Math.floor((h - NAV_H) / CHAR_H);
}

resize();
window.addEventListener('resize', function() {
  resize();
  // Re-init current mode to handle new COLS/ROWS
  var inits = {
    lava: initBlobs, rain: initRain, fire: initFire, life: initLife,
    warp: initWarp, swirl: initSwirl, rift: initRift, voronoi: initVoronoi,
    bolt: initBolt, glitch: initGlitch, flock: initFlock, erosion: initErosion
  };
  if (inits[currentMode]) inits[currentMode]();
});

// Glow configs per mode
var glows = {
  lava:   { color: 'rgba(255,80,30,0.35)', blur: 12 },
  rain:   { color: 'rgba(0,220,100,0.35)', blur: 10 },
  wave:   { color: 'rgba(80,140,255,0.3)', blur: 12 },
  fire:   { color: 'rgba(255,150,30,0.35)', blur: 10 },
  plasma: { color: 'rgba(180,60,255,0.3)', blur: 12 },
  life:   { color: 'rgba(0,255,180,0.3)', blur: 10 },
  warp:   { color: 'rgba(200,200,255,0.3)', blur: 14 },
  swirl:  { color: 'rgba(255,100,200,0.3)', blur: 12 },
  rift:   { color: 'rgba(0,180,255,0.3)', blur: 10 },
  voronoi:{ color: 'rgba(255,255,200,0.25)', blur: 8 },
  bolt:   { color: 'rgba(150,200,255,0.4)', blur: 16 },
  moire:  { color: 'rgba(0,255,100,0.3)', blur: 10 },
  fold:   { color: 'rgba(255,140,0,0.35)', blur: 12 },
  copper: { color: 'rgba(255,200,100,0.3)', blur: 10 },
  glitch: { color: 'rgba(255,0,255,0.3)', blur: 8 },
  flock:  { color: 'rgba(255,200,50,0.3)', blur: 10 },
  roto:   { color: 'rgba(200,100,255,0.3)', blur: 12 },
  erosion:{ color: 'rgba(200,180,140,0.25)', blur: 8 }
};

function clearCanvas() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = FONT_SIZE + 'px "JetBrains Mono", monospace';
  ctx.textBaseline = 'top';
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
}

function drawChar(ch, x, y, r, g, b, a) {
  if (ch === ' ') return;
  ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + a.toFixed(2) + ')';
  ctx.fillText(ch, x * CHAR_W, NAV_H + y * CHAR_H);
}

function drawCharHSL(ch, x, y, h, s, l) {
  if (ch === ' ') return;
  ctx.fillStyle = 'hsl(' + (h|0) + ',' + (s|0) + '%,' + (l|0) + '%)';
  ctx.fillText(ch, x * CHAR_W, NAV_H + y * CHAR_H);
}

// ============================================================
// LAVA LAMP
// ============================================================

var blobs = [];
var NUM_BLOBS = 7;

function initBlobs() {
  blobs = [];
  for (var i = 0; i < NUM_BLOBS; i++) {
    blobs.push({
      x: Math.random() * COLS,
      y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.5 + (i % 2 === 0 ? -0.15 : 0.15),
      r: 4 + Math.random() * 6,
      phase: Math.random() * Math.PI * 2
    });
  }
}
initBlobs();

var lavaColors = [
  [255,40,20], [255,100,40], [255,160,60], [255,200,100], [255,230,180]
];

function renderLava() {
  clearCanvas();

  for (var i = 0; i < blobs.length; i++) {
    var b = blobs[i];
    b.x += b.vx + Math.sin(time * 0.4 + b.phase) * 0.15;
    b.y += b.vy + Math.cos(time * 0.3 + b.phase) * 0.1;
    b.r += Math.sin(time * 0.5 + b.phase) * 0.03;
    if (b.x < 2 || b.x > COLS - 2) { b.vx *= -0.9; b.x = Math.max(2, Math.min(COLS - 2, b.x)); }
    if (b.y < 2 || b.y > ROWS - 2) { b.vy *= -0.8; b.y = Math.max(2, Math.min(ROWS - 2, b.y)); }
    b.vx *= 0.995; b.vy *= 0.995;
    b.vy += Math.sin(time * 0.2 + b.phase * 2) * 0.008;
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var sum = 0;
      var px = x * 0.55;
      for (var i = 0; i < blobs.length; i++) {
        var b = blobs[i];
        var dx = px - b.x * 0.55;
        var dy = y - b.y;
        sum += (b.r * b.r) / (dx * dx + dy * dy + 0.1);
      }
      var t = sum * 0.15;
      if (t > 1) t = 1;
      if (t < 0.08) continue;
      var ci = Math.min(4, (t * 5) | 0);
      var c = lavaColors[ci];
      var ri = Math.min(RAMP_DENSE.length - 1, (t * RAMP_DENSE.length) | 0);
      drawChar(RAMP_DENSE[ri], x, y, c[0], c[1], c[2], 0.3 + t * 0.7);
    }
  }
}

// ============================================================
// RAIN
// ============================================================

var drops = [];
var MAX_DROPS = 180;

function initRain() {
  drops = [];
  for (var i = 0; i < MAX_DROPS; i++) {
    var d = {
      x: Math.floor(Math.random() * COLS),
      y: Math.random() * ROWS * 2 - ROWS,
      speed: 0.3 + Math.random() * 0.8,
      len: 4 + Math.floor(Math.random() * 12),
      chars: []
    };
    for (var j = 0; j < d.len; j++) {
      d.chars.push(String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96)));
    }
    drops.push(d);
  }
}
initRain();

function renderRain() {
  clearCanvas();

  var bright = new Float32Array(COLS * ROWS);
  var charGrid = new Array(COLS * ROWS);

  for (var i = 0; i < drops.length; i++) {
    var d = drops[i];
    d.y += d.speed;
    if (d.y - d.len > ROWS) {
      d.y = -d.len;
      d.x = Math.floor(Math.random() * COLS);
      d.speed = 0.3 + Math.random() * 0.8;
    }
    if (Math.random() < 0.08) {
      d.chars[Math.floor(Math.random() * d.len)] = String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96));
    }
    for (var j = 0; j < d.len; j++) {
      var ty = (d.y - j) | 0;
      if (ty >= 0 && ty < ROWS && d.x >= 0 && d.x < COLS) {
        var fade = 1 - j / d.len;
        var idx = ty * COLS + d.x;
        if (fade > bright[idx]) {
          charGrid[idx] = d.chars[j];
          bright[idx] = fade;
        }
      }
    }
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var idx = y * COLS + x;
      var b = bright[idx];
      if (b < 0.01) continue;
      var ch = charGrid[idx];
      if (b > 0.95) {
        drawChar(ch, x, y, 180, 255, 200, 1);
      } else {
        var g = (80 + b * 175) | 0;
        drawChar(ch, x, y, 0, g, (g * 0.4) | 0, 0.2 + b * 0.8);
      }
    }
  }
}

// ============================================================
// WAVES
// ============================================================

function renderWave() {
  clearCanvas();
  var phrase = 'textflow';

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var w1 = Math.sin(x * 0.08 - time * 1.2 + y * 0.15) * 0.5 + 0.5;
      var w2 = Math.sin(x * 0.12 + time * 0.8 - y * 0.1) * 0.5 + 0.5;
      var w3 = Math.sin((x + y) * 0.06 + time * 0.5) * 0.5 + 0.5;
      var cx = x - COLS / 2, cy = y - ROWS / 2;
      var w4 = Math.sin(Math.sqrt(cx * cx + cy * cy) * 0.12 - time * 1.5) * 0.5 + 0.5;

      var v = w1 * 0.35 + w2 * 0.25 + w3 * 0.2 + w4 * 0.2;
      v = Math.pow(v, 1.2);
      if (v < 0.15) continue;

      var ci = ((x + time * 8) | 0) % phrase.length;
      if (ci < 0) ci += phrase.length;
      var ri = Math.min(RAMP_SOFT.length - 1, (v * RAMP_SOFT.length) | 0);
      var ch = v > 0.6 ? phrase[ci] : RAMP_SOFT[ri];

      var hue = (x * 2.5 + y * 1.5 + time * 30) % 360;
      var sat = 60 + v * 40;
      var lit = 30 + v * 50;
      drawCharHSL(ch, x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// FIRE
// ============================================================

var fireBuffer;
function initFire() {
  fireBuffer = new Float32Array(COLS * (ROWS + 2));
}
initFire();

var fireColors = [
  [20,5,0], [80,15,0], [180,40,0], [220,90,10],
  [255,150,20], [255,200,60], [255,240,150], [255,255,220]
];

function renderFire() {
  clearCanvas();
  var W = COLS, H = ROWS + 2;

  if (!fireBuffer || fireBuffer.length !== W * H) {
    fireBuffer = new Float32Array(W * H);
  }

  for (var x = 0; x < W; x++) {
    fireBuffer[(H - 1) * W + x] = Math.random() > 0.4 ? 0.8 + Math.random() * 0.2 : Math.random() * 0.3;
  }

  for (var y = 0; y < H - 1; y++) {
    for (var x = 0; x < W; x++) {
      var y1 = y + 1;
      var y2 = Math.min(H - 1, y + 2);
      var xl = x > 0 ? x - 1 : 0;
      var xr = x < W - 1 ? x + 1 : W - 1;
      var v = (fireBuffer[y1 * W + x] + fireBuffer[y1 * W + xl] + fireBuffer[y1 * W + xr] + fireBuffer[y2 * W + x]) * 0.25;
      v = v * (0.97 - Math.random() * 0.02) - 0.008;
      fireBuffer[y * W + x] = v > 0 ? v : 0;
    }
  }

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < W; x++) {
      var v = fireBuffer[y * W + x];
      if (v < 0.05) continue;
      var ci = Math.min(7, (v * 8) | 0);
      var c = fireColors[ci];
      var ri = Math.min(RAMP_FIRE.length - 1, (v * RAMP_FIRE.length) | 0);
      drawChar(RAMP_FIRE[ri], x, y, c[0], c[1], c[2], 0.3 + v * 0.7);
    }
  }
}

// ============================================================
// PLASMA
// ============================================================

function renderPlasma() {
  clearCanvas();

  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      var v1 = Math.sin(x * 0.06 + time * 0.7);
      var v2 = Math.sin(y * 0.09 + time * 0.5);
      var v3 = Math.sin((x + y) * 0.05 + time * 0.4);
      var cx = x - COLS / 2, cy = y - ROWS / 2;
      var v4 = Math.sin(Math.sqrt(cx * cx + cy * cy) * 0.1 - time * 0.8);
      var v5 = Math.sin(x * 0.04 * Math.sin(time * 0.2) + y * 0.05 * Math.cos(time * 0.15));

      var v = (v1 + v2 + v3 + v4 + v5) * 0.1 + 0.5;
      if (v < 0.1) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (v * 270 + x * 1.5 + time * 30) % 360;
      var sat = 70 + v * 30;
      var lit = 20 + v * 55;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

// ============================================================
// GAME OF LIFE
// ============================================================

var lifeA, lifeB, lifeAge;
var LIFE_CHARS = ' .,:;+*oO#@';

function initLife() {
  var sz = COLS * ROWS;
  lifeA = new Uint8Array(sz);
  lifeB = new Uint8Array(sz);
  lifeAge = new Float32Array(sz);
  // Random seed — ~30% alive
  for (var i = 0; i < sz; i++) {
    lifeA[i] = Math.random() < 0.3 ? 1 : 0;
  }
}
initLife();

var lifeTickAccum = 0;

function renderLife() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var sz = W * H;

  if (!lifeA || lifeA.length !== sz) initLife();

  lifeTickAccum += 1;
  // Step every 6 frames (~10 generations/sec at 60fps)
  if (lifeTickAccum >= 6) {
    lifeTickAccum = 0;
    // Count neighbours and produce next gen
    for (var y = 0; y < H; y++) {
      for (var x = 0; x < W; x++) {
        var n = 0;
        for (var dy = -1; dy <= 1; dy++) {
          for (var dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            var ny = (y + dy + H) % H;
            var nx = (x + dx + W) % W;
            n += lifeA[ny * W + nx];
          }
        }
        var idx = y * W + x;
        var alive = lifeA[idx];
        if (alive) {
          lifeB[idx] = (n === 2 || n === 3) ? 1 : 0;
        } else {
          lifeB[idx] = (n === 3) ? 1 : 0;
        }
        // Track age for color
        if (lifeB[idx]) {
          lifeAge[idx] = Math.min(lifeAge[idx] + 0.15, 1);
        } else {
          lifeAge[idx] = Math.max(lifeAge[idx] - 0.08, 0);
        }
      }
    }
    // Swap buffers
    var tmp = lifeA; lifeA = lifeB; lifeB = tmp;

    // Inject random cells to prevent stagnation
    if (Math.random() < 0.05) {
      var rx = Math.floor(Math.random() * (W - 10)) + 5;
      var ry = Math.floor(Math.random() * (H - 10)) + 5;
      // Glider
      var pat = [[0,0],[1,0],[2,0],[2,-1],[1,-2]];
      for (var p = 0; p < pat.length; p++) {
        var pi = ((ry + pat[p][1] + H) % H) * W + ((rx + pat[p][0]) % W);
        lifeA[pi] = 1;
      }
    }
  }

  // Render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      var age = lifeAge[idx];
      if (age < 0.01) continue;
      var ci = Math.min(LIFE_CHARS.length - 1, (age * LIFE_CHARS.length) | 0);
      var hue = (age * 120 + time * 20) % 360;
      drawCharHSL(LIFE_CHARS[ci], x, y, hue, 70 + age * 30, 30 + age * 45);
    }
  }
}

// ============================================================
// WARP — Star tunnel
// ============================================================

var stars = [];
var NUM_STARS = 400;

function initWarp() {
  stars = [];
  for (var i = 0; i < NUM_STARS; i++) {
    stars.push({
      x: (Math.random() - 0.5) * 2,
      y: (Math.random() - 0.5) * 2,
      z: Math.random()
    });
  }
}
initWarp();

var WARP_CHARS = '.,+*oO0#@';

function renderWarp() {
  clearCanvas();
  var cx = COLS / 2;
  var cy = ROWS / 2;
  var speed = 0.008;

  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    s.z -= speed;
    if (s.z <= 0.001) {
      s.x = (Math.random() - 0.5) * 2;
      s.y = (Math.random() - 0.5) * 2;
      s.z = 1;
    }

    // Project
    var sx = (s.x / s.z) * cx * 0.8 + cx;
    var sy = (s.y / s.z) * cy * 0.8 + cy;

    if (sx < 0 || sx >= COLS || sy < 0 || sy >= ROWS) {
      s.z = 0; // Will reset next frame
      continue;
    }

    var bright = 1 - s.z;
    var ci = Math.min(WARP_CHARS.length - 1, (bright * WARP_CHARS.length) | 0);

    // Trail — draw a few chars behind
    var psx = (s.x / (s.z + speed * 3)) * cx * 0.8 + cx;
    var psy = (s.y / (s.z + speed * 3)) * cy * 0.8 + cy;
    var dx = sx - psx;
    var dy = sy - psy;
    var len = Math.sqrt(dx * dx + dy * dy);
    var steps = Math.min(4, (len) | 0);

    for (var j = 0; j <= steps; j++) {
      var t = j / (steps + 1);
      var tx = (sx - dx * t) | 0;
      var ty = (sy - dy * t) | 0;
      if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS) {
        var fade = bright * (1 - t * 0.6);
        var b = (180 + fade * 75) | 0;
        drawChar(WARP_CHARS[ci], tx, ty, b, b, (200 + fade * 55) | 0, 0.3 + fade * 0.7);
      }
    }
  }
}

// ============================================================
// SWIRL — Particle vortex with dual attractors
// ============================================================

var swirlParts = [];
var NUM_SWIRL = 300;
var attractor1 = { x: 0, y: 0 };
var attractor2 = { x: 0, y: 0 };

function initSwirl() {
  swirlParts = [];
  for (var i = 0; i < NUM_SWIRL; i++) {
    swirlParts.push({
      x: Math.random() * COLS,
      y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      life: Math.random(),
      ch: RAMP_DENSE[Math.floor(Math.random() * RAMP_DENSE.length)]
    });
  }
}
initSwirl();

function renderSwirl() {
  clearCanvas();
  var W = COLS, H = ROWS;

  // Animate attractors in orbits
  attractor1.x = W * 0.5 + Math.cos(time * 0.4) * W * 0.25;
  attractor1.y = H * 0.5 + Math.sin(time * 0.6) * H * 0.3;
  attractor2.x = W * 0.5 + Math.cos(time * 0.3 + 2) * W * 0.3;
  attractor2.y = H * 0.5 + Math.sin(time * 0.5 + 2) * H * 0.25;

  // Density field for rendering
  var density = new Float32Array(W * H);

  for (var i = 0; i < swirlParts.length; i++) {
    var p = swirlParts[i];

    // Gravity toward attractors with tangential component (swirl)
    var dx1 = attractor1.x - p.x, dy1 = attractor1.y - p.y;
    var d1 = Math.sqrt(dx1 * dx1 + dy1 * dy1) + 1;
    var f1 = 2.0 / d1;
    // Tangential = perpendicular to radial
    p.vx += (dx1 / d1 * f1 - dy1 / d1 * f1 * 0.8) * 0.02;
    p.vy += (dy1 / d1 * f1 + dx1 / d1 * f1 * 0.8) * 0.02;

    var dx2 = attractor2.x - p.x, dy2 = attractor2.y - p.y;
    var d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) + 1;
    var f2 = 1.5 / d2;
    p.vx += (dx2 / d2 * f2 + dy2 / d2 * f2 * 0.6) * 0.02;
    p.vy += (dy2 / d2 * f2 - dx2 / d2 * f2 * 0.6) * 0.02;

    // Damping
    p.vx *= 0.98;
    p.vy *= 0.98;

    // Speed limit
    var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > 2) { p.vx = p.vx / spd * 2; p.vy = p.vy / spd * 2; }

    p.x += p.vx;
    p.y += p.vy;

    // Wrap
    if (p.x < 0) p.x += W; if (p.x >= W) p.x -= W;
    if (p.y < 0) p.y += H; if (p.y >= H) p.y -= H;

    // Splat onto density field (3x3)
    var gx = p.x | 0, gy = p.y | 0;
    for (var sy = -1; sy <= 1; sy++) {
      for (var sx = -1; sx <= 1; sx++) {
        var nx = (gx + sx + W) % W;
        var ny = (gy + sy + H) % H;
        var dist = Math.abs(sx) + Math.abs(sy);
        var w = dist === 0 ? 1.0 : (dist === 1 ? 0.4 : 0.15);
        density[ny * W + nx] += w * (0.5 + spd * 0.3);
      }
    }
  }

  // Render density field
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = density[y * W + x];
      if (v < 0.1) continue;
      v = Math.min(v * 0.3, 1);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (Math.atan2(y - H / 2, x - W / 2) * 57.3 + time * 40 + 360) % 360;
      var sat = 60 + v * 40;
      var lit = 25 + v * 50;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

    78,66,215,61,156,180];

function simplex2(xin,yin){
  var F2=0.5*(Math.sqrt(3)-1), G2=(3-Math.sqrt(3))/6;
  var s=(xin+yin)*F2, i=Math.floor(xin+s), j=Math.floor(yin+s);
  var t=(i+j)*G2, x0=xin-(i-t), y0=yin-(j-t);
  var i1=x0>y0?1:0, j1=x0>y0?0:1;
  var x1=x0-i1+G2, y1=y0-j1+G2, x2=x0-1+2*G2, y2=y0-1+2*G2;
  var ii=i&255, jj=j&255;
  var n0=0,n1=0,n2=0;
  var t0=0.5-x0*x0-y0*y0;
  if(t0>0){t0*=t0;var gi=perm[ii+perm[jj]]%12;n0=t0*t0*(grad3[gi][0]*x0+grad3[gi][1]*y0);}
  var t1=0.5-x1*x1-y1*y1;
  if(t1>0){t1*=t1;var gi1=perm[ii+i1+perm[jj+j1]]%12;n1=t1*t1*(grad3[gi1][0]*x1+grad3[gi1][1]*y1);}
  var t2=0.5-x2*x2-y2*y2;
  if(t2>0){t2*=t2;var gi2=perm[ii+1+perm[jj+1]]%12;n2=t2*t2*(grad3[gi2][0]*x2+grad3[gi2][1]*y2);}

function fbm(x,y,oct){
  var v=0,a=0.5,f=1;
  for(var i=0;i<oct;i++){v+=a*simplex2(x*f,y*f);a*=0.5;f*=2;}
  return v;
}

// ============================================================
// RIFT — Reaction-Diffusion (Gray-Scott)
// ============================================================

var riftU, riftV, riftUNew, riftVNew;

function initRift() {
  var sz = COLS * ROWS;
  riftU = new Float32Array(sz);
  riftV = new Float32Array(sz);
  riftUNew = new Float32Array(sz);
  riftVNew = new Float32Array(sz);
  for (var i = 0; i < sz; i++) { riftU[i] = 1; riftV[i] = 0; }
  // Seed several spots
  for (var s = 0; s < 8; s++) {
    var cx = Math.floor(Math.random() * (COLS - 20)) + 10;
    var cy = Math.floor(Math.random() * (ROWS - 10)) + 5;
    for (var dy = -3; dy <= 3; dy++) {
      for (var dx = -3; dx <= 3; dx++) {
        var nx = cx + dx, ny = cy + dy;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
          var idx = ny * COLS + nx;
          riftU[idx] = 0.5 + Math.random() * 0.1;
          riftV[idx] = 0.25 + Math.random() * 0.1;
        }
      }
    }
  }
}
initRift();

function renderRift() {
  clearCanvas();
  var W = COLS, H = ROWS, sz = W * H;
  if (!riftU || riftU.length !== sz) initRift();

  var Du = 0.16, Dv = 0.08, f = 0.055, k = 0.062, dt = 1.0;
  if (!riftUNew || riftUNew.length !== sz) { riftUNew = new Float32Array(sz); riftVNew = new Float32Array(sz); }

  for (var step = 0; step < 8; step++) {
    for (var y = 1; y < H - 1; y++) {
      for (var x = 1; x < W - 1; x++) {
        var idx = y * W + x;
        var u = riftU[idx], v = riftV[idx];
        var lapU = riftU[idx-1] + riftU[idx+1] + riftU[idx-W] + riftU[idx+W] - 4*u;
        var lapV = riftV[idx-1] + riftV[idx+1] + riftV[idx-W] + riftV[idx+W] - 4*v;
        var uvv = u * v * v;
        riftUNew[idx] = u + (Du * lapU - uvv + f * (1 - u)) * dt;
        riftVNew[idx] = v + (Dv * lapV + uvv - (f + k) * v) * dt;
      }
    }
    var tmp = riftU; riftU = riftUNew; riftUNew = tmp;
    tmp = riftV; riftV = riftVNew; riftVNew = tmp;
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = riftV[y * W + x];
      if (v < 0.05) continue;
      var t = Math.min(v * 4, 1);
      var ri = Math.min(RAMP_DENSE.length - 1, (t * RAMP_DENSE.length) | 0);
      var hue = (200 + t * 60 + time * 10) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 70 + t * 30, 25 + t * 50);
    }
  }
}

// VORONOI — Animated Tessellation
// ============================================================

var voronoiSeeds = [];
var NUM_VORONOI = 18;

function initVoronoi() {
  voronoiSeeds = [];
  for (var i = 0; i < NUM_VORONOI; i++) {
    voronoiSeeds.push({
      x: Math.random() * COLS, y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
      hue: (i * 137.508) % 360
    });
  }
}
initVoronoi();

function renderVoronoi() {
  clearCanvas();
  var W = COLS, H = ROWS;
  // Move seeds
  for (var i = 0; i < voronoiSeeds.length; i++) {
    var s = voronoiSeeds[i];
    s.x += s.vx + Math.sin(time * 0.3 + i) * 0.1;
    s.y += s.vy + Math.cos(time * 0.4 + i * 1.5) * 0.08;
    if (s.x < 0 || s.x >= W) s.vx *= -1;
    if (s.y < 0 || s.y >= H) s.vy *= -1;
    s.x = Math.max(0, Math.min(W - 1, s.x));
    s.y = Math.max(0, Math.min(H - 1, s.y));
  }

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var d1 = 1e9, d2 = 1e9, ci = 0;
      var px = x * 0.55; // aspect correction
      for (var i = 0; i < voronoiSeeds.length; i++) {
        var dx = px - voronoiSeeds[i].x * 0.55;
        var dy = y - voronoiSeeds[i].y;
        var d = dx * dx + dy * dy;
        if (d < d1) { d2 = d1; d1 = d; ci = i; }
        else if (d < d2) { d2 = d; }
      }
      var edge = Math.sqrt(d2) - Math.sqrt(d1);
      if (edge > 8) continue;
      var v = edge < 1.5 ? 1 : Math.max(0, 1 - (edge - 1.5) / 6.5);
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = voronoiSeeds[ci].hue;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 60 + v * 40, 20 + v * 55);
    }
  }
}

var boltGrid, boltAge;
var boltBranches = [];

function initBolt() {
  var sz = COLS * ROWS;
  boltGrid = new Float32Array(sz);
  boltAge = new Float32Array(sz);
  boltBranches = [];
}
initBolt();

var boltTimer = 0;

function renderBolt() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!boltGrid || boltGrid.length !== W * H) initBolt();

  boltTimer += 1;

  // Spawn new bolt periodically
  if (boltTimer > 30 || boltBranches.length === 0) {
    boltTimer = 0;
    var sx = Math.floor(Math.random() * (W - 10)) + 5;
    var numBranches = 2 + Math.floor(Math.random() * 3);
    for (var b = 0; b < numBranches; b++) {
      boltBranches.push({ x: sx + (Math.random() - 0.5) * 6, y: 0, life: 40 + Math.random() * 30 });
    }
  }

  // Grow branches
  var newBranches = [];
  for (var i = 0; i < boltBranches.length; i++) {
    var br = boltBranches[i];
    if (br.life <= 0 || br.y >= H) continue;
    br.life--;

    // Move downward with jitter
    br.x += (Math.random() - 0.5) * 2.5;
    br.y += 0.5 + Math.random() * 1.5;

    var gx = Math.floor(br.x), gy = Math.floor(br.y);
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      boltGrid[gy * W + gx] = 1;
      boltAge[gy * W + gx] = 1;
      // Thicken
      if (gx > 0) { boltGrid[gy * W + gx - 1] = 0.5; boltAge[gy * W + gx - 1] = Math.max(boltAge[gy * W + gx - 1], 0.7); }
      if (gx < W-1) { boltGrid[gy * W + gx + 1] = 0.5; boltAge[gy * W + gx + 1] = Math.max(boltAge[gy * W + gx + 1], 0.7); }
    }

    // Branch
    if (Math.random() < 0.08 && br.life > 10) {
      newBranches.push({ x: br.x + (Math.random() - 0.5) * 3, y: br.y, life: br.life * 0.5 });
    }

    boltBranches[i] = br;
  }
  for (var i = 0; i < newBranches.length; i++) boltBranches.push(newBranches[i]);
  // Prune dead
  boltBranches = boltBranches.filter(function(b) { return b.life > 0 && b.y < H; });

  // Decay and render
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = y * W + x;
      var v = boltAge[idx];
      if (v < 0.01) continue;
      boltAge[idx] *= 0.96;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var b = (150 + v * 105) | 0;
      drawChar(RAMP_DENSE[ri], x, y, (100 + v * 55) | 0, (150 + v * 105) | 0, 255, 0.2 + v * 0.8);
    }
  }
}

// ============================================================
// MOIRE — Multi-center Ring Interference
// ============================================================

function renderMoire() {
  clearCanvas();
  var W = COLS, H = ROWS;
  // Three focal points orbiting
  var f1x = W * 0.5 + Math.cos(time * 0.3) * W * 0.3;
  var f1y = H * 0.5 + Math.sin(time * 0.4) * H * 0.3;
  var f2x = W * 0.5 + Math.cos(time * 0.37 + 2) * W * 0.25;
  var f2y = H * 0.5 + Math.sin(time * 0.29 + 2) * H * 0.35;
  var f3x = W * 0.5 + Math.sin(time * 0.23 + 4) * W * 0.35;
  var f3y = H * 0.5 + Math.cos(time * 0.31 + 4) * H * 0.25;

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var px = x * 0.55;
      var dx1 = px - f1x * 0.55, dy1 = y - f1y;
      var dx2 = px - f2x * 0.55, dy2 = y - f2y;
      var dx3 = px - f3x * 0.55, dy3 = y - f3y;
      var d1 = Math.sqrt(dx1*dx1 + dy1*dy1);
      var d2 = Math.sqrt(dx2*dx2 + dy2*dy2);
      var d3 = Math.sqrt(dx3*dx3 + dy3*dy3);

      var v = Math.sin(d1 * 0.3 + time) + Math.sin(d2 * 0.31 - time * 0.7) + Math.sin(d3 * 0.29 + time * 0.5);
      v = (v + 3) / 6; // normalize 0-1

      if (v < 0.15 || v > 0.85) continue; // show only the interference bands
      var band = Math.abs(v - 0.5) * 2;
      band = 1 - band; // invert: brightest at edges of bands

      var ri = Math.min(RAMP_SOFT.length - 1, (band * RAMP_SOFT.length) | 0);
      drawChar(RAMP_SOFT[ri], x, y, 0, (100 + band * 155) | 0, (50 + band * 50) | 0, 0.3 + band * 0.7);
    }
  }
}

// ============================================================
// FOLD — Domain Warping (nested fBm)
// ============================================================

function renderFold() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var sc = 0.03;

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var px = x * sc, py = y * sc;
      // Nested domain warping
      var q1 = fbm(px + time * 0.1, py + time * 0.05, 4);
      var q2 = fbm(px + 5.2 + time * 0.08, py + 1.3, 4);
      var r1 = fbm(px + 4 * q1 + 1.7 + time * 0.06, py + 4 * q2 + 9.2, 4);
      var r2 = fbm(px + 4 * q1 + 8.3, py + 4 * q2 + 2.8 + time * 0.07, 4);
      var v = fbm(px + 4 * r1, py + 4 * r2, 3);

      v = v * 0.5 + 0.5; // normalize
      if (v < 0.1) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (v * 60 + 20) % 360; // amber range
      var sat = 60 + v * 40;
      var lit = 15 + v * 50;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, sat, lit);
    }
  }
}

var copperMsg = '  TEXTFLOW  --  ASCII EXPERIMENTS  --  SEBLAND.COM  --  ';

function renderCopper() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var numBars = 7;
  var barHues = [0, 30, 60, 180, 210, 280, 330];
  var scrollX = time * 12;

  for (var y = 0; y < H; y++) {
    // Sum bar contributions
    var totalV = 0;
    var bestHue = 0, bestV = 0;

    for (var b = 0; b < numBars; b++) {
      var barY = H * 0.5 + Math.sin(time * (0.5 + b * 0.15) + b * 1.2) * H * 0.35;
      var dist = Math.abs(y - barY);
      var halfH = 2.5 + Math.sin(time * 0.3 + b) * 0.5;
      if (dist > halfH) continue;
      var v = 1 - (dist / halfH);
      v = v * v;
      totalV += v;
      if (v > bestV) { bestV = v; bestHue = barHues[b]; }
    }

    if (totalV < 0.05) continue;
    totalV = Math.min(totalV, 1);

    for (var x = 0; x < W; x++) {
      var ci = ((x + scrollX) | 0) % copperMsg.length;
      if (ci < 0) ci += copperMsg.length;
      var ch = copperMsg[ci];
      if (ch === ' ') continue;

      var lit = 30 + totalV * 55;
      if (totalV > 0.8) lit = 50 + totalV * 45; // hot overlap
      drawCharHSL(ch, x, y, bestHue, 70 + totalV * 30, lit);
    }
  }
}

// GLITCH — Digital Corruption
// ============================================================

var glitchBase = [];
var glitchStrips = [];
var glitchEvent = 0;

function initGlitch() {
  glitchBase = [];
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!?<>{}[]=/+-~';
  for (var y = 0; y < ROWS; y++) {
    var row = [];
    for (var x = 0; x < COLS; x++) {
      row.push(chars[Math.floor(Math.random() * chars.length)]);
    }
    glitchBase.push(row);
  }
  glitchStrips = [];
  glitchEvent = 0;
}
initGlitch();

function renderGlitch() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!glitchBase.length || glitchBase.length !== H || glitchBase[0].length !== W) initGlitch();

  // Slowly scroll base text
  if (Math.random() < 0.02) {
    var row = [];
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*!?<>{}[]=/+-~';
    for (var x = 0; x < W; x++) row.push(chars[Math.floor(Math.random() * chars.length)]);
    glitchBase.push(row);
    glitchBase.shift();
  }

  // Trigger glitch events
  glitchEvent--;
  if (glitchEvent <= 0 && Math.random() < 0.06) {
    glitchEvent = 5 + Math.floor(Math.random() * 12);
    glitchStrips = [];
    var numStrips = 1 + Math.floor(Math.random() * 4);
    for (var s = 0; s < numStrips; s++) {
      glitchStrips.push({
        y: Math.floor(Math.random() * H),
        h: 1 + Math.floor(Math.random() * 4),
        offset: Math.floor((Math.random() - 0.5) * 15),
        color: Math.floor(Math.random() * 3) // 0=cyan, 1=magenta, 2=red
      });
    }
  }

  var glitching = glitchEvent > 0;

  for (var y = 0; y < H; y++) {
    var strip = null;
    if (glitching) {
      for (var s = 0; s < glitchStrips.length; s++) {
        if (y >= glitchStrips[s].y && y < glitchStrips[s].y + glitchStrips[s].h) {
          strip = glitchStrips[s];
          break;
        }
      }
    }

    for (var x = 0; x < W; x++) {
      var sx = x, sy = y;
      var r = 120, g = 130, b = 140;

      if (strip) {
        sx = (x + strip.offset + W) % W;
        if (strip.color === 0) { r = 0; g = 255; b = 255; }
        else if (strip.color === 1) { r = 255; g = 0; b = 255; }
        else { r = 255; g = 50; b = 50; }
      }

      // Static noise
      if (Math.random() < 0.015) {
        var chars = '@#$%!?*';
        drawChar(chars[Math.floor(Math.random() * chars.length)], x, y, 255, 255, 255, 0.3 + Math.random() * 0.5);
        continue;
      }

      if (sy < glitchBase.length && sx < glitchBase[0].length) {
        var ch = glitchBase[sy][sx];
        var alpha = strip ? 0.7 + Math.random() * 0.3 : 0.15 + Math.random() * 0.1;
        drawChar(ch, x, y, r, g, b, alpha);
      }
    }
  }

  // Block corruption
  if (glitching && Math.random() < 0.3) {
    var bx = Math.floor(Math.random() * (W - 8));
    var by = Math.floor(Math.random() * (H - 4));
    var bch = '#@$%'[Math.floor(Math.random() * 4)];
    for (var dy = 0; dy < 3; dy++) {
      for (var dx = 0; dx < 6 + Math.floor(Math.random() * 8); dx++) {
        if (bx + dx < W && by + dy < H)
          drawChar(bch, bx + dx, by + dy, 255, 0, 255, 0.6 + Math.random() * 0.4);
      }
    }
  }
}

var boids = [];
var NUM_BOIDS = 250;
var flockTrail;

function initFlock() {
  boids = [];
  for (var i = 0; i < NUM_BOIDS; i++) {
    boids.push({
      x: Math.random() * COLS, y: Math.random() * ROWS,
      vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2
    });
  }
  flockTrail = new Float32Array(COLS * ROWS);
}
initFlock();

function renderFlock() {
  clearCanvas();
  var W = COLS, H = ROWS;
  if (!flockTrail || flockTrail.length !== W * H) initFlock();

  // Decay trails
  for (var i = 0; i < flockTrail.length; i++) flockTrail[i] *= 0.93;

  // Update boids
  for (var i = 0; i < boids.length; i++) {
    var b = boids[i];
    var sx = 0, sy = 0, ax = 0, ay = 0, cx = 0, cy = 0;
    var sc = 0, ac = 0, cc = 0;

    for (var j = 0; j < boids.length; j += 3) { // sample every 3rd for perf
      if (i === j) continue;
      var o = boids[j];
      var dx = o.x - b.x, dy = o.y - b.y;
      var d = dx * dx + dy * dy;
      if (d < 9 && d > 0) { sx -= dx / d; sy -= dy / d; sc++; } // separation
      if (d < 64) { ax += o.vx; ay += o.vy; ac++; } // alignment
      if (d < 144) { cx += dx; cy += dy; cc++; } // cohesion
    }

    if (sc > 0) { b.vx += sx * 0.15; b.vy += sy * 0.15; }
    if (ac > 0) { b.vx += (ax / ac - b.vx) * 0.05; b.vy += (ay / ac - b.vy) * 0.05; }
    if (cc > 0) { b.vx += (cx / cc) * 0.005; b.vy += (cy / cc) * 0.005; }

    var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (spd > 1.5) { b.vx = b.vx / spd * 1.5; b.vy = b.vy / spd * 1.5; }
    if (spd < 0.3) { b.vx *= 1.5; b.vy *= 1.5; }

    b.x += b.vx; b.y += b.vy;
    if (b.x < 0) b.x += W; if (b.x >= W) b.x -= W;
    if (b.y < 0) b.y += H; if (b.y >= H) b.y -= H;

    var gx = b.x | 0, gy = b.y | 0;
    if (gx >= 0 && gx < W && gy >= 0 && gy < H) {
      flockTrail[gy * W + gx] = Math.min(flockTrail[gy * W + gx] + 0.5, 1);
    }
  }

  // Render trails
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var v = flockTrail[y * W + x];
      if (v < 0.02) continue;
      var ri = Math.min(RAMP_DENSE.length - 1, (v * RAMP_DENSE.length) | 0);
      var hue = (30 + v * 30) % 360; // warm yellow-orange
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 70 + v * 30, 25 + v * 50);
    }
  }
}

// ============================================================
// ROTO — Rotozoom
// ============================================================

function renderRoto() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var angle = time * 0.3;
  var scale = 1.5 + Math.sin(time * 0.7) * 0.8;
  var cosA = Math.cos(angle), sinA = Math.sin(angle);
  var cx = W / 2, cy = H / 2;

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var dx = x - cx, dy = y - cy;
      var tx = (dx * cosA - dy * sinA) * scale;
      var ty = (dx * sinA + dy * cosA) * scale;

      // XOR texture
      var ix = ((tx | 0) % 32 + 32) % 32;
      var iy = ((ty | 0) % 32 + 32) % 32;
      var v = ((ix ^ iy) & 31) / 31;

      // Second layer
      var angle2 = time * -0.2;
      var scale2 = 2 + Math.cos(time * 0.5) * 0.5;
      var cosB = Math.cos(angle2), sinB = Math.sin(angle2);
      var tx2 = (dx * cosB - dy * sinB) * scale2;
      var ty2 = (dx * sinB + dy * cosB) * scale2;
      var ix2 = ((tx2 | 0) % 16 + 16) % 16;
      var iy2 = ((ty2 | 0) % 16 + 16) % 16;
      var v2 = ((ix2 ^ iy2) & 15) / 15;

      var combined = (v + v2) * 0.5;
      if (combined < 0.1) continue;

      var ri = Math.min(RAMP_DENSE.length - 1, (combined * RAMP_DENSE.length) | 0);
      var hue = (combined * 360 + time * 40) % 360;
      drawCharHSL(RAMP_DENSE[ri], x, y, hue, 70 + combined * 30, 20 + combined * 50);
    }
  }
}

// ============================================================
// EROSION — Terrain Heightmap
// ============================================================

var terrainH;

function initErosion() {
  terrainH = null; // Will generate on first render
}
initErosion();

function renderErosion() {
  clearCanvas();
  var W = COLS, H = ROWS;
  var sc = 0.04;
  var drift = time * 0.15;

  var terrainChars = ' .,-~:;=+*oO#@';
  var terrainColors = [
    [30,60,120], [40,80,50], [60,120,40], [100,160,50],
    [140,180,60], [180,170,100], [200,190,150], [220,210,180],
    [240,235,220], [255,250,245]
  ];

  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var px = x * sc + drift, py = y * sc + drift * 0.3;
      var h = fbm(px, py, 6) * 0.5 + 0.5;

      // Add ridge noise for mountain detail
      var ridge = Math.abs(simplex2(px * 2, py * 2));
      h = h * 0.7 + ridge * 0.3;

      h = Math.max(0, Math.min(1, h));
      if (h < 0.1) continue;

      var ci = Math.min(terrainColors.length - 1, (h * terrainColors.length) | 0);
      var c = terrainColors[ci];
      var ri = Math.min(terrainChars.length - 1, (h * terrainChars.length) | 0);
      drawChar(terrainChars[ri], x, y, c[0], c[1], c[2], 0.3 + h * 0.7);
    }
  }
}

// ============================================================
// MAIN LOOP
// ============================================================

var renderers = {
  lava: renderLava, rain: renderRain, wave: renderWave,
  fire: renderFire, plasma: renderPlasma, life: renderLife,
  warp: renderWarp, swirl: renderSwirl,
  rift: renderRift, voronoi: renderVoronoi, bolt: renderBolt,
  moire: renderMoire, fold: renderFold, copper: renderCopper,
  glitch: renderGlitch, flock: renderFlock, roto: renderRoto,
  erosion: renderErosion
};

// Single-pass glow: draw canvas onto itself with blur via offscreen canvas
var glowCanvas = document.createElement('canvas');
var glowCtx = glowCanvas.getContext('2d');

function applyGlow() {
  var g = glows[currentMode];
  if (glowCanvas.width !== canvas.width || glowCanvas.height !== canvas.height) {
    glowCanvas.width = canvas.width;
    glowCanvas.height = canvas.height;
  }
  glowCtx.clearRect(0, 0, glowCanvas.width, glowCanvas.height);
  glowCtx.filter = 'blur(' + g.blur + 'px)';
  glowCtx.drawImage(canvas, 0, 0);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 0.5;
  ctx.globalCompositeOperation = 'lighter';
  ctx.drawImage(glowCanvas, 0, 0);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

var lastTime = 0;
function loop(ts) {
  if (!ts) { requestAnimationFrame(loop); return; }
  if (!lastTime) lastTime = ts;
  var dt = (ts - lastTime) / 1000;
  if (dt > 0.1) dt = 0.016;
  lastTime = ts;
  time += dt;
  renderers[currentMode]();
  applyGlow();
  requestAnimationFrame(loop);
}

function switchMode(mode) {
  currentMode = mode;
  time = 0;
  updateURL(mode);
  buttons.forEach(function(b) { b.classList.toggle('active', b.dataset.mode === mode); });
  if (mode === 'lava') initBlobs();
  if (mode === 'rain') initRain();
  if (mode === 'fire') initFire();
  if (mode === 'life') initLife();
  if (mode === 'warp') initWarp();
  if (mode === 'swirl') initSwirl();
  if (mode === 'rift') initRift();
  if (mode === 'voronoi') initVoronoi();
  if (mode === 'bolt') initBolt();
  if (mode === 'glitch') initGlitch();
  if (mode === 'flock') initFlock();
  if (mode === 'erosion') initErosion();
}

buttons.forEach(function(b) {
  b.addEventListener('click', function() { switchMode(b.dataset.mode); });
});

// URL-based mode routing
function getModeFromPath() {
  var path = window.location.pathname.replace(/\/+$/, '');
  var parts = path.split('/');
  var last = parts[parts.length - 1];
  if (last && renderers[last]) return last;
  return 'lava';
}

function updateURL(mode) {
  var base = window.location.pathname.replace(/\/+$/, '').split('/');
  // Remove trailing mode if present
  if (base.length > 1 && renderers[base[base.length - 1]]) base.pop();
  var newPath = base.join('/') + '/' + mode;
  history.replaceState(null, '', newPath);
}

// Wait for font to load before starting
document.fonts.ready.then(function() {
  resize();
  var startMode = getModeFromPath();
  if (startMode !== 'lava') switchMode(startMode);
  loop();
});
</script>
</body>
</html>
